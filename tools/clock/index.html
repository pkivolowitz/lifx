<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Nuclear fallback: full page reload every hour in case JS dies. -->
<meta http-equiv="refresh" content="3600">
<title>GlowUp Clock</title>
<style>
/* ------------------------------------------------------------------ */
/* Design tokens                                                       */
/* ------------------------------------------------------------------ */
:root {
    --bg-from:       #3a2e24;
    --bg-to:         #2c2218;
    --clock-color:   #d4c4a8;
    --date-color:    #9a8870;
    --card-bg:       rgba(62, 50, 38, 0.8);
    --card-border:   rgba(140, 115, 80, 0.3);
    --card-shadow:   0 4px 24px rgba(0, 0, 0, 0.25);
    --temp-color:    #d4864a;
    --humid-color:   #6aaa90;
    --label-color:   #9a8870;
    --stale-color:   #c45a3a;
    --text-color:    #c4b49a;
    --gold:          #c4a44a;
    --gold-dim:      #8a7a3a;
    --cream:         #e8dcc8;
    --font-clock:    "SF Mono", "Menlo", "Consolas", monospace;
    --font-hebrew:   "Times New Roman", "Georgia", serif;
    --font-body:     -apple-system, BlinkMacSystemFont, "Segoe UI",
                     Helvetica, Arial, sans-serif;
    --max-width:     1400px;
    --card-radius:   24px;
    --gap:           12px;
}

/* ------------------------------------------------------------------ */
/* Reset & base                                                        */
/* ------------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-body);
    color: var(--text-color);
    background: linear-gradient(160deg, var(--bg-from), var(--bg-to));
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 32px;
}

/* ------------------------------------------------------------------ */
/* Clock                                                               */
/* ------------------------------------------------------------------ */
.clock-section {
    text-align: center;
    margin-bottom: 48px;
}

.clock-time {
    font-family: var(--font-clock);
    font-size: clamp(5.5rem, 15.4vw, 13.2rem);
    font-weight: 200;
    letter-spacing: 0.04em;
    color: var(--clock-color);
    line-height: 1;
}

.clock-ampm {
    margin-left: 8px;
}

.clock-date {
    font-size: clamp(1.32rem, 3.3vw, 2.2rem);
    font-weight: 300;
    color: var(--date-color);
    margin-top: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.hebrew-date {
    font-family: var(--font-hebrew);
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    color: var(--gold);
    margin-top: 4px;
    direction: rtl;
}

/* Portrait mode. */
@media (orientation: portrait) {
    .tile-grid { grid-template-columns: repeat(3, 1fr); }
    .tile { padding: 28px; min-height: 180px; }
}
body.portrait .tile-grid { grid-template-columns: repeat(3, 1fr); }
body.portrait .tile { padding: 28px; min-height: 180px; }

/* ------------------------------------------------------------------ */
/* Tile grid                                                           */
/* ------------------------------------------------------------------ */
.content { position: relative; z-index: 1; width: 100%; max-width: var(--max-width); }

.tile-grid {
    display: grid;
    gap: var(--gap);
    grid-template-columns: repeat(4, 1fr);
    width: 100%;
}

/* ------------------------------------------------------------------ */
/* Tile (base card)                                                    */
/* ------------------------------------------------------------------ */
.tile {
    background: var(--card-bg);
    border: 2px solid black;
    border-radius: var(--card-radius);
    padding: 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: clamp(20px, 4vw, 40px);
    overflow: hidden;
    text-align: center;
}

.tile-title {
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-color);
    margin-bottom: 2px;
}

.tile-subtitle {
    font-size: clamp(0.75rem, 1.4vw, 1.1rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--label-color);
    margin-bottom: 12px;
}

/* ------------------------------------------------------------------ */
/* Weather card                                                        */
/* ------------------------------------------------------------------ */
.weather-icon {
    font-size: clamp(2.5rem, 6vw, 4rem);
    line-height: 1;
    margin-bottom: 4px;
}
.weather-temp {
    font-family: var(--font-clock);
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 200;
    color: var(--clock-color);
    line-height: 1.1;
}
.weather-details {
    font-size: clamp(0.75rem, 1.4vw, 1.1rem);
    color: var(--label-color);
    margin-top: 6px;
    line-height: 1.4;
}

/* ------------------------------------------------------------------ */
/* AQI card                                                            */
/* ------------------------------------------------------------------ */
.aqi-value {
    font-family: var(--font-clock);
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 200;
    line-height: 1.1;
}
.aqi-label {
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 600;
    margin-top: 2px;
}
.aqi-details {
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: var(--label-color);
    margin-top: 6px;
    line-height: 1.4;
}
.aqi-good       { color: #6aaa90; }
.aqi-moderate   { color: #d4c44a; }
.aqi-sensitive  { color: #d4864a; }
.aqi-unhealthy  { color: #c45a3a; }
.aqi-very-bad   { color: #8b3060; }
.aqi-hazardous  { color: #6b2040; }

/* ------------------------------------------------------------------ */
/* UV card                                                             */
/* ------------------------------------------------------------------ */
.uv-value {
    font-family: var(--font-clock);
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 200;
    line-height: 1.1;
}
.uv-label {
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 600;
    margin-top: 2px;
}
.uv-details {
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: var(--label-color);
    margin-top: 6px;
}
.uv-low      { color: #6aaa90; }
.uv-moderate { color: #d4c44a; }
.uv-high     { color: #d4864a; }
.uv-veryhigh { color: #c45a3a; }
.uv-extreme  { color: #8b3060; }

/* ------------------------------------------------------------------ */
/* NWS alerts card                                                     */
/* ------------------------------------------------------------------ */
.alerts-list {
    font-size: clamp(0.7rem, 1.3vw, 1rem);
    color: var(--label-color);
    line-height: 1.5;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.alert-item {
    margin-bottom: 6px;
    color: #d4864a;
}
.alert-item.warning { color: #c45a3a; }
.alert-item.watch   { color: #d4c44a; }
.alerts-clear {
    color: #6aaa90;
    font-size: clamp(1rem, 2vw, 1.4rem);
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}
.alerts-title.has-alerts {
    color: #c45a3a;
    animation: blink-3-1 2s step-end infinite;
}
@keyframes blink-3-1 {
    0%, 75%  { opacity: 1; }
    75.01%, 100% { opacity: 0; }
}

/* ------------------------------------------------------------------ */
/* Moon card                                                           */
/* ------------------------------------------------------------------ */
.moon-card canvas { margin-bottom: 6px; }
.moon-name {
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 600;
    color: var(--clock-color);
}
.moon-details {
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: var(--label-color);
    margin-top: 4px;
    line-height: 1.4;
}

/* ------------------------------------------------------------------ */
/* Webcam card                                                         */
/* ------------------------------------------------------------------ */
.webcam-tile {
    padding: 0;
    overflow: hidden;
    position: relative;
}
.webcam-tile img {
    width: 100%;
    height: auto;
    display: block;
}
.webcam-label {
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-size: clamp(0.6rem, 1vw, 0.85rem);
    color: rgba(255, 255, 255, 0.6);
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    letter-spacing: 0.06em;
}
.webcam-span-2 { grid-column: span 2; }
.webcam-span-3 { grid-column: span 3; }

/* ------------------------------------------------------------------ */
/* Torah / Chabad tiles                                                 */
/* ------------------------------------------------------------------ */
.card-title-he {
    font-family: var(--font-hebrew);
    font-size: clamp(0.9rem, 1.6vw, 1.2rem);
    color: var(--gold);
    direction: rtl;
    margin-bottom: 8px;
}
.parasha-name {
    font-family: var(--font-hebrew);
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: var(--cream);
    direction: rtl;
    line-height: 1.2;
    margin-bottom: 4px;
}
.parasha-name-en {
    font-size: clamp(1rem, 2vw, 1.4rem);
    color: var(--text-color);
}
.parasha-ref {
    font-size: clamp(0.7rem, 1.2vw, 0.95rem);
    color: var(--label-color);
    margin-top: 8px;
}
.zman-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
    font-size: clamp(0.7rem, 1.2vw, 0.95rem);
}
.zman-name { color: var(--label-color); }
.zman-name-he {
    font-family: var(--font-hebrew);
    color: var(--gold-dim);
    direction: rtl;
    font-size: 0.9em;
    margin-left: 6px;
}
.zman-time {
    font-family: var(--font-clock);
    color: var(--cream);
    font-size: 0.95em;
}
.zman-row.next {
    background: rgba(196, 164, 74, 0.1);
    border-radius: 6px;
    padding: 4px 6px;
}
.zman-row.next .zman-time {
    color: var(--gold);
    font-weight: 600;
}
.candle-time {
    font-family: var(--font-clock);
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--gold);
    font-weight: 200;
    text-align: center;
    margin: 8px 0;
}
.candle-label {
    text-align: center;
    font-size: clamp(0.8rem, 1.3vw, 1rem);
    color: var(--label-color);
}
.candle-countdown {
    text-align: center;
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    color: var(--text-color);
    margin-top: 6px;
}
.holiday-name {
    font-family: var(--font-hebrew);
    font-size: clamp(1.4rem, 3vw, 2rem);
    color: var(--gold);
    direction: rtl;
    text-align: center;
    margin: 8px 0;
}
.holiday-name-en {
    font-size: clamp(1rem, 2vw, 1.4rem);
    color: var(--cream);
    text-align: center;
}
.holiday-detail {
    font-size: clamp(0.75rem, 1.2vw, 0.95rem);
    color: var(--label-color);
    text-align: center;
    margin-top: 6px;
}
.hayom-yom-tile { grid-column: span 2; }
.hayom-text {
    font-family: var(--font-hebrew);
    font-size: clamp(1rem, 1.8vw, 1.3rem);
    color: var(--cream);
    direction: rtl;
    line-height: 1.6;
    margin-bottom: 8px;
}
.hayom-text-en {
    font-size: clamp(0.8rem, 1.3vw, 1rem);
    color: var(--text-color);
    line-height: 1.5;
    font-style: italic;
}
.daf-name {
    font-family: var(--font-hebrew);
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: var(--cream);
    direction: rtl;
    text-align: center;
    margin: 8px 0;
}
.daf-name-en {
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    color: var(--text-color);
    text-align: center;
}

/* ------------------------------------------------------------------ */
/* Responsive                                                          */
/* ------------------------------------------------------------------ */
@media (max-width: 600px) {
    body { padding: 20px 16px 16px; }
    .clock-section { margin-bottom: 16px; }
    .tile { padding: 16px; }
    .tile-grid { gap: 8px; }
}
@media (max-height: 700px) {
    .clock-section { margin-bottom: 16px; }
    .clock-time { font-size: clamp(3rem, 10vw, 7rem); }
    .tile { padding: 16px; }
}

/* ------------------------------------------------------------------ */
/* Footer                                                              */
/* ------------------------------------------------------------------ */
.footer {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-color);
    opacity: 0.6;
    letter-spacing: 0.04em;
    z-index: 1;
}
</style>
</head>
<body>

<div class="content">
    <div class="clock-section">
        <div class="clock-time" id="clockTime"></div>
        <div class="clock-date" id="clockDate"></div>
        <div class="hebrew-date" id="hebrewDate" style="display:none"></div>
    </div>

    <div class="tile-grid" id="tileGrid">
        <!-- Tiles are injected by JS based on config.json -->
    </div>
</div>

<div class="footer" id="footer"></div>

<script>
/* ================================================================== */
/* GlowUp Standalone Clock                                             */
/* Self-contained kiosk display — all data from public APIs.           */
/* No GlowUp server dependency.                                        */
/*                                                                      */
/* __version__ = "1.0.0"                                               */
/* ================================================================== */

(function () {
    "use strict";

    /* -------------------------------------------------------------- */
    /* Constants                                                      */
    /* -------------------------------------------------------------- */

    var DAYS = [
        "Sunday", "Monday", "Tuesday", "Wednesday",
        "Thursday", "Friday", "Saturday"
    ];
    var MONTHS = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];

    /* Default config — overridden by config.json. */
    var CONFIG = {
        latitude: 30.69,
        longitude: -88.04,
        timezone: "America/Chicago",
        tiles: ["weather", "aqi", "uv", "alerts", "moon"],
        webcam_url: null,
        webcam_label: "",
        webcam_span: 3,
        footer: ""
    };

    /* Retry intervals (ms). */
    var RETRY_FAST_MS = 5000;
    var RETRY_SLOW_MS = 60000;
    var RETRY_FAST_COUNT = 6;

    /* Poll intervals (ms). */
    var WEATHER_POLL_MS = 900000;   /* 15 minutes. */
    var ALERTS_POLL_MS = 300000;    /* 5 minutes. */
    var WEBCAM_POLL_MS = 60000;     /* 1 minute. */
    var TORAH_POLL_MS = 3600000;    /* 1 hour. */

    /* WMO weather codes. */
    var WMO_CODES = {
        0: ["Clear", "\u2600\uFE0F"],
        1: ["Mostly Clear", "\u{1F324}\uFE0F"],
        2: ["Partly Cloudy", "\u26C5"],
        3: ["Overcast", "\u2601\uFE0F"],
        45: ["Fog", "\u{1F32B}\uFE0F"],
        48: ["Rime Fog", "\u{1F32B}\uFE0F"],
        51: ["Light Drizzle", "\u{1F326}\uFE0F"],
        53: ["Drizzle", "\u{1F326}\uFE0F"],
        55: ["Heavy Drizzle", "\u{1F326}\uFE0F"],
        61: ["Light Rain", "\u{1F327}\uFE0F"],
        63: ["Rain", "\u{1F327}\uFE0F"],
        65: ["Heavy Rain", "\u{1F327}\uFE0F"],
        71: ["Light Snow", "\u{1F328}\uFE0F"],
        73: ["Snow", "\u{1F328}\uFE0F"],
        75: ["Heavy Snow", "\u{1F328}\uFE0F"],
        80: ["Light Showers", "\u{1F326}\uFE0F"],
        81: ["Showers", "\u{1F327}\uFE0F"],
        82: ["Heavy Showers", "\u{1F327}\uFE0F"],
        95: ["Thunderstorm", "\u26C8\uFE0F"],
        96: ["Thunderstorm + Hail", "\u26C8\uFE0F"],
        99: ["Heavy Thunderstorm", "\u26C8\uFE0F"]
    };

    /* Moon constants. */
    var KNOWN_NEW_MOON = Date.UTC(2000, 0, 6, 18, 14);
    var SYNODIC_MONTH = 29.53058867;
    var MS_PER_DAY = 86400000;
    var PHASE_NAMES = [
        [0.0625, "New Moon"], [0.1875, "Waxing Crescent"],
        [0.3125, "First Quarter"], [0.4375, "Waxing Gibbous"],
        [0.5625, "Full Moon"], [0.6875, "Waning Gibbous"],
        [0.8125, "Last Quarter"], [0.9375, "Waning Crescent"],
        [1.0001, "New Moon"]
    ];

    /* Zmanim display order. */
    var ZMANIM_LABELS = [
        ["alotHaShachar",  "Dawn",            "\u05E2\u05DC\u05D5\u05EA \u05D4\u05E9\u05D7\u05E8"],
        ["sunrise",        "Sunrise",         "\u05E0\u05E5 \u05D4\u05D7\u05DE\u05D4"],
        ["sofZmanShma",    "Latest Shema",    "\u05E1\u05D5\u05E3 \u05D6\u05DE\u05DF \u05E9\u05DE\u05E2"],
        ["sofZmanTfilla",  "Latest Tefillah", "\u05E1\u05D5\u05E3 \u05D6\u05DE\u05DF \u05EA\u05E4\u05D9\u05DC\u05D4"],
        ["chatzot",        "Midday",          "\u05D7\u05E6\u05D5\u05EA"],
        ["minchaGedola",   "Mincha Gedola",   "\u05DE\u05E0\u05D7\u05D4 \u05D2\u05D3\u05D5\u05DC\u05D4"],
        ["plagHaMincha",   "Plag HaMincha",   "\u05E4\u05DC\u05D2 \u05D4\u05DE\u05E0\u05D7\u05D4"],
        ["sunset",         "Sunset",          "\u05E9\u05E7\u05D9\u05E2\u05D4"],
        ["tzeit7083deg",   "Nightfall",       "\u05E6\u05D0\u05EA \u05D4\u05DB\u05D5\u05DB\u05D1\u05D9\u05DD"]
    ];

    /* -------------------------------------------------------------- */
    /* DOM references                                                 */
    /* -------------------------------------------------------------- */

    var clockTimeEl = document.getElementById("clockTime");
    var clockDateEl = document.getElementById("clockDate");
    var hebrewDateEl = document.getElementById("hebrewDate");
    var tileGrid = document.getElementById("tileGrid");
    var footerEl = document.getElementById("footer");

    /* -------------------------------------------------------------- */
    /* Portrait detection                                             */
    /* -------------------------------------------------------------- */

    function checkPortrait() {
        document.body.classList.toggle("portrait",
            window.innerHeight > window.innerWidth);
    }
    checkPortrait();
    window.addEventListener("resize", checkPortrait);

    /* -------------------------------------------------------------- */
    /* Clock                                                          */
    /* -------------------------------------------------------------- */

    function updateClock() {
        var now = new Date();
        var h = now.getHours();
        var m = String(now.getMinutes()).padStart(2, "0");
        var ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;
        clockTimeEl.innerHTML =
            h + ":" + m + '<span class="clock-ampm">' + ampm + "</span>";
        clockDateEl.textContent =
            DAYS[now.getDay()] + ", " + MONTHS[now.getMonth()] + " " +
            now.getDate() + ", " + now.getFullYear();
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* -------------------------------------------------------------- */
    /* Resilient fetch — never gives up                                */
    /* -------------------------------------------------------------- */

    /* Wraps fetch with exponential backoff retry.
       retryState: { count: 0 } — shared per-tile, mutated in place. */
    function resilientFetch(url, opts, retryState, callback) {
        fetch(url, opts || {})
            .then(function (r) { return r.json(); })
            .then(function (data) {
                retryState.count = 0;
                callback(data);
            })
            .catch(function () {
                retryState.count++;
                var delay = (retryState.count <= RETRY_FAST_COUNT)
                    ? RETRY_FAST_MS : RETRY_SLOW_MS;
                setTimeout(function () {
                    resilientFetch(url, opts, retryState, callback);
                }, delay);
            });
    }

    /* -------------------------------------------------------------- */
    /* Tile builders                                                   */
    /* -------------------------------------------------------------- */

    var tileBuilders = {};

    /* --- Weather -------------------------------------------------- */
    tileBuilders.weather = function () {
        var div = document.createElement("div");
        div.className = "tile";
        div.id = "weatherTile";
        div.innerHTML =
            '<div class="tile-title">Weather</div>' +
            '<div class="weather-icon" id="weatherIcon"></div>' +
            '<div class="weather-temp" id="weatherTemp"></div>' +
            '<div class="weather-details" id="weatherDetails"></div>';
        tileGrid.appendChild(div);

        var url = "https://api.open-meteo.com/v1/forecast" +
            "?latitude=" + CONFIG.latitude + "&longitude=" + CONFIG.longitude +
            "&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m" +
            "&temperature_unit=fahrenheit&wind_speed_unit=mph";
        var retry = { count: 0 };

        function poll() {
            resilientFetch(url, null, retry, function (data) {
                if (!data.current) return;
                var c = data.current;
                var wmo = WMO_CODES[c.weather_code] || ["Unknown", "\u2753"];
                document.getElementById("weatherIcon").textContent = wmo[1];
                document.getElementById("weatherTemp").innerHTML =
                    Math.round(c.temperature_2m) + '<span class="unit">\u00B0F</span>';
                document.getElementById("weatherDetails").textContent =
                    wmo[0] + "  \u00B7  " + Math.round(c.relative_humidity_2m) +
                    "% humidity  \u00B7  " + Math.round(c.wind_speed_10m) + " mph";
            });
        }
        poll();
        setInterval(poll, WEATHER_POLL_MS);
    };

    /* --- Air Quality ---------------------------------------------- */
    tileBuilders.aqi = function () {
        var div = document.createElement("div");
        div.className = "tile";
        div.id = "aqiTile";
        div.innerHTML =
            '<div class="tile-title">Air Quality</div>' +
            '<div class="aqi-value" id="aqiValue"></div>' +
            '<div class="aqi-label" id="aqiLabel"></div>' +
            '<div class="aqi-details" id="aqiDetails"></div>';
        tileGrid.appendChild(div);

        var url = "https://air-quality-api.open-meteo.com/v1/air-quality" +
            "?latitude=" + CONFIG.latitude + "&longitude=" + CONFIG.longitude +
            "&current=us_aqi,pm2_5,pm10,grass_pollen,birch_pollen,ragweed_pollen,alder_pollen";
        var retry = { count: 0 };

        function aqiCat(aqi) {
            if (aqi <= 50)  return ["Good", "aqi-good"];
            if (aqi <= 100) return ["Moderate", "aqi-moderate"];
            if (aqi <= 150) return ["Sensitive Groups", "aqi-sensitive"];
            if (aqi <= 200) return ["Unhealthy", "aqi-unhealthy"];
            if (aqi <= 300) return ["Very Unhealthy", "aqi-very-bad"];
            return ["Hazardous", "aqi-hazardous"];
        }

        function poll() {
            resilientFetch(url, null, retry, function (data) {
                if (!data.current) return;
                var c = data.current;
                var aqi = Math.round(c.us_aqi || 0);
                var cat = aqiCat(aqi);
                document.getElementById("aqiValue").textContent = aqi;
                document.getElementById("aqiValue").className = "aqi-value " + cat[1];
                document.getElementById("aqiLabel").textContent = cat[0];
                document.getElementById("aqiLabel").className = "aqi-label " + cat[1];
                var parts = [];
                if (c.pm2_5 != null) parts.push("PM2.5: " + c.pm2_5.toFixed(1));
                if (c.pm10 != null) parts.push("PM10: " + c.pm10.toFixed(1));
                var pollen = [];
                if (c.grass_pollen) pollen.push("Grass: " + Math.round(c.grass_pollen));
                if (c.birch_pollen) pollen.push("Tree: " + Math.round(c.birch_pollen));
                if (c.ragweed_pollen) pollen.push("Ragweed: " + Math.round(c.ragweed_pollen));
                if (c.alder_pollen) pollen.push("Alder: " + Math.round(c.alder_pollen));
                if (pollen.length > 0) parts.push(pollen.join(", "));
                document.getElementById("aqiDetails").textContent = parts.join("  \u00B7  ");
            });
        }
        poll();
        setInterval(poll, WEATHER_POLL_MS);
    };

    /* --- UV Index ------------------------------------------------- */
    tileBuilders.uv = function () {
        var div = document.createElement("div");
        div.className = "tile";
        div.id = "uvTile";
        div.innerHTML =
            '<div class="tile-title">UV Index</div>' +
            '<div class="uv-value" id="uvValue"></div>' +
            '<div class="uv-label" id="uvLabel"></div>' +
            '<div class="uv-details" id="uvDetails"></div>';
        tileGrid.appendChild(div);

        var url = "https://api.open-meteo.com/v1/forecast" +
            "?latitude=" + CONFIG.latitude + "&longitude=" + CONFIG.longitude +
            "&current=uv_index&daily=uv_index_max" +
            "&temperature_unit=fahrenheit&timezone=" +
            encodeURIComponent(CONFIG.timezone) + "&forecast_days=1";
        var retry = { count: 0 };

        function uvCat(uv) {
            if (uv < 3)  return ["Low", "uv-low"];
            if (uv < 6)  return ["Moderate", "uv-moderate"];
            if (uv < 8)  return ["High", "uv-high"];
            if (uv < 11) return ["Very High", "uv-veryhigh"];
            return ["Extreme", "uv-extreme"];
        }

        function poll() {
            resilientFetch(url, null, retry, function (data) {
                if (!data.current) return;
                var uv = data.current.uv_index;
                var cat = uvCat(uv);
                var maxUv = (data.daily && data.daily.uv_index_max)
                    ? data.daily.uv_index_max[0] : null;
                document.getElementById("uvValue").textContent = uv.toFixed(1);
                document.getElementById("uvValue").className = "uv-value " + cat[1];
                document.getElementById("uvLabel").textContent = cat[0];
                document.getElementById("uvLabel").className = "uv-label " + cat[1];
                if (maxUv != null) {
                    var maxCat = uvCat(maxUv);
                    document.getElementById("uvDetails").innerHTML =
                        "Today's peak: <span class=\"" + maxCat[1] + "\">" +
                        maxUv.toFixed(1) + " (" + maxCat[0] + ")</span>";
                }
            });
        }
        poll();
        setInterval(poll, WEATHER_POLL_MS);
    };

    /* --- NWS Alerts ----------------------------------------------- */
    tileBuilders.alerts = function () {
        var div = document.createElement("div");
        div.className = "tile";
        div.id = "alertsTile";
        div.innerHTML =
            '<div class="tile-title" id="alertsTitle">Alerts</div>' +
            '<div class="alerts-list" id="alertsList"></div>';
        tileGrid.appendChild(div);

        var url = "https://api.weather.gov/alerts/active?point=" +
            CONFIG.latitude + "," + CONFIG.longitude;
        var retry = { count: 0 };

        function poll() {
            resilientFetch(url, { headers: { "User-Agent": "GlowUp/1.0" } },
                retry, function (data) {
                var features = data.features || [];
                var list = document.getElementById("alertsList");
                var title = document.getElementById("alertsTitle");
                list.innerHTML = "";
                if (features.length === 0) {
                    title.textContent = "Alerts";
                    title.classList.remove("has-alerts");
                    list.innerHTML = '<div class="alerts-clear">All Clear</div>';
                } else {
                    title.textContent = features.length +
                        " Alert" + (features.length > 1 ? "s" : "");
                    title.classList.add("has-alerts");
                    for (var i = 0; i < features.length; i++) {
                        var p = features[i].properties;
                        var d = document.createElement("div");
                        var cls = "alert-item";
                        if (p.event && p.event.toLowerCase().indexOf("warning") >= 0) cls += " warning";
                        else if (p.event && p.event.toLowerCase().indexOf("watch") >= 0) cls += " watch";
                        d.className = cls;
                        d.textContent = p.event || "Unknown Alert";
                        list.appendChild(d);
                    }
                }
            });
        }
        poll();
        setInterval(poll, ALERTS_POLL_MS);
    };

    /* --- Moon Phase ----------------------------------------------- */
    tileBuilders.moon = function () {
        var div = document.createElement("div");
        div.className = "tile moon-card";
        div.id = "moonTile";
        div.innerHTML =
            '<div class="tile-title">Moon</div>' +
            '<canvas id="moonCanvas" width="120" height="120"></canvas>' +
            '<div class="moon-name" id="moonName"></div>' +
            '<div class="moon-details" id="moonDetails"></div>';
        tileGrid.appendChild(div);

        function draw() {
            var now = Date.now();
            var daysSinceRef = (now - KNOWN_NEW_MOON) / MS_PER_DAY;
            var phase = (daysSinceRef % SYNODIC_MONTH) / SYNODIC_MONTH;
            var age = daysSinceRef % SYNODIC_MONTH;
            var illumination = 0.5 * (1 - Math.cos(2 * Math.PI * phase));
            var name = "New Moon";
            for (var i = 0; i < PHASE_NAMES.length; i++) {
                if (phase < PHASE_NAMES[i][0]) { name = PHASE_NAMES[i][1]; break; }
            }
            var daysToFull = ((0.5 - phase + 1) % 1) * SYNODIC_MONTH;
            var daysToNew = ((1.0 - phase) % 1) * SYNODIC_MONTH;
            if (daysToFull < 0.5) daysToFull = SYNODIC_MONTH;
            if (daysToNew < 0.5) daysToNew = SYNODIC_MONTH;

            document.getElementById("moonName").textContent = name;
            document.getElementById("moonDetails").textContent =
                Math.round(illumination * 100) + "% illuminated  \u00B7  Day " +
                Math.round(age) + "\nFull in " + Math.round(daysToFull) +
                "d  \u00B7  New in " + Math.round(daysToNew) + "d";

            var canvas = document.getElementById("moonCanvas");
            var ctx = canvas.getContext("2d");
            var w = canvas.width, h = canvas.height;
            var cx = w / 2, cy = h / 2, r = Math.min(cx, cy) - 4;
            ctx.clearRect(0, 0, w, h);
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.fillStyle = "#e8e4d4";
            ctx.fill();
            ctx.beginPath();
            var shadowPhase = phase <= 0.5 ? phase * 2 : (1 - phase) * 2;
            var terminatorX = r * Math.cos(Math.PI * shadowPhase);
            if (phase <= 0.5) {
                ctx.arc(cx, cy, r, Math.PI / 2, -Math.PI / 2, false);
                ctx.ellipse(cx, cy, Math.abs(terminatorX), r,
                    0, -Math.PI / 2, Math.PI / 2, terminatorX < 0);
            } else {
                ctx.arc(cx, cy, r, -Math.PI / 2, Math.PI / 2, false);
                ctx.ellipse(cx, cy, Math.abs(terminatorX), r,
                    0, Math.PI / 2, -Math.PI / 2, terminatorX < 0);
            }
            ctx.fillStyle = "#1a1a1a";
            ctx.fill();
        }
        draw();
        setInterval(draw, 3600000);
    };

    /* --- Webcam --------------------------------------------------- */
    tileBuilders.webcam = function () {
        if (!CONFIG.webcam_url) return;
        var span = CONFIG.webcam_span || 3;
        var div = document.createElement("div");
        div.className = "tile webcam-tile" + (span > 1 ? " webcam-span-" + span : "");
        div.id = "webcamTile";
        div.innerHTML =
            '<img id="webcamImg" alt="Webcam">' +
            '<div class="webcam-label">' + (CONFIG.webcam_label || "") + '</div>';
        tileGrid.appendChild(div);

        var retry = { count: 0 };

        function poll() {
            var img = new Image();
            img.onload = function () {
                document.getElementById("webcamImg").src = img.src;
                div.style.display = "";
                retry.count = 0;
            };
            img.onerror = function () {
                retry.count++;
                /* Never give up — just keep trying. */
                var delay = (retry.count <= RETRY_FAST_COUNT)
                    ? RETRY_FAST_MS : RETRY_SLOW_MS;
                setTimeout(poll, delay);
            };
            img.src = CONFIG.webcam_url + "?t=" + Date.now();
        }
        poll();
        setInterval(poll, WEBCAM_POLL_MS);
    };

    /* --- Hebrew Date ---------------------------------------------- */
    tileBuilders.hebrew_date = function () {
        hebrewDateEl.style.display = "";

        var retry = { count: 0 };

        function poll() {
            var today = new Date();
            var dateStr = today.getFullYear() + "-" +
                String(today.getMonth() + 1).padStart(2, "0") + "-" +
                String(today.getDate()).padStart(2, "0");
            resilientFetch(
                "https://www.hebcal.com/converter?cfg=json&date=" + dateStr + "&g2h=1&gs=on",
                null, retry, function (data) {
                    hebrewDateEl.textContent =
                        data.hebrew || (data.hd + " " + data.hm + " " + data.hy);
                }
            );
        }
        poll();
        setInterval(poll, TORAH_POLL_MS);
    };

    /* --- Torah Portion --------------------------------------------- */
    tileBuilders.torah = function () {
        var div = document.createElement("div");
        div.className = "tile";
        div.id = "torahTile";
        div.innerHTML =
            '<div class="tile-title">Torah Portion</div>' +
            '<div class="card-title-he">\u05E4\u05E8\u05E9\u05EA \u05D4\u05E9\u05D1\u05D5\u05E2</div>' +
            '<div class="parasha-name" id="parashaHe">Loading...</div>' +
            '<div class="parasha-name-en" id="parashaEn"></div>' +
            '<div class="parasha-ref" id="parashaRef"></div>';
        tileGrid.appendChild(div);

        var retry = { count: 0 };

        function poll() {
            resilientFetch(
                "https://www.sefaria.org/api/calendars?diaspora=1",
                null, retry, function (data) {
                    var items = data.calendar_items || [];
                    for (var i = 0; i < items.length; i++) {
                        if (items[i].title && items[i].title.en === "Parashat Hashavua") {
                            document.getElementById("parashaHe").textContent =
                                items[i].displayValue ? items[i].displayValue.he : "";
                            document.getElementById("parashaEn").textContent =
                                items[i].displayValue ? items[i].displayValue.en : "";
                            document.getElementById("parashaRef").textContent =
                                items[i].ref || "";
                            break;
                        }
                    }
                }
            );
        }
        poll();
        setInterval(poll, TORAH_POLL_MS);
    };

    /* --- Zmanim --------------------------------------------------- */
    tileBuilders.zmanim = function () {
        var div = document.createElement("div");
        div.className = "tile";
        div.id = "zmanimTile";
        div.innerHTML =
            '<div class="tile-title">Zmanim</div>' +
            '<div class="card-title-he">\u05D6\u05DE\u05E0\u05D9\u05DD</div>' +
            '<div id="zmanimList"></div>';
        tileGrid.appendChild(div);

        var retry = { count: 0 };

        function poll() {
            var url = "https://www.hebcal.com/zmanim?cfg=json" +
                "&latitude=" + CONFIG.latitude +
                "&longitude=" + CONFIG.longitude +
                "&tzid=" + encodeURIComponent(CONFIG.timezone);
            resilientFetch(url, null, retry, function (data) {
                var times = data.times || {};
                var list = document.getElementById("zmanimList");
                list.innerHTML = "";
                var now = new Date();
                var foundNext = false;
                for (var i = 0; i < ZMANIM_LABELS.length; i++) {
                    var key = ZMANIM_LABELS[i][0];
                    var en = ZMANIM_LABELS[i][1];
                    var he = ZMANIM_LABELS[i][2];
                    var t = times[key];
                    if (!t) continue;
                    var d = new Date(t);
                    var isNext = !foundNext && d > now;
                    if (isNext) foundNext = true;
                    var row = document.createElement("div");
                    row.className = "zman-row" + (isNext ? " next" : "");
                    row.innerHTML =
                        '<span class="zman-name">' + en +
                        '<span class="zman-name-he"> ' + he + '</span></span>' +
                        '<span class="zman-time">' +
                        d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) +
                        '</span>';
                    list.appendChild(row);
                }
            });
        }
        poll();
        setInterval(poll, TORAH_POLL_MS);
    };

    /* --- Candle Lighting / Shabbat -------------------------------- */
    tileBuilders.candle_lighting = function () {
        var div = document.createElement("div");
        div.className = "tile";
        div.id = "candleTile";
        div.innerHTML =
            '<div class="tile-title">Shabbat</div>' +
            '<div class="card-title-he">\u05E9\u05D1\u05EA</div>' +
            '<div class="candle-label">Candle Lighting</div>' +
            '<div class="candle-time" id="candleTime">--:--</div>' +
            '<div class="candle-countdown" id="candleCountdown"></div>' +
            '<div class="candle-label" style="margin-top:12px">Havdalah</div>' +
            '<div class="candle-time" id="havdalahTime" style="font-size:clamp(1.4rem,3vw,2rem)">--:--</div>';
        tileGrid.appendChild(div);

        var retry = { count: 0 };

        function poll() {
            var url = "https://www.hebcal.com/shabbat?cfg=json&geo=pos" +
                "&latitude=" + CONFIG.latitude +
                "&longitude=" + CONFIG.longitude +
                "&tzid=" + encodeURIComponent(CONFIG.timezone) +
                "&M=on&b=18";
            resilientFetch(url, null, retry, function (data) {
                var items = data.items || [];
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    if (item.category === "candles") {
                        var d = new Date(item.date);
                        document.getElementById("candleTime").textContent =
                            d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
                        var now = new Date();
                        var diff = d - now;
                        if (diff > 0) {
                            var days = Math.floor(diff / 86400000);
                            var hrs = Math.floor((diff % 86400000) / 3600000);
                            var mins = Math.floor((diff % 3600000) / 60000);
                            var parts = [];
                            if (days > 0) parts.push(days + "d");
                            if (hrs > 0) parts.push(hrs + "h");
                            parts.push(mins + "m");
                            document.getElementById("candleCountdown").textContent =
                                "in " + parts.join(" ");
                        } else {
                            document.getElementById("candleCountdown").textContent =
                                "Shabbat Shalom";
                        }
                    }
                    if (item.category === "havdalah") {
                        var hd = new Date(item.date);
                        document.getElementById("havdalahTime").textContent =
                            hd.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
                    }
                }
            });
        }
        poll();
        setInterval(poll, TORAH_POLL_MS);
        /* Update countdown every minute. */
        setInterval(poll, 60000);
    };

    tileBuilders.holiday = function () {

        div.id = "holidayTile";

    tileBuilders.daf_yomi = function () {

        div.id = "dafTile";
        div.innerHTML =
            '<div class="tile-title">Daf Yomi</div>' +
            '<div class="card-title-he">\u05D3\u05E3 \u05D9\u05D5\u05DE\u05D9</div>' +
            '<div class="daf-name" id="dafHe">Loading...</div>' +

                    for (var i = 0; i < items.length; i++) {
                        if (items[i].title && items[i].title.en === "Daf Yomi") {
                            document.getElementById("dafHe").textContent =
                                items[i].displayValue ? items[i].displayValue.he : "";
                            document.getElementById("dafEn").textContent =
                                items[i].displayValue ? items[i].displayValue.en : "";
                            break;

            );

    /* -------------------------------------------------------------- */
    /* Config loader + tile initialization                            */
    /* -------------------------------------------------------------- */

    function buildTiles() {
        /* Build each configured tile in order. */
        CONFIG.tiles.forEach(function (tileName) {
            var builder = tileBuilders[tileName];
            if (builder) {
                builder();
            } else {
                console.warn("Unknown tile: " + tileName);
            }
        });

        /* Footer. */
        if (CONFIG.footer) {
            footerEl.innerHTML = CONFIG.footer;
        }
    }

    /* Load config.json (served by local HTTP server).
       If missing, use defaults — the clock still works. */
    fetch("config.json")
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
            /* Merge loaded config over defaults. */
            Object.keys(cfg).forEach(function (k) {
                CONFIG[k] = cfg[k];
            });
            buildTiles();
        })
        .catch(function () {
            /* No config.json — use defaults. */
            console.warn("No config.json found, using defaults.");
            buildTiles();
        });

})();
</script>
