# Voice action definitions — config-driven intent dispatch.
#
# Each action defines how to translate a parsed voice intent into a
# GlowUp API call and format a spoken confirmation.  Adding a new
# voice command is a YAML entry, not a code change.
#
# Action types:
#   command — POST to the GlowUp API, physical change is the feedback
#   query   — GET from the GlowUp API, spoken response
#   chat    — freeform conversation via Ollama (special case)
#
# Fields:
#   label  — spoken in "Waiting on the {label}" before execution
#   confirm — template for the result (commands say "Got it" after)
#
# Templates use {target} for the resolved device/group name and
# {params.<key>} for intent parameters.  Queries with complex logic
# use a named handler function.
#
# Perry Kivolowitz, 2026. MIT License.

# ---------------------------------------------------------------------------
# Zigbee smart plug synonyms — map spoken friendly name to Z2M device name.
# Voice targets matching a key here are resolved to "plug:<zigbee_name>" and
# handled by the executor's plug path (direct HTTP to glowup-zigbee-service
# on broker-2, not via hub /api/devices).
#
# Each entry is a mapping with:
#   zigbee:     Z2M device name (the friendly_name in zigbee2mqtt config)
#   type_words: list of natural-language nouns the user might say to
#               refer to what the plug controls.  Rendered in parens
#               after the friendly name in the LLM capabilities prompt
#               so the intent parser can disambiguate "lights"/"tv"/etc.
#               against the right plug.  A plug with type_word "light"
#               or "lamp" IS treated as a light by the prompt rules,
#               which is how a dumb lamp on a Zigbee plug stays
#               distinguishable from a TV plug in the same room.
#
# Bare-string entries (legacy) parse as zigbee with empty type_words —
# they will not be matched by user nouns, only by the friendly name.
#
# Adding a plug is a YAML edit.  Editing type_words from the dashboard
# is a future task (Perry, 2026-05-01).
# ---------------------------------------------------------------------------

plugs:
  "ML Switch":
    zigbee: ML_Power
    type_words: ["ML", "Machine Learning Computer", "Beast"]
  "Main Bedroom TV Switch":
    zigbee: MBTV
    type_words: ["tv", "television"]
  "Living Room TV Switch":
    zigbee: LRTV
    type_words: ["tv", "television"]
  "Backyard IR Switch":
    zigbee: BYIR
    type_words: ["IR illuminator", "back yard ir"]

# ---------------------------------------------------------------------------
# Commands — POST to API, says "Got it" after execution
# ---------------------------------------------------------------------------

power:
  type: command
  label: lights
  method: POST
  path: "/api/devices/{target}/power"
  body:
    "on": "param:on"
  confirm: "{target} is {on_off}."
  param_map:
    "on": {"true": "on", "false": "off", "key": "on_off"}
  speak: false

brightness:
  type: command
  label: lights
  method: POST
  path: "/api/devices/{target}/brightness"
  body:
    brightness: "param:brightness"
  confirm: "{target} brightness set to {brightness}%."
  speak: false

color:
  type: command
  label: lights
  method: POST
  path: "/api/devices/{target}/play"
  body:
    effect: "solid"
    params:
      color: "param:color"
  confirm: "{target} set to {color}."
  speak: false

temperature:
  type: command
  label: lights
  method: POST
  path: "/api/devices/{target}/play"
  body:
    effect: "solid"
    params:
      kelvin: "param:temperature"
  confirm: "{target} set to {temperature} Kelvin."
  speak: false

play_effect:
  type: command
  label: lights
  method: POST
  path: "/api/devices/{target}/play"
  body:
    effect: "param:effect"
  confirm: "Playing {effect} on {target}."
  speak: false

stop:
  type: command
  label: lights
  method: POST
  path: "/api/devices/{target}/stop"
  body: {}
  confirm: "{target} stopped."
  speak: false

# ---------------------------------------------------------------------------
# Queries — GET from API, spoken response
# ---------------------------------------------------------------------------

query_status:
  type: query
  label: lights
  handler: power_state
  speak: true

query_sensor:
  type: query
  label: sensors
  handler: sensor_reading
  speak: true

query_power:
  type: query
  label: power meter
  handler: power_summary
  speak: true

query_soil:
  type: query
  label: water sensor
  handler: soil_moisture
  zones:
    backyard:
      sensors:
        - {name: SBYRD, direction: south}
    listening room:
      sensors:
        - {name: SLIS, direction: south}
    front yard:
      sensors:
        - {name: SLIS, direction: south}
        - {name: SFRNT, direction: center}
        - {name: NFRNT, direction: north}
  threshold: 40.0
  speak: true

query_weather:
