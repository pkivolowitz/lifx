<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowUp Home</title>
<style>
/* ------------------------------------------------------------------ */
/* Design tokens — warm, cheerful, light palette                      */
/* ------------------------------------------------------------------ */
:root {
    /* Background — dark loam. */
    --bg:            #2c2218;

    /* Clock. */
    --clock-color:   #ffffff;
    --date-color:    #ffffff;

    /* Sensor card. */
    --card-bg:       rgba(62, 50, 38, 0.8);
    --card-border:   rgba(140, 115, 80, 0.3);
    --card-shadow:   0 4px 24px rgba(0, 0, 0, 0.25);

    /* Readings. */
    --temp-color:    #ffffff;
    --humid-color:   #ffffff;
    --motion-on:     #ffffff;
    --motion-off:    #ffffff;
    --label-color:   #ffffff;
    --stale-color:   #ffffff;
    --text-color:    #ffffff;

    /* Typography — system fonts, no external deps. */
    --font-clock:    "SF Mono", "Menlo", "Consolas", monospace;
    --font-body:     -apple-system, BlinkMacSystemFont, "Segoe UI",
                     Helvetica, Arial, sans-serif;

    /* Locks. */
    --lock-locked:   #ffffff;
    --lock-unlocked: #ffffff;
    --lock-unknown:  #ffffff;
    --lock-size:     clamp(36px, 5vw, 60px);

    /* Soil. */
    --soil-wet:      #ffffff;
    --soil-dry:      #ffffff;
    --soil-critical: #ffffff;

    /* Layout. */
    --max-width:     1400px;
    --card-radius:   24px;
    --gap:           24px;
}

/* ------------------------------------------------------------------ */
/* Dark mode — activated when room lights are off at night.           */
/* ------------------------------------------------------------------ */
body.dark-mode {
    --bg:            #000000;
    --clock-color:   rgba(180, 60, 40, 0.5);
    --date-color:    rgba(180, 60, 40, 0.25);
    --card-bg:       rgba(80, 20, 10, 0.08);
    --card-border:   rgba(120, 40, 20, 0.12);
    --card-shadow:   none;
    --temp-color:    rgba(180, 80, 40, 0.5);
    --humid-color:   rgba(140, 60, 50, 0.5);
    --motion-on:     rgba(120, 50, 20, 0.5);
    --motion-off:    rgba(80, 20, 10, 0.15);
    --label-color:   rgba(180, 60, 40, 0.25);
    --text-color:    rgba(180, 60, 40, 0.35);
    --stale-color:   rgba(200, 40, 30, 0.5);
    --lock-locked:   rgba(100, 50, 20, 0.5);
    --lock-unlocked: rgba(140, 30, 20, 0.5);
    --lock-unknown:  rgba(80, 20, 10, 0.15);
    --soil-wet:      rgba(140, 60, 30, 0.5);
    --soil-dry:      rgba(180, 60, 40, 0.4);
    --soil-critical: rgba(200, 40, 30, 0.5);
    /* Uniform dim — cuts emitted light. */
    filter:          brightness(0.7);
}
body.dark-mode .sensor-card,
body.dark-mode .locks-card {
    border-color: rgba(120, 40, 20, 0.12);
}
/* Red-shift hardcoded white text in alerts, soil, moon. */
body.dark-mode .alerts-card .sensor-location,
body.dark-mode .alert-item,
body.dark-mode .alert-item.warning,
body.dark-mode .alert-item.watch,
body.dark-mode .alerts-clear {
    color: rgba(180, 60, 40, 0.5);
}
body.dark-mode .soil-card .sensor-location,
body.dark-mode .soil-moisture-unit,
body.dark-mode .soil-details,
body.dark-mode .soil-name {
    color: rgba(180, 60, 40, 0.35);
}
/* Lock text — override hardcoded #fff. */
body.dark-mode .lock-circle.locked {
    color: rgba(180, 60, 40, 0.6);
    box-shadow: none;
}
body.dark-mode .lock-circle.unlocked {
    box-shadow: none;
}
body.dark-mode .occupancy-badge.home {
    color: rgba(180, 60, 40, 0.6);
}
body.dark-mode .lock-item.battery-critical .lock-circle.locked {
    color: rgba(180, 60, 40, 0.6);
}
/* Red-shift images and canvas (NVR, webcam, moon). */
body.dark-mode .camera-card img,
body.dark-mode .webcam-card img,
body.dark-mode .moon-card canvas {
    filter: sepia(1) saturate(3) hue-rotate(-15deg) brightness(0.4);
}
/* Night layout — hide non-essential tiles, enlarge clock. */
body.dark-mode .clock-ampm,
body.dark-mode #siteNav {
    display: none !important;
}
/* Night layout — only locks, security (doors), and alerts visible. */
body.dark-mode .sensor-card:not(.locks-card):not(.security-card):not(.alerts-card) {
    display: none !important;
}
/* Night layout — single column, full-width tiles. */
body.dark-mode .sensor-grid {
    grid-template-columns: 1fr !important;
}
body.dark-mode .sensor-card {
    aspect-ratio: auto;
    padding: clamp(20px, 4vw, 40px);
}
/* Scale up lock circles and labels. */
body.dark-mode .locks-card {
    --lock-size: clamp(60px, 10vw, 100px);
}
body.dark-mode .lock-circle {
    font-size: clamp(1.2rem, 3vw, 2rem);
}
body.dark-mode .lock-name {
    font-size: clamp(0.8rem, 1.6vw, 1.1rem);
}
/* Scale up alarm state and door labels. */
body.dark-mode .alarm-state {
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
}
body.dark-mode .door-status {
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
}
body.dark-mode .door-name {
    font-size: clamp(0.8rem, 1.6vw, 1.1rem);
}
/* Scale up alert text. */
body.dark-mode .alerts-card .sensor-location {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
}
body.dark-mode .alerts-list {
    font-size: clamp(1rem, 2vw, 1.4rem);
}
body.dark-mode .alerts-clear {
    font-size: clamp(1.4rem, 3vw, 2rem);
}
body.dark-mode .clock-time {
    font-size: clamp(11rem, 30vw, 26rem);
}

/* ------------------------------------------------------------------ */
/* Reset & base                                                       */
/* ------------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-body);
    color: var(--text-color);
    background: var(--bg);
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 32px;
    position: relative;
}

/* Photo background removed — single solid color now. */
}

/* Everything else sits above the photo. */
.content { position: relative; z-index: 1; width: 100%; max-width: var(--max-width); }

/* ------------------------------------------------------------------ */
/* Clock                                                              */
/* ------------------------------------------------------------------ */
.clock-section {
    text-align: center;
    margin-bottom: 48px;
}

.clock-time {
    font-family: var(--font-clock);
    /* Across-room readable: ~6-8 inches on a 24" monitor. */
    font-size: clamp(5.5rem, 15.4vw, 13.2rem);
    font-weight: 200;
    letter-spacing: 0.04em;
    color: var(--clock-color);
    line-height: 1;
}

.clock-ampm {
    margin-left: 8px;
}

.clock-date {
    font-size: clamp(1.32rem, 3.3vw, 2.2rem);
    font-weight: 300;
    color: var(--date-color);
    margin-top: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

/* Portrait (rotated display) — 3-wide grid.
   Wayland compositors with wlr-randr transform may not report
   orientation correctly — JS adds .portrait class as fallback. */
@media (orientation: portrait) {
    .sensor-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    .sensor-card {
        padding: 28px;
        min-height: 180px;
    }
}
/* JS fallback: body.portrait applied when window.innerHeight > innerWidth. */
body.portrait .sensor-grid {
    grid-template-columns: repeat(3, 1fr);
}
body.portrait .sensor-card {
    padding: 28px;
    min-height: 180px;
}

/* ------------------------------------------------------------------ */
/* Sensor grid                                                        */
/* ------------------------------------------------------------------ */
.sensor-grid {
    display: grid;
    /* 4 columns of smaller cards. */
    gap: 12px;
    grid-template-columns: repeat(4, 1fr);
    width: 100%;
}

/* ------------------------------------------------------------------ */
/* Sensor card                                                        */
/* ------------------------------------------------------------------ */
.sensor-card {
    background: var(--card-bg);
    border: 2px solid black;
    border-radius: var(--card-radius);
    padding: 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    /* Square card. */
    aspect-ratio: 1;
    /* Top-align so titles sit at the same height across cards. */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: clamp(20px, 4vw, 40px);
    overflow: hidden;
}

.sensor-card.error-state {
    border-color: var(--stale-color);
    opacity: 0.7;
}
.sensor-card.error-state .reading-temp,
.sensor-card.error-state .reading-humid {
    color: var(--stale-color);
}
.sensor-error {
    font-size: 0.8rem;
    color: var(--stale-color);
    margin-top: 4px;
    font-style: italic;
}

.sensor-location {
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-color);
    margin-bottom: 2px;
}

.sensor-label {
    font-size: clamp(0.75rem, 1.4vw, 1.1rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--label-color);
    margin-bottom: 12px;
}

/* Main temperature reading — big and warm, across-room readable. */
.reading-temp {
    font-family: var(--font-clock);
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 300;
    color: var(--temp-color);
    line-height: 1;
    margin-bottom: 4px;
}
.reading-temp .unit {
    font-size: 0.5em;
    opacity: 0.5;
    vertical-align: super;
}

/* Secondary readings row. */
.reading-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
}

.reading-humid {
    font-family: var(--font-clock);
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 400;
    color: var(--humid-color);
}
.reading-humid .icon {
    font-size: 0.85em;
    margin-right: 4px;
}
.reading-humid .unit {
    font-size: 0.75em;
    opacity: 0.5;
}

/* Motion indicator — pulsing dot. */
.motion-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(1rem, 2vw, 1.6rem);
    color: var(--motion-off);
    transition: color 0.4s ease;
}
.motion-indicator.active { color: var(--motion-on); }

.motion-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--motion-off);
    transition: background 0.4s ease, box-shadow 0.4s ease;
}
.motion-indicator.active .motion-dot {
    background: var(--motion-on);
    box-shadow: 0 0 10px rgba(61, 170, 109, 0.4), 0 0 20px rgba(61, 170, 109, 0.2);
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(61, 170, 109, 0.4), 0 0 20px rgba(61, 170, 109, 0.2); }
    50%      { box-shadow: 0 0 16px rgba(61, 170, 109, 0.6), 0 0 32px rgba(61, 170, 109, 0.3); }
}

/* Staleness warning. */
.reading-stale {
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    color: var(--stale-color);
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.4s ease;
}
.reading-stale.visible { opacity: 1; }

/* Last-update timestamp. */
.reading-updated {
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: var(--label-color);
    opacity: 0.6;
    margin-top: 8px;
}

/* ------------------------------------------------------------------ */
/* Photo card                                                         */
/* ------------------------------------------------------------------ */
.photo-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    overflow: hidden;
    box-shadow: var(--card-shadow);
    position: relative;
    min-height: 200px;
}

.photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 2s ease;
}
.photo-card img.fading { opacity: 0; }

/* ------------------------------------------------------------------ */
/* No-data state                                                      */
/* ------------------------------------------------------------------ */
.no-data {
    text-align: center;
    color: var(--label-color);
    font-size: 1.1rem;
    padding: 60px 20px;
    grid-column: 1 / -1;
}

/* ------------------------------------------------------------------ */
/* Locks card                                                         */
/* ------------------------------------------------------------------ */
.locks-card {
    text-align: center;
}
/* Lock circles fill the space below the title. */
.locks-card .locks-row {
    flex: 1;
    display: flex;
    align-items: center;
}

.locks-title {
    /* Match .sensor-location styling (e.g., "Living Room"). */
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-color);
    margin-bottom: 8px;
}

.locks-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(8px, 2vw, 20px);
    flex-wrap: wrap;
}

.lock-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
}

.lock-circle {
    width: var(--lock-size);
    height: var(--lock-size);
    border-radius: 50%;
    border: 2px solid var(--lock-unknown);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-clock);
    font-size: clamp(0.8rem, 2vw, 1.4rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--lock-unknown);
    transition: background 0.4s ease, border-color 0.4s ease,
                color 0.4s ease, box-shadow 0.4s ease;
}

/* Locked = filled green circle, white text. */
.lock-circle.locked {
    background: var(--lock-locked);
    border-color: var(--lock-locked);
    color: #fff;
    box-shadow: 0 0 12px rgba(61, 170, 109, 0.3);
}

/* Unlocked = hollow red circle, red text. */
.lock-circle.unlocked {
    background: transparent;
    border-color: var(--lock-unlocked);
    color: var(--lock-unlocked);
    box-shadow: 0 0 12px rgba(204, 68, 68, 0.25);
}

.lock-battery {
    font-size: 0.6rem;
    color: var(--label-color);
    margin-top: 1px;
}
.lock-battery.low {
    color: var(--lock-unlocked);
    animation: blink-3-1 2s step-end infinite;
}

/* Critical battery — whole lock-item blinks. */
.lock-item.battery-critical .lock-circle,
.lock-item.battery-critical .lock-name,
.lock-item.battery-critical .lock-battery {
    color: var(--lock-unlocked);
    border-color: var(--lock-unlocked);
    animation: blink-3-1 2s step-end infinite;
}
.lock-item.battery-critical .lock-circle.locked {
    background: var(--lock-unlocked);
    color: #fff;
}

/* 3:1 duty cycle blink — visible 75%, hidden 25%. */
@keyframes blink-3-1 {
    0%, 75%  { opacity: 1; }
    75.01%, 100% { opacity: 0; }
}
.occupancy-badge {
    font-size: 0.8rem;
    padding: 2px 10px;
    border-radius: 12px;
    display: inline-block;
    margin-bottom: 8px;
    font-weight: 600;
}
.occupancy-badge.home {
    background: var(--lock-locked);
    color: #fff;
}
.occupancy-badge.away {
    background: var(--lock-unknown);
    color: var(--label-color);
}

.lock-name {
    font-size: clamp(0.55rem, 1vw, 0.75rem);
    font-weight: 400;
    color: var(--label-color);
    letter-spacing: 0.06em;
    text-transform: uppercase;
}

/* Stale lock — data age exceeds threshold, state untrustworthy. */
.lock-circle.stale {
    border-color: var(--stale-color);
    color: var(--stale-color);
    background: transparent;
    box-shadow: none;
    animation: lock-stale-pulse 2s ease-in-out infinite;
}
@keyframes lock-stale-pulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
}
.lock-stale-label {
    font-size: clamp(0.55rem, 1vw, 0.75rem);
    color: var(--stale-color);
    margin-top: 2px;
}

/* ------------------------------------------------------------------ */
/* Security card — alarm state + door contacts                        */
/* ------------------------------------------------------------------ */
.security-card {
    text-align: center;
}

.alarm-state {
    font-size: clamp(1rem, 2.2vw, 1.6rem);
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 6px 0;
    margin-bottom: 8px;
    border-radius: 8px;
}
.alarm-state.disarmed     { color: var(--lock-unlocked); }
.alarm-state.armed_stay   { color: var(--lock-locked); }
.alarm-state.armed_away   { color: var(--humid-color); }
.alarm-state.unknown      { color: var(--lock-unknown); }

.doors-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    flex: 1;
    align-content: center;
}

.door-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

.door-status {
    font-family: var(--font-clock);
    font-size: clamp(1rem, 2.2vw, 1.6rem);
    font-weight: 600;
}
.door-status.closed { color: var(--lock-locked); }
.door-status.open   { color: var(--lock-unlocked); }

.door-name {
    font-size: clamp(0.55rem, 1vw, 0.75rem);
    color: var(--label-color);
    letter-spacing: 0.06em;
    text-transform: uppercase;
}

.door-battery {
    font-size: 0.55rem;
    color: var(--label-color);
}
.door-battery.low {
    color: var(--lock-unlocked);
    animation: blink-3-1 2s step-end infinite;
}

/* ------------------------------------------------------------------ */
/* Weather card — Open-Meteo                                          */
/* ------------------------------------------------------------------ */
.weather-card {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.weather-icon {
    font-size: clamp(2.5rem, 6vw, 4rem);
    line-height: 1;
    margin-bottom: 4px;
}
.weather-temp {
    font-family: var(--font-clock);
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 200;
    color: var(--clock-color);
    line-height: 1.1;
}
.weather-details {
    font-size: clamp(0.75rem, 1.4vw, 1.1rem);
    color: var(--label-color);
    margin-top: 6px;
    line-height: 1.4;
}

/* ------------------------------------------------------------------ */
/* Air quality card                                                   */
/* ------------------------------------------------------------------ */
.aqi-card {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.aqi-value {
    font-family: var(--font-clock);
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 200;
    line-height: 1.1;
}
.aqi-label {
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 600;
    margin-top: 2px;
}
.aqi-details {
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: var(--label-color);
    margin-top: 6px;
    line-height: 1.4;
}
/* AQI color coding. */
.aqi-good       { color: #ffffff; }
.aqi-moderate   { color: #ffffff; }
.aqi-sensitive  { color: #ffffff; }
.aqi-unhealthy  { color: #ffffff; }
.aqi-very-bad   { color: #ffffff; }
.aqi-hazardous  { color: #ffffff; }

/* ------------------------------------------------------------------ */
/* System health scroller                                             */
/* ------------------------------------------------------------------ */
.health-card {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}
.health-scroll {
    display: flex;
    flex-direction: column;
    gap: 1px;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: none;
}
.health-scroll::-webkit-scrollbar { display: none; }
.health-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: clamp(0.9rem, 1.7vw, 1.2rem);
    padding: 2px 0;
    line-height: 1.4;
}
.health-name {
    color: var(--label-color);
    opacity: 0.8;
}
.health-ok {
    color: #66bb6a;
    font-weight: 600;
}
.health-bad {
    color: #ef5350;
    font-weight: 600;
}
.health-summary {
    font-size: clamp(0.8rem, 1.5vw, 1.05rem);
    color: var(--label-color);
    opacity: 0.6;
    margin-top: 2px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 2px;
}

/* ------------------------------------------------------------------ */
/* NWS alerts card                                                    */
/* ------------------------------------------------------------------ */
.alerts-card {
    display: flex;
    flex-direction: column;
}
.alerts-card .sensor-location {
    color: #ffffff;
}
.alerts-card.has-alerts .sensor-location {
    color: #ffffff;
    animation: blink-3-1 2s step-end infinite;
}
.alerts-list {
    font-size: clamp(0.7rem, 1.3vw, 1rem);
    color: var(--label-color);
    line-height: 1.5;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.alert-item {
    margin-bottom: 6px;
    color: #ffffff;
}
.alert-item.warning { color: #ffffff; }
.alert-item.watch   { color: #ffffff; }
.alerts-clear {
    color: #ffffff;
    font-size: clamp(1rem, 2vw, 1.4rem);
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ------------------------------------------------------------------ */
/* Camera card — cycles through NVR snapshots                         */
/* ------------------------------------------------------------------ */
.camera-card {
    padding: 0;
    overflow: hidden;
    position: relative;
}
.camera-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.camera-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 4px 8px;
    background: rgba(0, 0, 0, 0.5);
    color: #fff;
    font-size: clamp(0.6rem, 1.2vw, 0.85rem);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
}

/* ------------------------------------------------------------------ */
/* Battery alert card — low battery warnings across all Vivint devices */
/* ------------------------------------------------------------------ */
/* Printer alert card — shown only when printer needs attention. */
.printer-alert-card {
    text-align: center;
    aspect-ratio: auto;
}
.printer-alert-card .sensor-location {
    color: var(--stale-color);
}
.printer-alerts-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
}
.printer-alert-item {
    font-size: clamp(0.7rem, 1.4vw, 1rem);
    color: var(--stale-color);
    animation: blink-3-1 2s step-end infinite;
}

.battery-alert-card {
    text-align: center;
    aspect-ratio: auto;
}
.battery-alert-card .sensor-location {
    color: var(--lock-unlocked);
}
.battery-alerts-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
}
.battery-alert-item {
    font-size: clamp(0.7rem, 1.4vw, 1rem);
    color: var(--lock-unlocked);
    animation: blink-3-1 2s step-end infinite;
}
.battery-alert-item .batt-pct {
    font-weight: 700;
}

/* ------------------------------------------------------------------ */
/* Soil moisture card — compact, scrolls through sensors              */
/* ------------------------------------------------------------------ */
.soil-card {
    text-align: center;
    aspect-ratio: 1 / 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(16px, 3vw, 32px);
}
.soil-card .sensor-location {
    color: var(--soil-wet);
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 600;
    margin-bottom: clamp(8px, 2vw, 16px);
}
.soil-reading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(2px, 0.5vw, 6px);
    flex: 1;
    justify-content: center;
}
.soil-name {
    font-size: clamp(0.85rem, 1.8vw, 1.2rem);
    color: var(--label-color);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.soil-moisture-value {
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 700;
    font-family: var(--font-clock);
    line-height: 1;
}
.soil-moisture-unit {
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    color: var(--label-color);
}
.soil-details {
    font-size: clamp(0.75rem, 1.3vw, 1rem);
    color: var(--label-color);
    margin-top: clamp(6px, 1vw, 12px);
}
.soil-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: clamp(8px, 1.5vw, 16px);
}
.soil-dot {
    width: clamp(6px, 1vw, 10px);
    height: clamp(6px, 1vw, 10px);
    border-radius: 50%;
    background: var(--label-color);
    opacity: 0.3;
}
.soil-dot.active {
    opacity: 1.0;
    background: var(--soil-wet);
}

/* ------------------------------------------------------------------ */
/* Moon phase card                                                    */
/* ------------------------------------------------------------------ */
.moon-card {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.moon-card canvas {
    margin-bottom: 6px;
}
.moon-name {
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 600;
    color: var(--clock-color);
}
.moon-details {
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: var(--label-color);
    margin-top: 4px;
    line-height: 1.4;
}

/* ------------------------------------------------------------------ */
/* Webcam card — external JPEG feeds with resilient fallback          */
/* ------------------------------------------------------------------ */
.webcam-card {
    padding: 0;
    overflow: hidden;
    position: relative;
}
.webcam-card img {
    width: 100%;
    height: auto;
    display: block;
}
.webcam-label {
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-size: clamp(0.6rem, 1vw, 0.85rem);
    color: rgba(255, 255, 255, 0.6);
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    letter-spacing: 0.06em;
}
/* Span sizes: 1x1 (default), 2x1, 3x1. */
.webcam-span-2 { grid-column: span 2; }
.webcam-span-3 { grid-column: span 3; }

/* ------------------------------------------------------------------ */
/* Responsive tweaks                                                  */
/* ------------------------------------------------------------------ */
@media (max-width: 600px) {
    body { padding: 20px 16px 16px; }
    .clock-section { margin-bottom: 16px; }
    .sensor-card { padding: 16px; }
    .sensor-grid { gap: 8px; }
}

@media (max-height: 700px) {
    .clock-section { margin-bottom: 16px; }
    .clock-time { font-size: clamp(3rem, 10vw, 7rem); }
    .sensor-card { padding: 16px; }
}

/* ------------------------------------------------------------------ */
/* Footer                                                              */
/* ------------------------------------------------------------------ */
.footer {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-color);
    opacity: 0.6;
    letter-spacing: 0.04em;
    z-index: 1;
}
.footer a {
    color: var(--text-color);
    text-decoration: underline;
}
</style>
</head>
<body>

<!-- Site nav — built dynamically from /api/config/nav. Hidden in night mode. -->
<nav id="siteNav" style="display:flex;gap:18px;padding:6px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:0.8rem;letter-spacing:0.04em;"></nav>
<script src="/js/site_nav.js" defer></script>

<div class="content">
    <!-- Clock. -->
    <div class="clock-section">

        <div class="clock-date" id="clockDate"></div>
    </div>

    <!-- Status cards — populated dynamically. -->
    <div class="sensor-grid" id="sensorGrid">
        <!-- Lock card — always first in the grid. -->

            <div class="locks-title">Locks</div>

        </div>
        <!-- Security card — alarm state + door contacts. -->
        <div class="security-card sensor-card" id="securityCard">

        <!-- Camera card — cycles through NVR snapshots. -->

        <!-- Battery alert card — shown only when low batteries exist. -->

        </div>
        <!-- Printer alert card — shown only when printer needs attention. -->

            <div class="sensor-location">Printer</div>
            <div class="printer-alerts-list" id="printerAlertsList"></div>
        </div>
        <!-- Weather card — Open-Meteo, no API key. -->

        <!-- Air quality + pollen card — Open-Meteo AQI. -->

            <div class="sensor-location">Air Quality</div>

            <div class="aqi-details" id="aqiDetails"></div>

        <!-- System health scroller — polls /api/status. -->
        <div class="health-card sensor-card" id="healthCard" style="display:none">

        </div>
        <!-- NWS severe weather alerts. -->
        <div class="alerts-card sensor-card" id="alertsCard" style="display:none">
            <div class="sensor-location" id="alertsTitle">Alerts</div>

        <!-- Soil moisture card — scrolls through all soil sensors. -->

        </div>
        <!-- Moon phase — pure math, canvas-drawn. -->
        <div class="moon-card sensor-card" id="moonCard">
            <div class="sensor-location">Moon</div>

        </div>
        <!-- Fairhope Pier webcam — YouTube live thumbnail. -->

            <img id="fairhopeImg" alt="Fairhope Pier">

        </div>
        <div class="no-data" id="noData">Waiting for sensor data&hellip;</div>

</div>

<script>
/* ================================================================== */
/* GlowUp Home Display                                                */
/* Display-only dashboard: clock, sensors, photos.                    */
/* No controls, no buttons — pure ambient information.                */
/*                                                                    */
/* __version__ = "2.0.0"                                              */
/* ================================================================== */

(function () {
    "use strict";

    /* -------------------------------------------------------------- */
    /* Constants                                                      */
    /* -------------------------------------------------------------- */

    /* How often to poll sensor data (ms). */
    const SENSOR_POLL_MS = 5000;

    /* Seconds before a sensor reading is considered stale. */
    const STALE_THRESHOLD_S = 120;

    const DAYS = [
        "Sunday", "Monday", "Tuesday", "Wednesday",
        "Thursday", "Friday", "Saturday"
    ];
    const MONTHS = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];

    /* -------------------------------------------------------------- */
    /* State                                                          */
    /* -------------------------------------------------------------- */


    /* -------------------------------------------------------------- */
    /* Clock                                                          */
    /* -------------------------------------------------------------- */

    /* Portrait detection — Wayland wlr-randr rotation may not trigger
       CSS orientation: portrait, so detect via JS and add class. */
    function checkPortrait() {
        document.body.classList.toggle("portrait",
            window.innerHeight > window.innerWidth);
    }
    checkPortrait();
    window.addEventListener("resize", checkPortrait);

    const clockTimeEl = document.getElementById("clockTime");
    const clockDateEl = document.getElementById("clockDate");

    function updateClock() {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, "0");
        const s = String(now.getSeconds()).padStart(2, "0");

        /* 12-hour format. */
        const ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;

        clockTimeEl.innerHTML =
            h + ":" + m +
            '<span class="clock-ampm">' + ampm + "</span>";

        const day = DAYS[now.getDay()];
        const month = MONTHS[now.getMonth()];
        const date = now.getDate();
        const year = now.getFullYear();
        clockDateEl.textContent = day + ", " + month + " " + date + ", " + year;
    }

    updateClock();
    setInterval(updateClock, 1000);

    /* -------------------------------------------------------------- */
    /* Fullscreen — append ?fullscreen=1 to enter Fullscreen API.     */
    /* -------------------------------------------------------------- */

    if (new URLSearchParams(window.location.search).get("fullscreen") === "1") {
        document.addEventListener("click", function requestFS() {
            var el = document.documentElement;
            var rfs = el.requestFullscreen || el.webkitRequestFullscreen;
            if (rfs) rfs.call(el);
            document.removeEventListener("click", requestFS);
        }, { once: true });
    }

    /* -------------------------------------------------------------- */
    /* Dark mode                                                      */
    /* -------------------------------------------------------------- */

    function pollMode() {
        fetch("/api/home/mode")
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.error) return;
                document.body.classList.toggle("dark-mode", !!data.dark);
            })
            .catch(function () { /* leave as-is */ });
    }

    pollMode();
    setInterval(pollMode, SENSOR_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Sensor cards                                                   */
    /* -------------------------------------------------------------- */

    const sensorGrid = document.getElementById("sensorGrid");
    const noDataEl = document.getElementById("noData");

    /** Convert Celsius to Fahrenheit. */
    function cToF(c) {
        return (c * 9 / 5) + 32;
    }

    /** Format a sensor label for display. */
    function formatLabel(label) {
        return label
            .replace(/_/g, " ")
            .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    /** Build or update the sensor card for a given label. */
    function renderSensorCard(label, data) {
        let card = document.getElementById("sensor-" + label);
        const isNew = !card;

        if (isNew) {
            card = document.createElement("div");
            card.className = "sensor-card";
            card.id = "sensor-" + label;
            card.innerHTML =
                '<div class="sensor-location"></div>' +
                '<div class="sensor-label"></div>' +
                '<div class="reading-temp"></div>' +
                '<div class="reading-row">' +
                '  <div class="reading-humid"></div>' +
                '  <div class="motion-indicator">' +
                '    <div class="motion-dot"></div>' +
                '    <span class="motion-text"></span>' +
                '  </div>' +
                "</div>" +
                '<div class="reading-stale"></div>' +
                '<div class="reading-updated"></div>';
        }

        /* Location is the primary label; sensor name is the subtitle. */
        var locationEl = card.querySelector(".sensor-location");
        var labelEl = card.querySelector(".sensor-label");
        if (data.location) {
            locationEl.textContent = data.location;
            locationEl.style.display = "";
            labelEl.textContent = formatLabel(label);
        } else {
            /* No location configured — promote sensor name to primary. */
            locationEl.style.display = "none";
            labelEl.textContent = formatLabel(label);
        }

        /* Temperature in Fahrenheit. */
        const tempEl = card.querySelector(".reading-temp");
        if (data.temperature != null) {
            const f = cToF(data.temperature);
            tempEl.innerHTML =
                f.toFixed(1) + '<span class="unit">&deg;F</span>';
        } else {
            tempEl.innerHTML = '&mdash;<span class="unit">&deg;F</span>';
        }

        /* Humidity. */
        const humidEl = card.querySelector(".reading-humid");
        if (data.humidity != null) {
            humidEl.innerHTML =
                data.humidity.toFixed(0) + '<span class="unit">%</span>';
        } else {
            humidEl.innerHTML = '&mdash;<span class="unit">%</span>';
        }

        /* Motion. */
        const motionEl = card.querySelector(".motion-indicator");
        const motionText = card.querySelector(".motion-text");
        const motionActive = data.motion === 1;
        motionEl.classList.toggle("active", motionActive);
        motionText.textContent = motionActive ? "Motion" : "Clear";

        /* Staleness check. */
        const staleEl = card.querySelector(".reading-stale");
        if (data.last_update) {
            const age = Date.now() / 1000 - data.last_update;
            if (age > STALE_THRESHOLD_S) {
                const mins = Math.floor(age / 60);
                staleEl.textContent = "No update for " + mins + " min";
                staleEl.classList.add("visible");
            } else {
                staleEl.classList.remove("visible");
            }

            const updatedEl = card.querySelector(".reading-updated");
            const dt = new Date(data.last_update * 1000);
            var updatedText = "Updated " + dt.toLocaleTimeString();

            /* Watchdog countdown — shows time remaining until off-action. */
            if (data.watchdog && data.watchdog.last_trigger > 0) {
                var wd = data.watchdog;
                var timeoutSec = wd.timeout_minutes * 60;
                var elapsed = Date.now() / 1000 - wd.last_trigger;
                var remaining = timeoutSec - elapsed;
                var absMin = Math.floor(Math.abs(remaining) / 60);
                var absSec = Math.floor(Math.abs(remaining) % 60);
                var pad = absSec < 10 ? "0" : "";
                if (remaining >= 0) {
                    updatedText += "  \u23f1 " + absMin + ":" + pad + absSec;
                } else {
                    updatedText += "  \u23f1 \u2212" + absMin + ":" + pad + absSec + " OVERDUE";
                }
            }

            updatedEl.textContent = updatedText;
        }

        if (isNew) {
            sensorGrid.appendChild(card);
        }
    }

    /** Mark all existing sensor cards as errored. */
    function markSensorError(msg) {
        var cards = sensorGrid.querySelectorAll('[id^="sensor-"]');
        cards.forEach(function (card) {
            card.classList.add("error-state");
            var errEl = card.querySelector(".sensor-error");
            if (!errEl) {
                errEl = document.createElement("div");
                errEl.className = "sensor-error";
                card.appendChild(errEl);
            }
            errEl.textContent = msg;
        });
    }

    /** Clear error state from all sensor cards. */
    function clearSensorError() {
        var cards = sensorGrid.querySelectorAll('[id^="sensor-"]');
        cards.forEach(function (card) {
            card.classList.remove("error-state");
            var errEl = card.querySelector(".sensor-error");
            if (errEl) errEl.textContent = "";
        });
    }

    /** Fetch sensor data and update all cards. */
    function pollSensors() {
        fetch("/api/ble/sensors")
            .then(function (r) {
                if (!r.ok) {
                    return r.json().then(function (body) {
                        markSensorError(
                            "API error " + r.status + ": " +
                            (body.error || "unknown")
                        );
                        return null;
                    });
                }
                return r.json();
            })
            .then(function (sensors) {
                if (!sensors) return;

                if (sensors.error) {
                    markSensorError(sensors.error);
                    return;
                }

                clearSensorError();

                const labels = Object.keys(sensors);
                if (labels.length === 0) {
                    noDataEl.style.display = "";
                    return;
                }
                noDataEl.style.display = "none";

                labels.forEach(function (label) {
                    renderSensorCard(label, sensors[label]);
                });

                /* Remove cards for sensors that disappeared. */
                var existingCards = sensorGrid.querySelectorAll(
                    '[id^="sensor-"]'
                );
                existingCards.forEach(function (el) {
                    var id = el.id.replace("sensor-", "");
                    if (labels.indexOf(id) === -1) {
                        el.remove();
                    }
                });
            })
            .catch(function (err) {
                markSensorError("Offline: " + (err.message || "network error"));
            });
    }

    pollSensors();
    setInterval(pollSensors, SENSOR_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Locks                                                          */
    /* -------------------------------------------------------------- */

    const locksCard = document.getElementById("locksCard");
    const locksRow = document.getElementById("locksRow");

    var occupancyBadge = document.getElementById("occupancyBadge");

    /** Render lock circles with battery from API data. */
    function renderLocks(locks) {
        /* locks: [{abbr, name, locked, battery, updated_at}, ...] */
        if (!locks || locks.length === 0) {
            locksRow.innerHTML = "";
            return;
        }
        locksRow.innerHTML = "";

        var nowSec = Date.now() / 1000;

        locks.forEach(function (lock) {
            var item = document.createElement("div");
            item.className = "lock-item";

            /* Staleness check — same threshold as sensors. */
            var stale = false;
            var staleMins = 0;
            if (lock.updated_at) {
                var age = nowSec - lock.updated_at;
                if (age > STALE_THRESHOLD_S) {
                    stale = true;
                    staleMins = Math.floor(age / 60);
                }
            }

            var circle = document.createElement("div");
            circle.className = "lock-circle";
            if (stale) {
                /* Stale overrides lock/unlock color — data is untrustworthy. */
                circle.classList.add("stale");
            } else if (lock.locked === true) {
                circle.classList.add("locked");
            } else if (lock.locked === false) {
                circle.classList.add("unlocked");
            }
            circle.textContent = lock.abbr || "?";

            var name = document.createElement("div");
            name.className = "lock-name";
            name.textContent = lock.name || "";

            item.appendChild(circle);
            item.appendChild(name);

            /* Battery indicator below name. */
            if (lock.battery != null) {
                var batt = document.createElement("div");
                batt.className = "lock-battery";
                if (lock.battery <= 10) batt.classList.add("low");
                if (lock.battery <= 5) item.classList.add("battery-critical");
                batt.textContent = lock.battery + "%";
                item.appendChild(batt);
            }

            /* Stale warning below battery/name. */
            if (stale) {
                var staleEl = document.createElement("div");
                staleEl.className = "lock-stale-label";
                staleEl.textContent = "Stale " + staleMins + "m";
                item.appendChild(staleEl);
            }

            locksRow.appendChild(item);
        });
    }

    /** Update occupancy badge. */
    function renderOccupancy(state) {
        if (!state || state === "UNKNOWN") {
            occupancyBadge.style.display = "none";
            return;
        }
        occupancyBadge.style.display = "inline-block";
        occupancyBadge.textContent = state;
        occupancyBadge.className = "occupancy-badge " + state.toLowerCase();
    }

    function pollLocks() {
        fetch("/api/home/locks")
            .then(function (r) {
                if (!r.ok) {
                    locksCard.classList.add("error-state");
                    return null;
                }
                return r.json();
            })
            .then(function (data) {
                if (!data) return;
                if (data.error) return;
                locksCard.classList.remove("error-state");
                renderLocks(data.locks || []);
                renderOccupancy(data.occupancy || "UNKNOWN");
            })
            .catch(function () {
                locksCard.classList.add("error-state");
            });
    }

    pollLocks();
    setInterval(pollLocks, SENSOR_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Security — alarm state + door contacts                         */
    /* -------------------------------------------------------------- */

    var alarmStateEl = document.getElementById("alarmState");
    var doorsRowEl = document.getElementById("doorsRow");
    var securityCard = document.getElementById("securityCard");

    var ALARM_LABELS = {
        "disarmed":   "Disarmed",
        "armed_stay": "Armed Stay",
        "armed_away": "Armed Away",
        "unknown":    "Unknown"
    };

    function renderAlarm(state) {
        var label = ALARM_LABELS[state] || state;
        alarmStateEl.textContent = label;
        alarmStateEl.className = "alarm-state " + (state || "unknown");
    }

    function renderDoors(doors) {
        doorsRowEl.innerHTML = "";
        if (!doors || doors.length === 0) return;

        doors.forEach(function (door) {
            var item = document.createElement("div");
            item.className = "door-item";

            var status = document.createElement("div");
            status.className = "door-status " + (door.open ? "open" : "closed");
            status.textContent = door.open ? "OPEN" : "CLOSED";

            var name = document.createElement("div");
            name.className = "door-name";
            name.textContent = door.name || "";

            item.appendChild(status);
            item.appendChild(name);

            if (door.battery != null) {
                var batt = document.createElement("div");
                batt.className = "door-battery";
                if (door.battery <= 10) batt.classList.add("low");
                batt.textContent = door.battery + "%";
                item.appendChild(batt);
            }

            doorsRowEl.appendChild(item);
        });
    }

    /* Low battery threshold (percent). */
    var LOW_BATTERY_THRESHOLD = 20;

    var batteryAlertCard = document.getElementById("batteryAlertCard");
    var batteryAlertsList = document.getElementById("batteryAlertsList");

    function renderBatteryAlerts(sensors) {
        var alerts = [];
        Object.keys(sensors).forEach(function (key) {
            var s = sensors[key];
            if (s.battery != null && s.battery <= LOW_BATTERY_THRESHOLD) {
                alerts.push({ name: s.name || key, battery: s.battery });
            }
        });

        if (alerts.length === 0) {
            batteryAlertCard.style.display = "none";
            return;
        }

        batteryAlertCard.style.display = "";
        batteryAlertsList.innerHTML = "";
        alerts.sort(function (a, b) { return a.battery - b.battery; });
        alerts.forEach(function (a) {
            var item = document.createElement("div");
            item.className = "battery-alert-item";
            item.innerHTML = a.name + ' <span class="batt-pct">' + a.battery + '%</span>';
            batteryAlertsList.appendChild(item);
        });
    }

    function pollSecurity() {
        fetch("/api/home/security")
            .then(function (r) {
                if (!r.ok) return null;
                return r.json();
            })
            .then(function (data) {
                if (!data) return;
                if (data.error) return;
                renderAlarm(data.alarm || "unknown");
                renderDoors(data.doors || []);
                renderBatteryAlerts(data.sensors || {});
            })
            .catch(function () {
                securityCard.classList.add("error-state");
            });
    }

    pollSecurity();
    setInterval(pollSecurity, SENSOR_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Printer alert — shown only when printer needs attention         */
    /* -------------------------------------------------------------- */

    var printerAlertCard = document.getElementById("printerAlertCard");
    var printerAlertsList = document.getElementById("printerAlertsList");

    /* Human-readable labels for printer alert codes. */
    var PRINTER_ALERT_LABELS = {
        "toner_low": "Toner Low",
        "no_paper": "Out of Paper",
        "jam": "Paper Jam",
        "cover_open": "Cover Open",
        "drum_low": "Drum Low",
        "error": "Error",
        "offline": "Offline"
    };

    /* Poll every 5 minutes — the adapter only polls the printer once
       per day, so frequent fetches are cheap (cached on server). */
    var PRINTER_POLL_MS = 300000;

    function pollPrinter() {
        fetch("/api/home/printer")
            .then(function (r) {
                if (!r.ok) return null;
                return r.json();
            })
            .then(function (data) {
                if (!data) return;
                var alerts = data.alerts || [];
                if (alerts.length === 0 || data.status === "ok" || data.status === "unconfigured") {
                    printerAlertCard.style.display = "none";
                    return;
                }
                printerAlertCard.style.display = "";
                printerAlertsList.innerHTML = "";
                alerts.forEach(function (code) {
                    var item = document.createElement("div");
                    item.className = "printer-alert-item";
                    item.textContent = PRINTER_ALERT_LABELS[code] || code;
                    printerAlertsList.appendChild(item);
                });
            })
            .catch(function () {});
    }

    pollPrinter();
    setInterval(pollPrinter, PRINTER_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Soil moisture — scrolls through all soil sensors               */
    /* -------------------------------------------------------------- */

    var soilCard = document.getElementById("soilCard");
    var soilReading = document.getElementById("soilReading");
    var soilDots = document.getElementById("soilDots");
    var soilSensors = [];
    var soilIndex = 0;

    /* Cycle through sensors every 4 seconds. */
    var SOIL_CYCLE_MS = 4000;

    /* Color based on moisture level. */
    function soilColor(pct) {
        if (pct >= 40) return "var(--soil-wet)";
        if (pct >= 20) return "var(--soil-dry)";
        return "var(--soil-critical)";
    }

    function renderSoilSensor(idx) {
        if (soilSensors.length === 0) {
            soilCard.style.display = "none";
            return;
        }
        soilCard.style.display = "";
        var s = soilSensors[idx % soilSensors.length];
        var moisture = s.soil_moisture != null ? Math.round(s.soil_moisture) : "--";
        var batt = s.battery != null ? Math.round(s.battery) : "--";
        var temp = s.temperature != null ? cToF(s.temperature).toFixed(1) : "--";
        var name = (s.name || "").replace(/_/g, " ");
        var color = moisture !== "--" ? soilColor(moisture) : "var(--label-color)";

        soilReading.innerHTML =
            '<div class="soil-name">' + name + '</div>' +
            '<div class="soil-moisture-value" style="color:' + color + '">' + moisture + '</div>' +
            '<div class="soil-moisture-unit">% moisture</div>' +
            '<div class="soil-details">\u{1F321}\u{FE0F} ' + temp + '\u{00B0}F &nbsp; \u{1F50B} ' + batt + '%</div>';

        /* Navigation dots — only if multiple sensors. */
        if (soilSensors.length > 1) {
            soilDots.innerHTML = "";
            for (var i = 0; i < soilSensors.length; i++) {
                var dot = document.createElement("div");
                dot.className = "soil-dot" + (i === idx % soilSensors.length ? " active" : "");
                soilDots.appendChild(dot);
            }
            soilDots.style.display = "";
        } else {
            soilDots.style.display = "none";
        }
    }

    function pollSoil() {
        fetch("/api/home/soil")
            .then(function (r) {
                if (!r.ok) return null;
                return r.json();
            })
            .then(function (data) {
                if (!data) return;
                soilSensors = data.sensors || [];
                renderSoilSensor(soilIndex);
            })
            .catch(function () {});
    }

    function cycleSoil() {
        if (soilSensors.length > 1) {
            soilIndex = (soilIndex + 1) % soilSensors.length;
            renderSoilSensor(soilIndex);
        }
    }

    pollSoil();
    setInterval(pollSoil, SENSOR_POLL_MS);
    setInterval(cycleSoil, SOIL_CYCLE_MS);

    /* -------------------------------------------------------------- */
    /* Weather — Open-Meteo (free, no API key)                        */
    /* -------------------------------------------------------------- */

    var weatherCard = document.getElementById("weatherCard");
    var weatherIcon = document.getElementById("weatherIcon");
    var weatherTemp = document.getElementById("weatherTemp");
    var weatherDetails = document.getElementById("weatherDetails");

    /* WMO weather code → description + icon. */
    var WMO_CODES = {
        0: ["Clear", "\u2600\uFE0F"],
        1: ["Mostly Clear", "\u{1F324}\uFE0F"],
        2: ["Partly Cloudy", "\u26C5"],
        3: ["Overcast", "\u2601\uFE0F"],
        45: ["Fog", "\u{1F32B}\uFE0F"],
        48: ["Rime Fog", "\u{1F32B}\uFE0F"],
        51: ["Light Drizzle", "\u{1F326}\uFE0F"],
        53: ["Drizzle", "\u{1F326}\uFE0F"],
        55: ["Heavy Drizzle", "\u{1F326}\uFE0F"],
        61: ["Light Rain", "\u{1F327}\uFE0F"],
        63: ["Rain", "\u{1F327}\uFE0F"],
        65: ["Heavy Rain", "\u{1F327}\uFE0F"],
        71: ["Light Snow", "\u{1F328}\uFE0F"],
        73: ["Snow", "\u{1F328}\uFE0F"],
        75: ["Heavy Snow", "\u{1F328}\uFE0F"],
        80: ["Light Showers", "\u{1F326}\uFE0F"],
        81: ["Showers", "\u{1F327}\uFE0F"],
        82: ["Heavy Showers", "\u{1F327}\uFE0F"],
        95: ["Thunderstorm", "\u26C8\uFE0F"],
        96: ["Thunderstorm + Hail", "\u26C8\uFE0F"],
        99: ["Heavy Thunderstorm", "\u26C8\uFE0F"]
    };

    /* Poll interval: 15 minutes (weather doesn't change fast). */
    var WEATHER_POLL_MS = 900000;

    /* Mobile, AL coordinates. */
    var WEATHER_URL = "https://api.open-meteo.com/v1/forecast" +
        "?latitude=30.69&longitude=-88.04" +
        "&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m" +
        "&temperature_unit=fahrenheit&wind_speed_unit=mph";

    var weatherRetries = 0;

    function pollWeather() {
        fetch(WEATHER_URL)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.current) return;
                var c = data.current;
                var code = c.weather_code;
                var wmo = WMO_CODES[code] || ["Unknown", "\u2753"];

                weatherIcon.textContent = wmo[1];
                weatherTemp.innerHTML = Math.round(c.temperature_2m) +
                    '<span class="unit">\u00B0F</span>';
                weatherDetails.textContent = wmo[0] +
                    "  \u00B7  " + Math.round(c.relative_humidity_2m) + "% humidity" +
                    "  \u00B7  " + Math.round(c.wind_speed_10m) + " mph";
                weatherCard.style.display = "";
                weatherRetries = 0;
            })
            .catch(function () {
                if (weatherRetries < 6) {
                    weatherRetries++;
                    setTimeout(pollWeather, 10000);
                }
            });
    }

    pollWeather();
    setInterval(pollWeather, WEATHER_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Air Quality + Pollen — Open-Meteo AQI API                      */
    /* -------------------------------------------------------------- */

    var aqiCard = document.getElementById("aqiCard");
    var aqiValue = document.getElementById("aqiValue");
    var aqiLabel = document.getElementById("aqiLabel");
    var aqiDetails = document.getElementById("aqiDetails");

    var AQI_URL = "https://air-quality-api.open-meteo.com/v1/air-quality" +
        "?latitude=30.69&longitude=-88.04" +
        "&current=us_aqi,pm2_5,pm10,grass_pollen,birch_pollen,ragweed_pollen,alder_pollen";

    function aqiCategory(aqi) {
        if (aqi <= 50)  return ["Good", "aqi-good"];
        if (aqi <= 100) return ["Moderate", "aqi-moderate"];
        if (aqi <= 150) return ["Sensitive Groups", "aqi-sensitive"];
        if (aqi <= 200) return ["Unhealthy", "aqi-unhealthy"];
        if (aqi <= 300) return ["Very Unhealthy", "aqi-very-bad"];
        return ["Hazardous", "aqi-hazardous"];
    }

    function pollAqi() {
        fetch(AQI_URL)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.current) return;
                var c = data.current;
                var aqi = Math.round(c.us_aqi || 0);
                var cat = aqiCategory(aqi);

                aqiValue.textContent = aqi;
                aqiValue.className = "aqi-value " + cat[1];
                aqiLabel.textContent = cat[0];
                aqiLabel.className = "aqi-label " + cat[1];

                var parts = [];
                if (c.pm2_5 != null) parts.push("PM2.5: " + c.pm2_5.toFixed(1));
                if (c.pm10 != null) parts.push("PM10: " + c.pm10.toFixed(1));
                var pollen = [];
                if (c.grass_pollen) pollen.push("Grass: " + Math.round(c.grass_pollen));
                if (c.birch_pollen) pollen.push("Tree: " + Math.round(c.birch_pollen));
                if (c.ragweed_pollen) pollen.push("Ragweed: " + Math.round(c.ragweed_pollen));
                if (c.alder_pollen) pollen.push("Alder: " + Math.round(c.alder_pollen));
                if (pollen.length > 0) parts.push(pollen.join(", "));

                aqiDetails.textContent = parts.join("  \u00B7  ");
                aqiCard.style.display = "";
            })
            .catch(function () {});
    }

    pollAqi();
    setInterval(pollAqi, WEATHER_POLL_MS);

    /* -------------------------------------------------------------- */
    /* System Health — polls /api/home/health, pages 4 rows at a time */
    /* -------------------------------------------------------------- */

    var healthCard = document.getElementById("healthCard");
    var healthScroll = document.getElementById("healthScroll");
    var healthSummary = document.getElementById("healthSummary");

    /* Poll interval — 30 seconds. Page cycle — 4 seconds. */
    var HEALTH_POLL_MS = 30000;
    var HEALTH_CYCLE_MS = 4000;
    var HEALTH_PAGE_SIZE = 4;

    var healthRows = [];
    var healthPage = 0;
    var healthMeta = {};

    function renderHealthPage(page) {
        if (healthRows.length === 0) return;
        var totalPages = Math.ceil(healthRows.length / HEALTH_PAGE_SIZE);
        page = page % totalPages;
        var start = page * HEALTH_PAGE_SIZE;
        var end = Math.min(start + HEALTH_PAGE_SIZE, healthRows.length);

        var html = "";
        for (var i = start; i < end; i++) {
            var r = healthRows[i];
            html += '<div class="health-row">' +
                '<span class="health-name">' + r.name + '</span>' +
                '<span class="' + (r.ok ? "health-ok" : "health-bad") + '">' +
                (r.ok ? "OK" : "DOWN") + '</span></div>';
        }

        healthScroll.innerHTML = html;

        /* Summary: device count + schedule count + dots. */
        var parts = [];
        if (healthMeta.devices != null) {
            parts.push(healthMeta.devices + " devices");
        }
        if (healthMeta.schedules != null) {
            parts.push(healthMeta.schedules + " sched");
        }
        if (healthMeta.downCount > 0) {
            parts.push(healthMeta.downCount + " down");
        }

        var dots = "";
        if (totalPages > 1) {
            for (var p = 0; p < totalPages; p++) {
                dots += '<span class="soil-dot' +
                    (p === page ? " active" : "") + '"></span>';
            }
        }

        healthSummary.innerHTML = parts.join(" · ") +
            (dots ? '<div class="soil-dots" style="display:flex;justify-content:center;margin-top:2px">' + dots + '</div>' : "");
    }

    function pollHealth() {
        fetch("/api/home/health")
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var adapters = data.adapters || {};
                var rows = [];
                var downCount = 0;
                var keys = Object.keys(adapters);

                for (var i = 0; i < keys.length; i++) {
                    var ok = adapters[keys[i]];
                    rows.push({ name: keys[i], ok: ok });
                    if (!ok) downCount++;
                }

                healthRows = rows;
                healthMeta = {
                    devices: data.devices,
                    schedules: data.schedules,
                    downCount: downCount
                };
                renderHealthPage(healthPage);
                healthCard.style.display = "";
            })
            .catch(function () {});
    }

    function cycleHealth() {
        if (healthRows.length > HEALTH_PAGE_SIZE) {
            healthPage++;
            renderHealthPage(healthPage);
        }
    }

    pollHealth();
    setInterval(pollHealth, HEALTH_POLL_MS);
    setInterval(cycleHealth, HEALTH_CYCLE_MS);

    /* -------------------------------------------------------------- */
    /* NWS Severe Weather Alerts                                      */
    /* -------------------------------------------------------------- */

    var alertsCard = document.getElementById("alertsCard");
    var alertsTitle = document.getElementById("alertsTitle");
    var alertsList = document.getElementById("alertsList");

    /* NWS point-based alerts for Mobile, AL. */
    var NWS_URL = "https://api.weather.gov/alerts/active?point=30.69,-88.04";

    /* Poll every 5 minutes — severe weather changes fast. */
    var ALERTS_POLL_MS = 300000;

    function pollAlerts() {
        fetch(NWS_URL, {headers: {"User-Agent": "GlowUp/1.0"}})
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var features = data.features || [];
                alertsList.innerHTML = "";

                if (features.length === 0) {
                    alertsCard.classList.remove("has-alerts");
                    alertsTitle.textContent = "Alerts";
                    alertsList.innerHTML = '<div class="alerts-clear">All Clear</div>';
                } else {
                    alertsCard.classList.add("has-alerts");
                    alertsTitle.textContent = features.length +
                        " Alert" + (features.length > 1 ? "s" : "");
                    for (var i = 0; i < features.length; i++) {
                        var p = features[i].properties;
                        var div = document.createElement("div");
                        var severity = (p.severity || "").toLowerCase();
                        var cssClass = "alert-item";
                        if (p.event && p.event.toLowerCase().indexOf("warning") >= 0) cssClass += " warning";
                        else if (p.event && p.event.toLowerCase().indexOf("watch") >= 0) cssClass += " watch";
                        div.className = cssClass;
                        div.textContent = p.event || "Unknown Alert";
                        alertsList.appendChild(div);
                    }
                }
                alertsCard.style.display = "";
            })
            .catch(function () {});
    }

    pollAlerts();
    setInterval(pollAlerts, ALERTS_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Moon phase — pure math, canvas-drawn                           */
    /* -------------------------------------------------------------- */

    var moonCanvas = document.getElementById("moonCanvas");
    var moonCtx = moonCanvas.getContext("2d");
    var moonName = document.getElementById("moonName");
    var moonDetails = document.getElementById("moonDetails");

    /* Known new moon reference: Jan 6 2000 18:14 UTC. */
    var KNOWN_NEW_MOON = Date.UTC(2000, 0, 6, 18, 14);
    var SYNODIC_MONTH = 29.53058867;
    var MS_PER_DAY = 86400000;

    var PHASE_NAMES = [
        [0.0625, "New Moon"],
        [0.1875, "Waxing Crescent"],
        [0.3125, "First Quarter"],
        [0.4375, "Waxing Gibbous"],
        [0.5625, "Full Moon"],
        [0.6875, "Waning Gibbous"],
        [0.8125, "Last Quarter"],
        [0.9375, "Waning Crescent"],
        [1.0001, "New Moon"]
    ];

    function drawMoon() {
        var now = Date.now();
        var daysSinceRef = (now - KNOWN_NEW_MOON) / MS_PER_DAY;
        var phase = (daysSinceRef % SYNODIC_MONTH) / SYNODIC_MONTH;
        var age = daysSinceRef % SYNODIC_MONTH;
        var illumination = 0.5 * (1 - Math.cos(2 * Math.PI * phase));

        /* Phase name. */
        var name = "New Moon";
        for (var i = 0; i < PHASE_NAMES.length; i++) {
            if (phase < PHASE_NAMES[i][0]) {
                name = PHASE_NAMES[i][1];
                break;
            }
        }

        /* Next full and new moon. */
        var daysToFull = ((0.5 - phase + 1) % 1) * SYNODIC_MONTH;
        var daysToNew = ((1.0 - phase) % 1) * SYNODIC_MONTH;
        if (daysToFull < 0.5) daysToFull = SYNODIC_MONTH;
        if (daysToNew < 0.5) daysToNew = SYNODIC_MONTH;

        moonName.textContent = name;
        moonDetails.textContent =
            Math.round(illumination * 100) + "% illuminated" +
            "  \u00B7  Day " + Math.round(age) +
            "\nFull in " + Math.round(daysToFull) + "d" +
            "  \u00B7  New in " + Math.round(daysToNew) + "d";

        /* Draw the moon on canvas. */
        var w = moonCanvas.width;
        var h = moonCanvas.height;
        var cx = w / 2;
        var cy = h / 2;
        var r = Math.min(cx, cy) - 4;

        moonCtx.clearRect(0, 0, w, h);

        /* Full lit disc — pale yellow-white. */
        moonCtx.beginPath();
        moonCtx.arc(cx, cy, r, 0, 2 * Math.PI);
        moonCtx.fillStyle = "#e8e4d4";
        moonCtx.fill();

        /* Shadow overlay using two arcs to create the terminator.
           The terminator is an ellipse whose x-radius varies with phase. */
        moonCtx.beginPath();

        /* phase 0 = new (all shadow), 0.5 = full (no shadow).
           0-0.5 = waxing (shadow on left, shrinking right-to-left).
           0.5-1 = waning (shadow on right, growing left-to-right). */
        var shadowPhase = phase <= 0.5 ? phase * 2 : (1 - phase) * 2;
        /* shadowPhase 0 = full shadow, 1 = no shadow. */
        var terminatorX = r * Math.cos(Math.PI * shadowPhase);

        if (phase <= 0.5) {
            /* Waxing: shadow is on the left side. */
            /* Draw left half-circle (shadow edge). */
            moonCtx.arc(cx, cy, r, Math.PI / 2, -Math.PI / 2, false);
            /* Draw terminator ellipse back. */
            moonCtx.ellipse(cx, cy, Math.abs(terminatorX), r,
                0, -Math.PI / 2, Math.PI / 2, terminatorX < 0);
        } else {
            /* Waning: shadow is on the right side. */
            moonCtx.arc(cx, cy, r, -Math.PI / 2, Math.PI / 2, false);
            moonCtx.ellipse(cx, cy, Math.abs(terminatorX), r,
                0, Math.PI / 2, -Math.PI / 2, terminatorX < 0);
        }

        moonCtx.fillStyle = "#1a1a1a";
        moonCtx.fill();
    }

    drawMoon();
    /* Update once per hour — moon doesn't change fast. */
    setInterval(drawMoon, 3600000);

    /* -------------------------------------------------------------- */
    /* Fairhope Pier webcam — YouTube live thumbnail                   */
    /* -------------------------------------------------------------- */

    var fairhopeCard = document.getElementById("fairhopeCard");
    var fairhopeImg = document.getElementById("fairhopeImg");

    /* Span is configurable via URL query: ?webcam_span=1 or 2 or 3.
       Default is 3 (full row in portrait 3-column grid). */
    var webcamSpanParam = new URLSearchParams(window.location.search).get("webcam_span");
    var webcamSpan = parseInt(webcamSpanParam, 10);
    if (webcamSpan === 1 || webcamSpan === 2 || webcamSpan === 3) {
        fairhopeCard.classList.remove("webcam-span-2", "webcam-span-3");
        if (webcamSpan > 1) fairhopeCard.classList.add("webcam-span-" + webcamSpan);
    }
    var FAIRHOPE_URL = "https://i.ytimg.com/vi/N5wWOVOTHmQ/maxresdefault_live.jpg";
    var WEBCAM_POLL_MS = 60000;  /* Refresh every 60 seconds. */
    var fairhopeFailCount = 0;
    var WEBCAM_MAX_FAILS = 10;   /* Stop trying after 10 consecutive failures. */

    function pollFairhope() {
        if (fairhopeFailCount >= WEBCAM_MAX_FAILS) return;

        var img = new Image();
        img.onload = function () {
            /* Valid image returned — show it. */
            fairhopeImg.src = img.src;
            fairhopeCard.style.display = "";
            fairhopeFailCount = 0;
        };
        img.onerror = function () {
            /* Failed — hide tile, increment fail counter. */
            fairhopeCard.style.display = "none";
            fairhopeFailCount++;
        };
        /* Cache-bust so the browser fetches a fresh frame. */
        img.src = FAIRHOPE_URL + "?t=" + Date.now();
    }

    pollFairhope();
    setInterval(pollFairhope, WEBCAM_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Camera feed — cycles through NVR snapshots                     */
    /* -------------------------------------------------------------- */

    var cameraCard = document.getElementById("cameraCard");
    var cameraImg = document.getElementById("cameraImg");
    var cameraLabel = document.getElementById("cameraLabel");
    var cameraList = [];
    var cameraIndex = 0;

    /* How long each camera is shown (ms). */
    var CAMERA_CYCLE_MS = 5000;

    /* Camera list recovery: fast retries on startup (5s), then periodic
       re-check (60s) so a transient NVR outage self-heals without a
       page reload — critical for headless kiosk displays. */
    var CAMERA_RETRY_FAST_MS = 5000;
    var CAMERA_RETRY_SLOW_MS = 60000;
    var cameraRetries = 0;
    var CAMERA_FAST_RETRIES = 6;

    function loadCameraList() {
        fetch("/api/home/cameras")
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.cameras && data.cameras.length > 0) {
                    cameraList = data.cameras;
                    cameraRetries = 0;
                    cameraCard.style.display = "";
                    showNextCamera();
                } else {
                    cameraCard.style.display = "none";
                    scheduleRetry();
                }
            })
            .catch(function () {
                cameraCard.style.display = "none";
                scheduleRetry();
            });
    }

    function scheduleRetry() {
        cameraRetries++;
        /* Fast retries for initial load, then slow poll forever. */
        var delay = (cameraRetries <= CAMERA_FAST_RETRIES)
            ? CAMERA_RETRY_FAST_MS : CAMERA_RETRY_SLOW_MS;
        setTimeout(loadCameraList, delay);
    }

    function showNextCamera() {
        if (cameraList.length === 0) return;

        var cam = cameraList[cameraIndex];
        cameraIndex = (cameraIndex + 1) % cameraList.length;

        /* Cache-bust with timestamp so the browser fetches a fresh snapshot.
           On load error (NVR returned 404 or network blip), hide the broken
           image icon — the next cycle will retry automatically. */
        cameraImg.onerror = function () { cameraImg.style.opacity = "0"; };
        cameraImg.onload = function () { cameraImg.style.opacity = "1"; };
        cameraImg.src = "/api/home/camera/" + cam.id + "?t=" + Date.now();
        cameraLabel.textContent = cam.name || ("Channel " + cam.id);
    }

    loadCameraList();
    setInterval(showNextCamera, CAMERA_CYCLE_MS);
    /* Re-check camera list every 60s so NVR recovery is automatic. */
    setInterval(loadCameraList, CAMERA_RETRY_SLOW_MS);

})();
