<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowUp Home</title>
<style>
/* ------------------------------------------------------------------ */
/* Design tokens — warm, cheerful, light palette                      */
/* ------------------------------------------------------------------ */
:root {
    /* Background — soft warm cream with a hint of peach. */
    --bg-from:       #fdf6ee;
    --bg-to:         #fce8d5;

    /* Clock. */
    --clock-color:   #3d3029;
    --date-color:    #8a7262;

    /* Sensor card. */
    --card-bg:       rgba(255, 255, 255, 0.7);
    --card-border:   rgba(210, 180, 150, 0.3);
    --card-shadow:   0 4px 24px rgba(180, 140, 100, 0.12);

    /* Readings. */
    --temp-color:    #d4622a;
    --humid-color:   #2a8fbf;
    --motion-on:     #3daa6d;
    --motion-off:    #c4b8ad;
    --label-color:   #9a8878;
    --stale-color:   #c44;
    --text-color:    #4a3f36;

    /* Photo overlay. */
    --photo-opacity: 0.15;

    /* Typography — system fonts, no external deps. */
    --font-clock:    "SF Mono", "Menlo", "Consolas", monospace;
    --font-body:     -apple-system, BlinkMacSystemFont, "Segoe UI",
                     Helvetica, Arial, sans-serif;

    /* Locks. */
    --lock-locked:   #3daa6d;
    --lock-unlocked: #c44;
    --lock-unknown:  #c4b8ad;
    --lock-size:     clamp(64px, 12vw, 110px);

    /* Layout. */
    --max-width:     1400px;
    --card-radius:   24px;
    --gap:           24px;
}

/* ------------------------------------------------------------------ */
/* Reset & base                                                       */
/* ------------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-body);
    color: var(--text-color);
    background: linear-gradient(160deg, var(--bg-from), var(--bg-to));
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 24px;
    position: relative;
}

/* ------------------------------------------------------------------ */
/* Photo background — crossfade slideshow                             */
/* ------------------------------------------------------------------ */
.photo-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: var(--photo-opacity);
    background-size: cover;
    background-position: center;
    transition: opacity 2s ease;
    filter: blur(4px) saturate(0.8);
}
.photo-bg.hidden { opacity: 0; }

/* Everything else sits above the photo. */
.content { position: relative; z-index: 1; width: 100%; max-width: var(--max-width); }

/* ------------------------------------------------------------------ */
/* Clock                                                              */
/* ------------------------------------------------------------------ */
.clock-section {
    text-align: center;
    margin-bottom: 48px;
}

.clock-time {
    font-family: var(--font-clock);
    /* Across-room readable: ~6-8 inches on a 24" monitor. */
    font-size: clamp(5rem, 14vw, 12rem);
    font-weight: 200;
    letter-spacing: 0.04em;
    color: var(--clock-color);
    line-height: 1;
}

.clock-seconds {
    font-size: 0.4em;
    opacity: 0.35;
    vertical-align: super;
    margin-left: 4px;
}

.clock-date {
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 300;
    color: var(--date-color);
    margin-top: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

/* ------------------------------------------------------------------ */
/* Sensor grid                                                        */
/* ------------------------------------------------------------------ */
.sensor-grid {
    display: grid;
    /* Always 3 columns with a small gap between squares. */
    gap: 12px;
    grid-template-columns: repeat(3, 1fr);
    width: 100%;
}

/* ------------------------------------------------------------------ */
/* Sensor card                                                        */
/* ------------------------------------------------------------------ */
.sensor-card {
    background: var(--card-bg);
    border: 2px solid black;
    border-radius: var(--card-radius);
    padding: 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    /* Square card. */
    aspect-ratio: 1;
    /* Center content vertically within the square. */
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
}

.sensor-location {
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-color);
    margin-bottom: 2px;
}

.sensor-label {
    font-size: clamp(0.75rem, 1.4vw, 1.1rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--label-color);
    margin-bottom: 12px;
}

/* Main temperature reading — big and warm, across-room readable. */
.reading-temp {
    font-family: var(--font-clock);
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 300;
    color: var(--temp-color);
    line-height: 1;
    margin-bottom: 4px;
}
.reading-temp .unit {
    font-size: 0.5em;
    opacity: 0.5;
    vertical-align: super;
}

/* Secondary readings row. */
.reading-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
}

.reading-humid {
    font-family: var(--font-clock);
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 400;
    color: var(--humid-color);
}
.reading-humid .icon {
    font-size: 0.85em;
    margin-right: 4px;
}
.reading-humid .unit {
    font-size: 0.75em;
    opacity: 0.5;
}

/* Motion indicator — pulsing dot. */
.motion-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(1rem, 2vw, 1.6rem);
    color: var(--motion-off);
    transition: color 0.4s ease;
}
.motion-indicator.active { color: var(--motion-on); }

.motion-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--motion-off);
    transition: background 0.4s ease, box-shadow 0.4s ease;
}
.motion-indicator.active .motion-dot {
    background: var(--motion-on);
    box-shadow: 0 0 10px rgba(61, 170, 109, 0.4), 0 0 20px rgba(61, 170, 109, 0.2);
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(61, 170, 109, 0.4), 0 0 20px rgba(61, 170, 109, 0.2); }
    50%      { box-shadow: 0 0 16px rgba(61, 170, 109, 0.6), 0 0 32px rgba(61, 170, 109, 0.3); }
}

/* Staleness warning. */
.reading-stale {
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    color: var(--stale-color);
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.4s ease;
}
.reading-stale.visible { opacity: 1; }

/* Last-update timestamp. */
.reading-updated {
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: var(--label-color);
    opacity: 0.6;
    margin-top: 8px;
}

/* ------------------------------------------------------------------ */
/* Photo card                                                         */
/* ------------------------------------------------------------------ */
.photo-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    overflow: hidden;
    box-shadow: var(--card-shadow);
    position: relative;
    min-height: 200px;
}

.photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 2s ease;
}
.photo-card img.fading { opacity: 0; }

/* ------------------------------------------------------------------ */
/* No-data state                                                      */
/* ------------------------------------------------------------------ */
.no-data {
    text-align: center;
    color: var(--label-color);
    font-size: 1.1rem;
    padding: 60px 20px;
    grid-column: 1 / -1;
}

/* ------------------------------------------------------------------ */
/* Locks card                                                         */
/* ------------------------------------------------------------------ */
.locks-card {
    background: var(--card-bg);
    border: 2px solid black;
    border-radius: var(--card-radius);
    padding: 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    text-align: center;
    /* Square card — same as sensor cards. */
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
}

.locks-title {
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--label-color);
    margin-bottom: 16px;
}

.locks-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(16px, 4vw, 40px);
    flex-wrap: wrap;
}

.lock-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.lock-circle {
    width: var(--lock-size);
    height: var(--lock-size);
    border-radius: 50%;
    border: 3px solid var(--lock-unknown);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-clock);
    font-size: clamp(1.2rem, 3.5vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--lock-unknown);
    transition: background 0.4s ease, border-color 0.4s ease,
                color 0.4s ease, box-shadow 0.4s ease;
}

/* Locked = filled green circle, white text. */
.lock-circle.locked {
    background: var(--lock-locked);
    border-color: var(--lock-locked);
    color: #fff;
    box-shadow: 0 0 12px rgba(61, 170, 109, 0.3);
}

/* Unlocked = hollow red circle, red text. */
.lock-circle.unlocked {
    background: transparent;
    border-color: var(--lock-unlocked);
    color: var(--lock-unlocked);
    box-shadow: 0 0 12px rgba(204, 68, 68, 0.25);
}

.lock-name {
    font-size: clamp(0.65rem, 1.2vw, 0.9rem);
    font-weight: 400;
    color: var(--label-color);
    letter-spacing: 0.06em;
    text-transform: uppercase;
}

/* ------------------------------------------------------------------ */
/* Responsive tweaks                                                  */
/* ------------------------------------------------------------------ */
@media (max-width: 600px) {
    body { padding: 20px 16px 16px; }
    .clock-section { margin-bottom: 16px; }
    .sensor-card { padding: 16px; }
    .sensor-grid { gap: 8px; }
}

@media (max-height: 700px) {
    .clock-section { margin-bottom: 16px; }
    .clock-time { font-size: clamp(3rem, 10vw, 7rem); }
    .sensor-card { padding: 16px; }
}
</style>
</head>
<body>

<!-- Photo background layer — two elements for crossfade. -->
<div class="photo-bg hidden" id="photoBgA"></div>
<div class="photo-bg hidden" id="photoBgB"></div>

<div class="content">
    <!-- Clock. -->
    <div class="clock-section">
        <div class="clock-time" id="clockTime"></div>
        <div class="clock-date" id="clockDate"></div>
    </div>

    <!-- Status cards — populated dynamically. -->
    <div class="sensor-grid" id="sensorGrid">
        <!-- Lock card — always first in the grid. -->
        <div class="locks-card sensor-card" id="locksCard">
            <div class="locks-title">Locks</div>
            <div class="locks-row" id="locksRow"></div>
        </div>
        <div class="no-data" id="noData">Waiting for sensor data&hellip;</div>
    </div>
</div>

<script>
/* ================================================================== */
/* GlowUp Home Display                                                */
/* Display-only dashboard: clock, sensors, photos.                    */
/* No controls, no buttons — pure ambient information.                */
/*                                                                    */
/* __version__ = "2.0.0"                                              */
/* ================================================================== */

(function () {
    "use strict";

    /* -------------------------------------------------------------- */
    /* Constants                                                      */
    /* -------------------------------------------------------------- */

    /* How often to poll sensor data (ms). */
    const SENSOR_POLL_MS = 5000;

    /* Seconds before a sensor reading is considered stale. */
    const STALE_THRESHOLD_S = 120;

    /* Photo rotation interval (ms). */
    const PHOTO_ROTATE_MS = 30000;

    /* How often to refresh the photo list (ms). */
    const PHOTO_LIST_REFRESH_MS = 300000;

    const DAYS = [
        "Sunday", "Monday", "Tuesday", "Wednesday",
        "Thursday", "Friday", "Saturday"
    ];
    const MONTHS = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];

    /* -------------------------------------------------------------- */
    /* State                                                          */
    /* -------------------------------------------------------------- */

    let photos = [];
    let photoIndex = 0;
    let activePhotoBg = "A";

    /* -------------------------------------------------------------- */
    /* Clock                                                          */
    /* -------------------------------------------------------------- */

    const clockTimeEl = document.getElementById("clockTime");
    const clockDateEl = document.getElementById("clockDate");

    function updateClock() {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, "0");
        const s = String(now.getSeconds()).padStart(2, "0");

        /* 12-hour format. */
        const ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;

        clockTimeEl.innerHTML =
            h + ":" + m +
            '<span class="clock-seconds">' + s + " " + ampm + "</span>";

        const day = DAYS[now.getDay()];
        const month = MONTHS[now.getMonth()];
        const date = now.getDate();
        const year = now.getFullYear();
        clockDateEl.textContent = day + ", " + month + " " + date + ", " + year;
    }

    updateClock();
    setInterval(updateClock, 1000);

    /* -------------------------------------------------------------- */
    /* Sensor cards                                                   */
    /* -------------------------------------------------------------- */

    const sensorGrid = document.getElementById("sensorGrid");
    const noDataEl = document.getElementById("noData");

    /** Convert Celsius to Fahrenheit. */
    function cToF(c) {
        return (c * 9 / 5) + 32;
    }

    /** Format a sensor label for display. */
    function formatLabel(label) {
        return label
            .replace(/_/g, " ")
            .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    /** Build or update the sensor card for a given label. */
    function renderSensorCard(label, data) {
        let card = document.getElementById("sensor-" + label);
        const isNew = !card;

        if (isNew) {
            card = document.createElement("div");
            card.className = "sensor-card";
            card.id = "sensor-" + label;
            card.innerHTML =
                '<div class="sensor-location"></div>' +
                '<div class="sensor-label"></div>' +
                '<div class="reading-temp"></div>' +
                '<div class="reading-row">' +
                '  <div class="reading-humid"></div>' +
                '  <div class="motion-indicator">' +
                '    <div class="motion-dot"></div>' +
                '    <span class="motion-text"></span>' +
                '  </div>' +
                "</div>" +
                '<div class="reading-stale"></div>' +
                '<div class="reading-updated"></div>';
        }

        /* Location is the primary label; sensor name is the subtitle. */
        var locationEl = card.querySelector(".sensor-location");
        var labelEl = card.querySelector(".sensor-label");
        if (data.location) {
            locationEl.textContent = data.location;
            locationEl.style.display = "";
            labelEl.textContent = formatLabel(label);
        } else {
            /* No location configured — promote sensor name to primary. */
            locationEl.style.display = "none";
            labelEl.textContent = formatLabel(label);
        }

        /* Temperature in Fahrenheit. */
        const tempEl = card.querySelector(".reading-temp");
        if (data.temperature != null) {
            const f = cToF(data.temperature);
            tempEl.innerHTML =
                f.toFixed(1) + '<span class="unit">&deg;F</span>';
        } else {
            tempEl.innerHTML = '&mdash;<span class="unit">&deg;F</span>';
        }

        /* Humidity. */
        const humidEl = card.querySelector(".reading-humid");
        if (data.humidity != null) {
            humidEl.innerHTML =
                data.humidity.toFixed(0) + '<span class="unit">%</span>';
        } else {
            humidEl.innerHTML = '&mdash;<span class="unit">%</span>';
        }

        /* Motion. */
        const motionEl = card.querySelector(".motion-indicator");
        const motionText = card.querySelector(".motion-text");
        const motionActive = data.motion === 1;
        motionEl.classList.toggle("active", motionActive);
        motionText.textContent = motionActive ? "Motion" : "Clear";

        /* Staleness check. */
        const staleEl = card.querySelector(".reading-stale");
        if (data.last_update) {
            const age = Date.now() / 1000 - data.last_update;
            if (age > STALE_THRESHOLD_S) {
                const mins = Math.floor(age / 60);
                staleEl.textContent = "No update for " + mins + " min";
                staleEl.classList.add("visible");
            } else {
                staleEl.classList.remove("visible");
            }

            const updatedEl = card.querySelector(".reading-updated");
            const dt = new Date(data.last_update * 1000);
            updatedEl.textContent = "Updated " + dt.toLocaleTimeString();
        }

        if (isNew) {
            sensorGrid.appendChild(card);
        }
    }

    /** Fetch sensor data and update all cards. */
    function pollSensors() {
        fetch("/api/ble/sensors")
            .then(function (r) { return r.json(); })
            .then(function (sensors) {
                /* Ignore auth errors from old server versions. */
                if (sensors.error) return;

                const labels = Object.keys(sensors);
                if (labels.length === 0) {
                    noDataEl.style.display = "";
                    return;
                }
                noDataEl.style.display = "none";

                labels.forEach(function (label) {
                    renderSensorCard(label, sensors[label]);
                });

                /* Remove cards for sensors that disappeared. */
                var existingCards = sensorGrid.querySelectorAll(
                    '[id^="sensor-"]'
                );
                existingCards.forEach(function (el) {
                    var id = el.id.replace("sensor-", "");
                    if (labels.indexOf(id) === -1) {
                        el.remove();
                    }
                });
            })
            .catch(function () {
                /* Network hiccup — leave display as-is. */
            });
    }

    pollSensors();
    setInterval(pollSensors, SENSOR_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Locks                                                          */
    /* -------------------------------------------------------------- */

    const locksCard = document.getElementById("locksCard");
    const locksRow = document.getElementById("locksRow");

    /** Render lock circles from API data. */
    function renderLocks(locks) {
        /* locks is an array: [{abbr: "FD", name: "Front Door", locked: true}, ...] */
        if (!locks || locks.length === 0) {
            locksRow.innerHTML = "";
            return;
        }
        locksRow.innerHTML = "";

        locks.forEach(function (lock) {
            var item = document.createElement("div");
            item.className = "lock-item";

            var circle = document.createElement("div");
            circle.className = "lock-circle";
            if (lock.locked === true) {
                circle.classList.add("locked");
            } else if (lock.locked === false) {
                circle.classList.add("unlocked");
            }
            /* else: unknown state — gray default. */
            circle.textContent = lock.abbr || "?";

            var name = document.createElement("div");
            name.className = "lock-name";
            name.textContent = lock.name || "";

            item.appendChild(circle);
            item.appendChild(name);
            locksRow.appendChild(item);
        });
    }

    function pollLocks() {
        fetch("/api/home/locks")
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.error) return;
                renderLocks(data.locks || []);
            })
            .catch(function () { /* leave as-is */ });
    }

    pollLocks();
    setInterval(pollLocks, SENSOR_POLL_MS);

    /* -------------------------------------------------------------- */
    /* Photo slideshow                                                */
    /* -------------------------------------------------------------- */

    const photoBgA = document.getElementById("photoBgA");
    const photoBgB = document.getElementById("photoBgB");

    function loadPhotoList() {
        fetch("/api/home/photos")
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.photos && data.photos.length > 0) {
                    photos = data.photos;
                    for (var i = photos.length - 1; i > 0; i--) {
                        var j = Math.floor(Math.random() * (i + 1));
                        var tmp = photos[i];
                        photos[i] = photos[j];
                        photos[j] = tmp;
                    }
                    showNextPhoto();
                }
            })
            .catch(function () { /* no photos */ });
    }

    function showNextPhoto() {
        if (photos.length === 0) return;

        var url = "/photos/" + encodeURIComponent(photos[photoIndex]);
        photoIndex = (photoIndex + 1) % photos.length;

        var incoming, outgoing;
        if (activePhotoBg === "A") {
            incoming = photoBgB;
            outgoing = photoBgA;
            activePhotoBg = "B";
        } else {
            incoming = photoBgA;
            outgoing = photoBgB;
            activePhotoBg = "A";
        }

        var img = new Image();
        img.onload = function () {
            incoming.style.backgroundImage = 'url("' + url + '")';
            incoming.classList.remove("hidden");
            outgoing.classList.add("hidden");
        };
        img.src = url;
    }

    loadPhotoList();
    setInterval(showNextPhoto, PHOTO_ROTATE_MS);
    setInterval(loadPhotoList, PHOTO_LIST_REFRESH_MS);

})();
</script>
</body>
</html>
