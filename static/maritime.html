        (track != null ? `<div class="row"><span class="lbl">Track</span><span class="val">${String(track).padStart(3, "0")}°</span></div>` : "") +
        (a.lat != null ? `<div class="row"><span class="lbl">Position</span><span class="val">${a.lat.toFixed(4)}, ${a.lon.toFixed(4)}</span></div>` : "") +
        (seen != null ? `<div class="row"><span class="lbl">Last heard</span><span class="val">${fmtAge(seen)} ago</span></div>` : "") +
      `</div>`
    );
}

function renderAircraft(aircraft) {
    const seen = new Set();
    for (const a of aircraft) {
        if (a.lat == null || a.lon == null) continue;
        const icao = (a.hex || "").toLowerCase();
        if (!icao) continue;
        seen.add(icao);
        const stale = (typeof a.seen === "number" && a.seen > ADSB_STALE_AFTER_S);
        const alpha = stale ? 0.45 : 0.95;
        const track = (typeof a.track === "number") ? a.track : null;
        /* Visual cache key — only re-issue setIcon when the rendered
           glyph would actually change.  Leaflet's setIcon is destructive
           (it removes and recreates the marker DOM element), so calling
           it on every 5 s poll for every aircraft caused a one-frame
           DOM swap per tick that read as flicker, and as "missing" when
           paint backpressure stretched the gap.  Track is rounded to
           the nearest degree (CSS rotation finer than that is invisible)
           and combined with the stale flag; setLatLng and
           setPopupContent stay every-poll because neither touches the
           icon DOM. */
        const trackKey = (track == null) ? -1 : Math.round(track);
        const visKey   = `${trackKey}|${stale ? 1 : 0}`;
        let m = aircraftMarkers.get(icao);
        if (!m) {
            m = L.marker([a.lat, a.lon], {
                icon:        makeAircraftIcon(track, alpha),
                riseOnHover: true,
            }).addTo(aircraftLayer);
            m.bindPopup(aircraftPopupHtml(a));
            m._visKey = visKey;
            aircraftMarkers.set(icao, m);
        } else {
            m.setLatLng([a.lat, a.lon]);
            if (m._visKey !== visKey) {
                m.setIcon(makeAircraftIcon(track, alpha));
                m._visKey = visKey;
            }
            m.setPopupContent(aircraftPopupHtml(a));
        }
        /* Permanent label: callsign + altitude.  Skip when there's
           no callsign yet (aircraft heard but no Mode-S identity
           decoded — clutters the map with anonymous markers). */
        const cs = (a.flight || "").trim();
        if (cs) {
            const altStr = (() => {
                const alt = realAltitude(a);
                if (alt == null) return "";
                if (alt === 0) return "<span class=\"alt\">GND</span>";
                return `<span class="alt">${Math.round(alt / 100)}</span>`;
            })();
            const labelHtml = escapeHtml(cs) + altStr;
            const labelClass = "aircraft-label" + (stale ? " stale" : "");
            if (m.getTooltip()) {
                m.setTooltipContent(labelHtml);
                /* Mutating tooltip.options.className alone does NOT
                   propagate to the rendered tooltip DOM — Leaflet only
                   reads className at bind time.  Toggle the class on
                   the live element directly so the .stale fade
                   actually applies after the first bind.  Keep the
                   options field in sync for any future re-render
                   (e.g. layer toggle off/on). */
                const tt = m.getTooltip();
                tt.options.className = labelClass;
                const ttEl = tt.getElement();
                if (ttEl) ttEl.classList.toggle("stale", stale);
            } else {
                m.bindTooltip(labelHtml, {
                    permanent: true,
                    direction: "right",
                    offset: [12, 0],
                    className: labelClass,
                    opacity:   1.0,
                    interactive: true,
                });
            }
        } else if (m.getTooltip()) {
            m.unbindTooltip();
        }
    }
    /* Drop markers for aircraft no longer in the feed (dump1090
       drops them after ~60 s of no decode; we follow). */
    for (const [icao, m] of aircraftMarkers) {
        if (!seen.has(icao)) {
            aircraftLayer.removeLayer(m);
            aircraftMarkers.delete(icao);
        }
    }
}

async function pollAircraft() {
    /* Skip when the layer is hidden — saves a HTTP round-trip and
       a render pass on /maritime where aircraft is off by default. */
    if (!map.hasLayer(aircraftLayer)) return;
    let json;
    try {
        const r = await fetch("/api/sdr/adsb/aircraft");
        json = await r.json();
    } catch (e) {
        console.error("aircraft poll failed", e);
        return;
    }
    renderAircraft(json.aircraft || []);
}
pollAircraft();
setInterval(pollAircraft, ADSB_POLL_MS);

/* ---------- Road incidents (TomTom) -------------------------------------
   Source: GET /api/traffic/incidents, fed by the hub's TrafficBuffer
   (caching proxy in front of TomTom's incidentDetails API).  Cached
   server-side at INCIDENTS_TTL_S so a long-lived /roads session stays
   inside the free-tier 2,500/day budget regardless of poll cadence
   here.  The client polls every 60 s — well above the cache TTL,
   so most polls return the same payload without burning a TomTom
   call.  Skipped entirely when the incidents layer is off.

   Pin color by iconCategory (TomTom Traffic API documentation):
     1  Accident             red
     6  Jam / slow traffic   amber
     7  Lane Closed          orange
     8  Road Closed          deep red
     9  Road Works           orange
     others                  grey (default)

   Marker shape: small circle, fill by category, dark stroke for
   contrast against the OSM basemap (same outline rationale as the
   vessel markers above).  Popup carries the event description
   and category so the operator can see what TomTom thinks is
   happening without having to follow up to a third-party site. */

const TRAFFIC_POLL_MS = 60000;

const INCIDENT_COLORS = {
    1: "#cc0033",   /* Accident — deep red */
    6: "#ffaa00",   /* Jam — amber */
    7: "#ff7a00",   /* Lane Closed — orange */
    8: "#a50026",   /* Road Closed — burgundy red */
    9: "#ff7a00",   /* Road Works — orange */
};
const INCIDENT_DEFAULT_COLOR = "#888";

const INCIDENT_CATEGORY_NAMES = {
    0: "Unknown", 1: "Accident", 2: "Fog", 3: "Dangerous conditions",
    4: "Rain", 5: "Ice", 6: "Jam", 7: "Lane closed", 8: "Road closed",
    9: "Road works", 10: "Wind", 11: "Flooding", 14: "Broken-down vehicle",
};

/* Track active incident markers by a stable key so each poll can
   add new pins, update positions, and drop stale ones — same
   pattern as the vessel/aircraft layers.  TomTom doesn't expose
   a stable per-incident id field, so we synthesise one from the
   first coordinate pair + the icon category — collisions are
   harmless (they just keep the existing marker in place). */
const incidentMarkers = new Map();

function incidentPopupHtml(props, when) {
    const cat = (typeof props.iconCategory === "number") ? props.iconCategory : 0;
    const catName = INCIDENT_CATEGORY_NAMES[cat] || "Incident";
    const evtList = Array.isArray(props.events) ? props.events : [];
    const evtDesc = evtList.length > 0 ? (evtList[0].description || "") : "";
    const roads = Array.isArray(props.roadNumbers) ? props.roadNumbers.join(", ") : "";
    const delaySec = (typeof props.delay === "number") ? props.delay : null;
    const delayStr = (delaySec != null && delaySec > 0)
        ? `${Math.round(delaySec / 60)} min`
        : null;
    const lengthM = (typeof props.length === "number") ? props.length : null;
    return (
      `<div class="aircraft-popup">` +
        `<div class="callsign">${escapeHtml(catName)}</div>` +
        (evtDesc ? `<div class="row"><span class="lbl">Event</span><span class="val">${escapeHtml(evtDesc)}</span></div>` : "") +
        (roads ? `<div class="row"><span class="lbl">Road</span><span class="val">${escapeHtml(roads)}</span></div>` : "") +
        (delayStr ? `<div class="row"><span class="lbl">Delay</span><span class="val">${delayStr}</span></div>` : "") +
        (lengthM != null ? `<div class="row"><span class="lbl">Length</span><span class="val">${lengthM.toLocaleString()} m</span></div>` : "") +
        (when ? `<div class="row"><span class="lbl">Fetched</span><span class="val">${when}</span></div>` : "") +
      `</div>`
    );
}

function incidentKey(geom, props) {
    /* TomTom returns either Point (single coord) or LineString
       (route segment).  Use the first coord pair as the spatial
       half of the key; the iconCategory disambiguates two
       incidents at the same intersection. */
    const c = (geom && Array.isArray(geom.coordinates)) ? geom.coordinates : [];
    const first = (Array.isArray(c[0]) && typeof c[0][0] === "number") ? c[0]
                : (typeof c[0] === "number" ? c : [0, 0]);
    const cat = (typeof props.iconCategory === "number") ? props.iconCategory : 0;
    return `${first[0].toFixed(4)},${first[1].toFixed(4)}|${cat}`;
}

function renderIncidents(incidents, fetchedAt) {
    const seen = new Set();
    for (const inc of incidents) {
        const props = inc.properties || {};
        const geom  = inc.geometry || {};
        const coords = geom.coordinates;
        if (!coords) continue;
        /* Pin position: first coord for Point; midpoint of the
           coord array for LineString.  Either way TomTom uses
           [lon, lat] order. */
        let lon, lat;
        if (geom.type === "LineString" && Array.isArray(coords[0])) {
            const mid = coords[Math.floor(coords.length / 2)];
            [lon, lat] = mid;
        } else if (Array.isArray(coords[0])) {
            [lon, lat] = coords[0];
        } else {
            [lon, lat] = coords;
        }
        if (typeof lat !== "number" || typeof lon !== "number") continue;
        const key = incidentKey(geom, props);
        seen.add(key);
        const cat = (typeof props.iconCategory === "number") ? props.iconCategory : 0;
        const color = INCIDENT_COLORS[cat] || INCIDENT_DEFAULT_COLOR;
        let m = incidentMarkers.get(key);
        if (!m) {
            m = L.circleMarker([lat, lon], {
                radius: 7,
                color: MARKER_STROKE,
                weight: 2,
                fillColor: color,
                fillOpacity: 0.9,
            }).addTo(roadsIncidentLayer);
            incidentMarkers.set(key, m);
        } else {
            m.setLatLng([lat, lon]);
            m.setStyle({ fillColor: color });
        }
        m.bindPopup(incidentPopupHtml(props, fetchedAt));
    }
    /* Drop pins for incidents no longer in the feed. */
    for (const [key, m] of incidentMarkers) {
        if (!seen.has(key)) {
            roadsIncidentLayer.removeLayer(m);
            incidentMarkers.delete(key);
        }
    }
}

async function pollIncidents() {
    if (!map.hasLayer(roadsIncidentLayer)) return;
    let json;
    try {
        const r = await fetch("/api/traffic/incidents");
        json = await r.json();
    } catch (e) {
        console.error("incidents poll failed", e);
        return;
    }
    renderIncidents(json.incidents || [], json.fetched_at || "");
}
pollIncidents();
setInterval(pollIncidents, TRAFFIC_POLL_MS);
</script>
</body>
</html>
