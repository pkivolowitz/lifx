<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowUp Maritime</title>

<!-- Leaflet 1.9.4 from unpkg, BSD-2-clause.  No API key required;
     uses OpenStreetMap tiles by default (also no key, but heavy
     polling should be avoided per OSM's tile usage policy — we
     poll JSON every few seconds and only fetch tiles on user pan/
     zoom, well within bounds for a single-user dashboard). -->
<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin="" />

<style>
/* -------------------------------------------------------------------
   Maritime dashboard — full-bleed map, minimum chrome.  Per the
   spec: most of the real estate goes to the map.  The thin top bar
   carries dataset-status + nav; the popup carries per-vessel detail.
   ------------------------------------------------------------------- */
:root {
    --bg:        #0c0e12;
    --panel:     #161a21;
    --text:      #d8dde6;
    --label:     #6f7a8a;
    --accent:    #6dd9c8;     /* mint — same as /airwaves */
    --accent-2:  #ffb347;     /* warm amber */
    --new:       #ffd966;
    --border:    rgba(255,255,255,0.08);
    --mono:      "SF Mono", "Menlo", "Consolas", monospace;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Helvetica Neue", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.4;
    display: flex;
    flex-direction: column;
}

/* Top strip — slim, monospaced status + nav. */
header.bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    flex-wrap: wrap;
}
header.bar h1 {
    font-weight: 400;
    font-size: 1.0rem;
    letter-spacing: -0.01em;
}
header.bar h1 .accent { color: var(--accent); }
header.bar .live {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
header.bar .live .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }
header.bar .stat {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--label);
}
header.bar .stat .v { color: var(--text); }
header.bar .nav { margin-left: auto; }
header.bar .nav a {
    color: var(--accent);
    text-decoration: none;
    margin-left: 14px;
    opacity: 0.8;
    font-size: 0.85rem;
}
header.bar .nav a:hover { opacity: 1; }

/* Below the top bar lives a horizontal flex container holding the
   map (left, growing) and an optional vessel-table side panel
   (right, fixed-but-draggable).  ``min-height: 0`` is required so
   the inner flex children can actually shrink — without it the
   map's intrinsic size dominates and the panel is forced to wrap. */
#content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    min-height: 0;
}

/* Map fills the remaining horizontal space inside #content.  The
   prior layout used min-height: 80vh as a belt-and-braces guard
   against the Leaflet 0-height race; with #content as a definite-
   height flex parent the map inherits a real size, so min-height
   drops to 0 (otherwise it would force overflow when a tall panel
   is open on a short window). */
#map {
    flex: 1 1 auto;
    min-height: 0;
    background: var(--bg);
}

/* Drag handle — 5 px sliver between map and panel.  cursor:
   col-resize hints the affordance; hover lights the accent so the
   target is discoverable.  Drag logic is in JS below. */
#resize-handle {
    flex: 0 0 5px;
    cursor: col-resize;
    background: var(--border);
    transition: background 0.15s;
}
#resize-handle:hover { background: var(--accent); }
body.panel-hidden #resize-handle { display: none; }

/* Vessel-table side panel.  Width comes from --panel-width which
   the JS keeps in sync with the localStorage-persisted size; the
   240–50% bounds are enforced at drag time so we don't need CSS
   min/max here.  display: flex column lets the header sit above a
   scrolling table region. */
#panel {
    flex: 0 0 var(--panel-width, 360px);
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-left: 1px solid var(--border);
    min-width: 0;
    overflow: hidden;
}
body.panel-hidden #panel { display: none; }

.panel-header {
    flex: 0 0 auto;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
}
.panel-title {
    font-family: var(--mono);
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.panel-count {
    font-family: var(--mono);
    color: var(--text);
    font-size: 0.82rem;
}
.panel-count .v { color: var(--accent); }

/* Range segmented control — one button per N option (25/50/100/All).
   Active button paints in the accent colour; the whole strip is
   hidden when no maritime_reference is configured (no distance →
   range filter is meaningless). */
.range-control {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-left: auto;
}
.range-control button {
    background: transparent;
    color: var(--label);
    border: 0;
    padding: 4px 9px;
    font-family: var(--mono);
    font-size: 0.76rem;
    cursor: pointer;
    border-right: 1px solid var(--border);
}
.range-control button:last-child { border-right: 0; }
.range-control button:hover { color: var(--text); }
.range-control button.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
}
body.no-distance .range-control { display: none; }

/* Vessel table.  Scrolls vertically inside the panel; header row
   sticks to the top.  Rows are clickable — click pans the map to
   the vessel and opens its popup.  Sortable columns swap a sort
   indicator on click. */
.vtable-wrap { flex: 1 1 auto; overflow: auto; }
table.vtable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    font-family: var(--mono);
}
.vtable thead th {
    position: sticky;
    top: 0;
    background: var(--panel);
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
    font-size: 0.7rem;
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
}
.vtable thead th .sort-indicator {
    color: var(--accent);
    margin-left: 4px;
    font-size: 0.7rem;
}
.vtable thead th:hover { color: var(--text); }
.vtable tbody tr {
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
}
.vtable tbody tr:hover { background: rgba(255,255,255,0.04); }
.vtable tbody td {
    padding: 4px 8px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
}
.vtable tbody td.col-name { color: var(--accent); }
.vtable tbody td.col-distance,
.vtable tbody td.col-heading,
.vtable tbody td.col-speed { text-align: right; }
.vtable tbody td.col-local { text-align: center; color: var(--accent-2); }
.vtable .stale td { opacity: 0.55; }

/* Vessel-name labels are now clickable — open the popup.  Default
   Leaflet style sets pointer-events: none on .leaflet-tooltip so
   markers underneath stay reachable; we override for our permanent
   name labels because the click-to-open-popup affordance is the
   whole point of making the name "feel like" a link. */
.vessel-label {
    pointer-events: auto;
    cursor: pointer;
}
.vessel-label:hover {
    background: rgba(40, 50, 65, 0.95);
    border-color: var(--accent);
}

/* Aircraft markers — rotated plane glyph in saturated yellow,
   distinct from both vessel (deep types) and buoy (teal) palettes.
   Sized for trackpad clicks; dark stroke ensures contrast against
   any OSM tile.  Stale (no fresh decode in >60 s) markers fade —
   ADS-B drops aircraft from the feed quickly when reception is
   lost, so a stale marker either reflects a recent loss-of-signal
   or a non-broadcasting aircraft. */
.aircraft-icon { background: transparent !important; border: none !important; }
.aircraft-glyph {
    transform: rotate(var(--rot, 0deg));
    transform-origin: 50% 50%;
    width: 100%; height: 100%;
}
.aircraft-glyph svg {
    width: 100%; height: 100%; display: block;
}
.aircraft-glyph svg path {
    fill: var(--alpha-fill, rgba(255, 217, 102, 0.95));
    stroke: #0a1018;
    stroke-width: 1.5;
    stroke-linejoin: round;
}
.aircraft-label {
    background: rgba(22, 26, 33, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: auto;
    cursor: pointer;
}
.aircraft-label::before { display: none !important; }
.aircraft-label.stale { opacity: 0.55; }
.aircraft-label .alt {
    color: var(--accent-2);
    margin-left: 6px;
    font-weight: 400;
}
body.no-aircraft-labels .aircraft-label,
body.no-aircraft-labels .leaflet-tooltip.aircraft-label { display: none !important; }
.aircraft-popup .callsign {
    color: var(--accent-2);
    font-weight: 500;
    font-size: 0.95rem;
}
.aircraft-popup .icao {
    color: var(--label);
    font-family: var(--mono);
    font-size: 0.78rem;
}
.aircraft-popup .row {
    display: flex; gap: 10px; margin-top: 4px;
}
.aircraft-popup .row .lbl {
    color: var(--label); text-transform: uppercase;
    letter-spacing: 0.04em; font-size: 0.7rem; min-width: 6em;
}
.aircraft-popup .row .val { font-family: var(--mono); }

/* Buoy markers — diamond glyphs in a teal that's distinct from the
   vessel palette.  Sized for trackpad clicks; dark stroke for
   contrast against any OSM tile.  Stale (no fresh obs in >30 min)
   markers fade — the buoy isn't moving, but the data stream may
   have stalled. */
.buoy-icon { background: transparent !important; border: none !important; }
.buoy-glyph {
    width: 100%; height: 100%;
}
.buoy-glyph svg {
    width: 100%; height: 100%; display: block;
    transform: rotate(45deg);
    transform-origin: 50% 50%;
}
.buoy-glyph svg rect {
    fill: var(--buoy, #2bd4c8);
    fill-opacity: var(--alpha, 0.95);
    stroke: #0a1018;
    stroke-width: 2;
}
/* Buoy popup — slightly different layout from the vessel popup
   (no MMSI, primary identifier is the station id + operator-
   supplied name).  Keep monospace for the readings so the
   columns line up. */
.buoy-popup .station {
    color: var(--accent);
    font-weight: 500;
    font-size: 0.95rem;
}
.buoy-popup .obs-age {
    color: var(--label);
    font-family: var(--mono);
    font-size: 0.78rem;
    margin-top: 2px;
}
.buoy-popup .obs-age.stale { color: var(--accent-2); }
.buoy-popup .row {
    display: flex; gap: 10px; margin-top: 4px;
}
.buoy-popup .row .lbl {
    color: var(--label); text-transform: uppercase;
    letter-spacing: 0.04em; font-size: 0.7rem; min-width: 6em;
}
.buoy-popup .row .val { font-family: var(--mono); }
.buoy-popup .history-link {
    display: inline-block; margin-top: 10px;
    color: var(--accent); text-decoration: none;
    font-family: var(--mono); font-size: 0.8rem;
    border-bottom: 1px dashed var(--accent);
}
.buoy-popup .history-link:hover { color: var(--text); }

/* Leaflet popup theming.  Default popup is light-on-light; override
   to match the dark dashboard palette. */
.leaflet-popup-content-wrapper {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.6);
}
.leaflet-popup-tip { background: var(--panel); }
.leaflet-popup-content {
    margin: 10px 14px;
    font-size: 0.85rem;
    line-height: 1.45;
}
.leaflet-popup-content .name {
    color: var(--accent);
    font-weight: 500;
    font-size: 0.95rem;
}
.leaflet-popup-content .mmsi,
.leaflet-popup-content .callsign {
    font-family: var(--mono);
    color: var(--label);
    font-size: 0.78rem;
}
.leaflet-popup-content .row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
}
.leaflet-popup-content .row .lbl {
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 0.7rem;
    min-width: 6em;
}
.leaflet-popup-content .row .val { font-family: var(--mono); }
.leaflet-popup-content .stale-tag {
    color: var(--accent-2);
    font-family: var(--mono);
    font-size: 0.72rem;
    margin-left: 6px;
}

/* Vessel glyphs — boat-shape DivIcon used when we have a real
   heading (so the icon's orientation conveys "this ship is pointed
   that way" at a glance, Marine-Traffic-style).  CircleMarkers are
   used as a fallback when the AIS heading is unknown / sentinel
   511 — there's nothing to rotate to, so a directional shape would
   lie.  Sizes are deliberately oversize for trackpad clicks; the
   dark stroke ensures contrast against any basemap colour. */
.vessel-icon { background: transparent !important; border: none !important; }
.vessel-glyph {
    transform: rotate(var(--rot, 0deg));
    transform-origin: 50% 50%;
    width: 100%; height: 100%;
}
.vessel-glyph svg { width: 100%; height: 100%; display: block; }
.vessel-glyph svg path {
    fill: var(--fill, #ff00ff);
    fill-opacity: var(--alpha, 0.95);
    stroke: #0a1018;
    stroke-width: 2;
    stroke-linejoin: round;
}
/* External-source (aisstream.io etc) vessels — hollow + dashed
   stroke so it's obvious at a glance that the data came from the
   internet rather than our own RX.  Fill is muted, stroke uses the
   type colour. */
.vessel-glyph.external svg path {
    fill: var(--fill, #ff00ff);
    fill-opacity: 0.18;
    stroke: var(--fill, #ff00ff);
    stroke-width: 2;
    stroke-dasharray: 3 2;
}

/* Vessel name label — permanent tooltip for named vessels only.
   Compact, monospaced, dark with thin border so it stays readable
   over busy port-area tiles without overpowering the map. */
.vessel-label {
    background: rgba(22, 26, 33, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.vessel-label::before { display: none !important; }
.vessel-label.stale { opacity: 0.55; }
.vessel-label .speed {
    color: var(--accent-2);
    margin-left: 6px;
    font-weight: 400;
}
/* "Vessel name labels" overlay toggle — when LabelsToggleLayer is
   removed from the map, body gets this class and every permanent
   tooltip drops out of the viewport without us re-binding 1300
   tooltips.  CSS does the heavy lifting in a single rule. */
body.no-vessel-labels .vessel-label,
body.no-vessel-labels .leaflet-tooltip.vessel-label { display: none !important; }

/* Fullscreen toggle button — square 30 px control matching Leaflet's
   built-in zoom buttons in style. */
.leaflet-control-fullscreen a {
    background-color: #fff;
    width: 30px;
    height: 30px;
    line-height: 30px;
    text-align: center;
    text-decoration: none;
    color: #333;
    font-size: 18px;
    display: block;
}
.leaflet-control-fullscreen a:hover { background-color: #f4f4f4; }
/* Dark-theme override to match the rest of the dashboard chrome. */
.leaflet-control-fullscreen a {
    background-color: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
}
.leaflet-control-fullscreen a:hover {
    background-color: var(--panel-2) !important;
}

/* Recenter-on-home button — same 30×30 styling as the fullscreen and
   zoom controls so the top-left control stack reads as one widget.
   Hidden when the operator hasn't configured maritime_reference;
   there is nowhere meaningful to recenter to in that case. */
.leaflet-control-home a {
    background-color: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.leaflet-control-home a:hover { background-color: var(--panel-2) !important; }
.leaflet-control-home a svg { display: block; }
body.no-home .leaflet-control-home { display: none !important; }

/* Leaflet attribution / controls — keep them but mute the colors so
   they don't clash with the dashboard palette. */
.leaflet-control-attribution {
    background: rgba(22, 26, 33, 0.85) !important;
    color: var(--label) !important;
    border-top: 1px solid var(--border);
}
.leaflet-control-attribution a { color: var(--accent) !important; }
.leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
}
</style>
</head>
<body>

<header class="bar">
    <h1>GlowUp <span class="accent">Maritime</span></h1>
    <div class="live"><span class="dot"></span>live · AIS</div>
    <div class="stat"><span class="v" id="vessel-count">0</span> vessels</div>
    <div class="stat"><span class="v" id="vessel-pos-count">0</span> with position</div>
    <div class="stat">last msg <span class="v" id="last-msg">–</span></div>
    <div class="stat">total <span class="v" id="msg-total">0</span></div>
    <div class="nav">
        <a href="/home">home</a>
        <a href="/maritime">maritime</a>
        <a href="/air">air</a>
        <a href="/traffic">traffic</a>
    </div>
</header>

<div id="content">
    <div id="map"></div>
    <div id="resize-handle" title="Drag to resize panel"></div>
    <aside id="panel" aria-label="Vessel table">
        <div class="panel-header">
            <span class="panel-title">Vessels</span>
            <span class="panel-count"><span class="v" id="panel-shown">0</span>/<span id="panel-total">0</span></span>
            <div class="range-control" id="range-control" role="tablist" aria-label="Range filter">
                <button data-n="25" class="active" type="button">25</button>
                <button data-n="50" type="button">50</button>
                <button data-n="100" type="button">100</button>
                <button data-n="all" type="button">All</button>
            </div>
        </div>
        <div class="vtable-wrap">
            <table class="vtable">
                <thead><tr id="vthead"></tr></thead>
                <tbody id="vtbody"></tbody>
            </table>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin=""></script>
<script>
"use strict";

/* ------------------------------------------------------------------
   /maritime — live AIS map.

   Source of truth: GET /api/maritime/vessels returns
   {stats, vessels: [...]} where each vessel carries last-known
   position, identifiers, course/speed/heading, and a recent
   breadcrumb track.  Producer is AIS-catcher → MQTT → hub-side
   MaritimeBuffer.

   Polling cadence: every 3 s.  AIS Class A position broadcasts
   are 2-10 s for vessels under way, much sparser when anchored,
   so 3 s gives near-real-time motion without hammering the API.
   ------------------------------------------------------------------ */

const POLL_MS = 3000;
/* Home/center for every view comes from the operator's site config
   (/etc/glowup/site.json :: maritime_reference), stamped into the
   page by handlers/maritime.py before </head> as window.__GLOWUP_HOME__.
   No coords ever live in this file — the public repo is generic.
   When the operator hasn't configured maritime_reference (or the
   page is opened straight from disk for dev), we fall back to a
   neutral CONUS view at zoom 4: shows the whole country, doesn't
   privilege any specific city. */
const HOME = (typeof window.__GLOWUP_HOME__ === "object" && window.__GLOWUP_HOME__)
    ? window.__GLOWUP_HOME__
    : { lat: 39.5, lon: -98.5, zoom: 4 };
const HAVE_HOME = (typeof window.__GLOWUP_HOME__ === "object" && window.__GLOWUP_HOME__);

/* Ship-type colour map.  AIS shiptype is a 0-99 integer; the
   "shiptype_text" string from AIS-catcher already groups it into
   human categories (Tug, Cargo, Tanker, Passenger, etc.) so we
   colour-by-string.  These fills are tuned for an OSM background
   (light water + cream land + grey roads), so the original
   dark-UI palette (mint / pale-cyan / pale-green) was scrapped:
   those blend INTO water.  Every marker also gets a dark outline
   below (weight 2.5 stroke #0a1018) so the fill colour does not
   have to fight the basemap alone. */
const SHIP_COLOURS = {
    "Tug":               "#ff7a00",  /* deep orange — pops on water + land */
    "Cargo":             "#1f4eff",  /* deep blue — saturated past water */
    "Tanker":            "#cc0033",  /* deep red */
    "Passenger":         "#1aa84a",  /* forest green — darker than OSM land */
    "Fishing":           "#7e3aff",  /* violet */
    "Pilot Vessel":      "#ffcc00",  /* gold yellow */
    "Pleasure craft":    "#ff33aa",  /* hot pink */
    "Sailing":           "#ff5500",  /* vermilion — distinct from Tug orange */
    "Search and Rescue": "#ff0000",  /* pure red — emergency-coded */
    "Law enforcement":   "#003fbf",  /* navy */
    "Military ops":      "#5e2b97",  /* dark purple */
};
const UNKNOWN_COLOUR = "#ff00ff";    /* magenta — never the basemap */
function colourFor(typeText) {
    if (!typeText) return UNKNOWN_COLOUR;
    return SHIP_COLOURS[typeText] || UNKNOWN_COLOUR;
}
const MARKER_STROKE = "#0a1018";      /* near-black outline on every marker */

/* ----- Map setup ----- */
const map = L.map("map", {
    zoomControl: true,
    attributionControl: true,
}).setView([HOME.lat, HOME.lon], HOME.zoom);

/* Base layer: OpenStreetMap, the standard reference basemap.
   Free, no key.  Polling tiles only on user pan/zoom keeps us well
   within OSM's tile-usage policy for a single-user dashboard. */
const osmBase = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
}).addTo(map);

/* Overlay: OpenSeaMap nautical chart.  Community-maintained
   transparent overlay served from openseamap.org — buoys, lights,
   depth marks, channel markers, restricted areas, marina symbols.
   Tile URL stable for ~15 years and license-compatible (CC-BY-SA).
   Toggleable via the layer-control widget below. */
const openSeaMap = L.tileLayer(
    "https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openseamap.org/">OpenSeaMap</a> contributors (CC-BY-SA)',
    maxZoom: 18,
    opacity: 0.95,
}).addTo(map);

/* ----- Feature layer groups -----
   Each toggleable feature lives in its own LayerGroup so the
   layer-control checkboxes drive add/remove uniformly.  Vessel
   markers go into either the local-RX or external group based
   on their ``source`` field; tracks and heading indicators each
   get their own group so they can be hidden independently of the
   markers themselves. */
const localVesselLayer    = L.featureGroup().addTo(map);
const externalVesselLayer = L.featureGroup().addTo(map);
const trackLayer          = L.featureGroup().addTo(map);
const headingLayer        = L.featureGroup().addTo(map);
const buoyLayer           = L.featureGroup().addTo(map);
const aircraftLayer       = L.featureGroup().addTo(map);

/* Roads — TomTom flow-tile raster overlay (color-coded current
   speed vs. free-flow speed) plus a feature-group of incident
   pins.  Both fed from the hub-side caching proxy
   (/api/traffic/flow/{z}/{x}/{y}.png and /api/traffic/incidents);
   the API key never reaches the browser.  Tile attribution
   "© TomTom" is required per their ToS — set on the tileLayer
   options below. */
const roadsFlowLayer = L.tileLayer(
    "/api/traffic/flow/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.tomtom.com/">TomTom</a>',
    maxZoom: 22,
    opacity: 0.85,
});
const roadsIncidentLayer = L.featureGroup();

/* Labels are bound directly to markers as Leaflet tooltips, so they
   can't be added to a LayerGroup the same way.  Workaround: a
   no-render custom layer whose add/remove flips a body-class that
   CSS uses to hide all .vessel-label tooltips at once.  This lets
   the layer-control widget treat labels as a first-class togglable
   overlay without us building a separate UI. */
const LabelsToggleLayer = L.Layer.extend({
    onAdd:    function() { document.body.classList.remove("no-vessel-labels"); },
    onRemove: function() { document.body.classList.add("no-vessel-labels"); },
});
const labelsToggle = (new LabelsToggleLayer()).addTo(map);

/* ----- Vessel state -----
   Declared up here (before the panel/layer-control init below)
   because the column-toggle restoration calls renderTable, which
   reads from lastVesselsById.  If these were declared in their
   prior textual position later in the script, the temporal dead
   zone would ReferenceError on first restore.

   markers:         mmsi -> { marker, heading, headingBacking, kind, layer }
                    (layer is the LayerGroup the marker is currently in,
                     so we can move it on source change without leaks)
   trackLines:      mmsi -> Polyline (lives in trackLayer)
   lastVesselsById: mmsi -> raw vessel record from the most recent poll;
                    used by the moveend handler to re-render after a
                    pan/zoom without waiting for the next poll cycle,
                    and by the side-panel renderer to drive the table. */
const markers = new Map();
const trackLines = new Map();
const lastVesselsById = new Map();
let firstFitDone = false;

/* ----- Vessel-table side panel + persisted view state -----
   Persistence is browser-local (localStorage) — that's the right
   layer for per-device UI state (panel width, column visibility,
   sort, range), distinct from the per-fork operator config that
   lives in /etc/glowup/site.json (lat/lon reference, etc.).  All
   panel state lives under one key so a single read/write covers
   everything. */
const PANEL_STORAGE_KEY = "maritime.panel.v1";
const PANEL_DEFAULTS = {
    shown:   true,
    width:   360,
    range:   "25",                /* "25" | "50" | "100" | "all" */
    sort:    { key: "distance", dir: "asc" },
    columns: { distance: true, name: true, type: true,
               heading: true, speed: true, local: true },
};
function loadPanelState() {
    try {
        const raw = localStorage.getItem(PANEL_STORAGE_KEY);
        if (!raw) return { ...PANEL_DEFAULTS, columns: { ...PANEL_DEFAULTS.columns } };
        const got = JSON.parse(raw);
        return {
            shown:   typeof got.shown === "boolean" ? got.shown : PANEL_DEFAULTS.shown,
            width:   typeof got.width === "number" && got.width >= 240 ? got.width : PANEL_DEFAULTS.width,
            range:   ["25","50","100","all"].includes(got.range) ? got.range : PANEL_DEFAULTS.range,
            sort:    (got.sort && typeof got.sort.key === "string" && (got.sort.dir === "asc" || got.sort.dir === "desc"))
                     ? got.sort : { ...PANEL_DEFAULTS.sort },
            columns: { ...PANEL_DEFAULTS.columns, ...(got.columns || {}) },
        };
    } catch (e) {
        return { ...PANEL_DEFAULTS, columns: { ...PANEL_DEFAULTS.columns } };
    }
}
const panelState = loadPanelState();
function savePanelState() {
    try { localStorage.setItem(PANEL_STORAGE_KEY, JSON.stringify(panelState)); }
    catch (e) { /* localStorage full / disabled — ignore, in-memory state still works */ }
}

/* Apply persisted width before Leaflet init so the map gets its
   correct initial size on first frame.  Subsequent drag updates go
   through setPanelWidth() below. */
document.documentElement.style.setProperty("--panel-width", panelState.width + "px");
if (!panelState.shown) document.body.classList.add("panel-hidden");

/* Operator-set reference (postal_code, country, lat, lon) from
   /etc/glowup/site.json.  Fetched once at page load.  When absent
   the distance column / range filter are useless, so we hide them
   via the body.no-distance class.  Set after fetch resolves. */
let referenceConfig = null;

/* ----- Layer control — top-right collapsible widget.
   Builds in two passes so the column-toggle layers can be created
   before the control is constructed (the layers themselves drive
   panel column visibility through the Leaflet add/remove hooks). */

/* Column-toggle layers — no-op L.Layer subclass that flips a JS
   flag and re-renders the table.  One per togglable column,
   wired into the same layer-control widget as the map overlays so
   all "what is shown on screen" toggles live in one menu. */
function makeColumnToggle(key) {
    const ToggleLayer = L.Layer.extend({
        onAdd:    function() { panelState.columns[key] = true;  rebuildTableHead(); renderTable(); savePanelState(); },
        onRemove: function() { panelState.columns[key] = false; rebuildTableHead(); renderTable(); savePanelState(); },
    });
    return new ToggleLayer();
}
const colToggles = {
    distance: makeColumnToggle("distance"),
    name:     makeColumnToggle("name"),
    type:     makeColumnToggle("type"),
    heading:  makeColumnToggle("heading"),
    speed:    makeColumnToggle("speed"),
    local:    makeColumnToggle("local"),
};

/* Master "vessel table" toggle — same shape as the column toggles
   but flips body.panel-hidden, which CSS uses to hide the whole
   right pane.  invalidateSize() after the toggle so Leaflet
   reflows tiles + markers to the new map width. */
const TableMasterToggle = L.Layer.extend({
    onAdd:    function() {
        panelState.shown = true;
        document.body.classList.remove("panel-hidden");
        requestAnimationFrame(() => map.invalidateSize());
        savePanelState();
    },
    onRemove: function() {
        panelState.shown = false;
        document.body.classList.add("panel-hidden");
        requestAnimationFrame(() => map.invalidateSize());
        savePanelState();
    },
});
const tableMasterToggle = new TableMasterToggle();

/* The layer control.  Map basemap + nautical chart at top, then
   vessel layer groups + labels, then the table master + per-column
   toggles.  Indented column labels make the hierarchy obvious in
   Leaflet's flat checkbox list. */
const layerControl = L.control.layers(
    { "OpenStreetMap": osmBase },
    {
        "Nautical chart (OpenSeaMap)": openSeaMap,
        "Vessels — local RX":          localVesselLayer,
        "Vessels — aisstream":         externalVesselLayer,
        "Breadcrumb tracks":           trackLayer,
        "Heading indicators":          headingLayer,
        "Vessel name labels":          labelsToggle,
        "Buoys (NDBC)":                buoyLayer,
        "Aircraft (ADS-B)":            aircraftLayer,
        "Road flow (TomTom)":          roadsFlowLayer,
        "Road incidents (TomTom)":     roadsIncidentLayer,
        "Vessel table":                tableMasterToggle,
        "  ↳ col: Distance":           colToggles.distance,
        "  ↳ col: Name":               colToggles.name,
        "  ↳ col: Type":               colToggles.type,
        "  ↳ col: Heading":            colToggles.heading,
        "  ↳ col: Speed":              colToggles.speed,
        "  ↳ col: Seen local":         colToggles.local,
    },
    { collapsed: true, position: "topright" },
).addTo(map);

/* Persisted overlay state is restored at the END of the panel
   block below — after COLUMNS / renderTable / etc. are
   initialized.  Doing it here would temporal-dead-zone on the
   first toggle's onAdd → renderTable → COLUMNS access. */

/* ----- URL-driven layer presets -----
   Same maritime.html serves four URLs.  Each is a saved view:
     /maritime   vessels + tracks + headings + labels + buoys ON,
                 aircraft + roads OFF
     /air        aircraft ON, everything else OFF
     /roads      road flow + road incidents ON, everything else OFF
     /traffic    sea + air + roads — everything ON
   Layer visibility comes from the URL on every load (overrides any
   prior session state).  Other UI chrome — panel width, columns,
   sort, range — still persists in localStorage because those are
   orthogonal to "what map is this".
   Bookmarking: each URL is the bookmark you save for that view. */
const PATHNAME_PRESET = (() => {
    const path = location.pathname.replace(/\/+$/, "");
    if (path === "/air") return {
        vessels: false, tracks: false, headings: false, labels: false,
        buoys:   false, aircraft: true,
        roadsFlow: false, roadsIncidents: false,
        title:   "Air Traffic",
    };
    if (path === "/roads") return {
        vessels: false, tracks: false, headings: false, labels: false,
        buoys:   false, aircraft: false,
        roadsFlow: true, roadsIncidents: true,
        title:   "Roads",
    };
    if (path === "/traffic") return {
        vessels: true, tracks: true, headings: true, labels: true,
        buoys:   true, aircraft: true,
        roadsFlow: true, roadsIncidents: true,
        title:   "Traffic",
    };
    /* Default + explicit /maritime */
    return {
        vessels: true, tracks: true, headings: true, labels: true,
        buoys:   true, aircraft: false,
        roadsFlow: false, roadsIncidents: false,
        title:   "Maritime",
    };
})();

/* Update the page header + tab title to match the current view. */
document.title = `GlowUp ${PATHNAME_PRESET.title}`;
const _h1 = document.querySelector("header.bar h1");
if (_h1) _h1.innerHTML = `GlowUp <span class="accent">${PATHNAME_PRESET.title}</span>`;

/* Apply the preset.  Layers that were addTo'd at construction get
   removed if the preset says off; the layer-control checkbox state
   syncs automatically because L.control.layers listens for
   map.layeradd / layerremove. */
function _setLayer(layer, on) {
    if (on && !map.hasLayer(layer)) layer.addTo(map);
    if (!on && map.hasLayer(layer)) map.removeLayer(layer);
}
_setLayer(localVesselLayer,    PATHNAME_PRESET.vessels);
_setLayer(externalVesselLayer, PATHNAME_PRESET.vessels);
_setLayer(trackLayer,          PATHNAME_PRESET.tracks);
_setLayer(headingLayer,        PATHNAME_PRESET.headings);
_setLayer(labelsToggle,        PATHNAME_PRESET.labels);
_setLayer(buoyLayer,           PATHNAME_PRESET.buoys);
_setLayer(aircraftLayer,       PATHNAME_PRESET.aircraft);
_setLayer(roadsFlowLayer,      PATHNAME_PRESET.roadsFlow);
_setLayer(roadsIncidentLayer,  PATHNAME_PRESET.roadsIncidents);

/* ----- Vessel-table column definitions, rendering, sort, range -----

   COLUMNS is the schema; each entry has a ``key`` matching
   panelState.columns/sort, a header label, a value extractor used
   for both sort and display, and a formatter that produces the
   final HTML-escaped cell content.  Adding a new column = one
   entry here + one entry in the layer-control's column toggles
   above + one slot in PANEL_DEFAULTS.columns. */
const COLUMNS = [
    { key: "distance", label: "Dist nmi",
      get: v => v.distance_nmi,
      cmp: "num",
      fmt: v => v == null ? "—" : v.toFixed(1) },
    { key: "name", label: "Name",
      get: v => (v.shipname && v.shipname.trim()) || ("MMSI " + v.mmsi),
      cmp: "str",
      fmt: v => escapeHtml(v) },
    { key: "type", label: "Type",
      get: v => v.shiptype_text || null,
      cmp: "str",
      fmt: v => v == null ? "—" : escapeHtml(v) },
    { key: "heading", label: "Hdg",
      /* Sort uses the realHeading() output (511 sentinel folded to
         null so unknown-heading vessels sink to the bottom of an
         ascending sort).  Display rounds to integer degrees. */
      get: v => realHeading(v.heading),
      cmp: "num",
      fmt: v => v == null ? "—" : (Math.round(v).toString().padStart(3, "0") + "°") },
    { key: "speed", label: "Spd kt",
      get: v => realSpeed(v.speed),
      cmp: "num",
      fmt: v => v == null ? "—" : v.toFixed(1) },
    { key: "local", label: "Loc",
      /* Sort by sticky seen_local flag — true sorts before false in
         ascending order so an asc click bubbles "loc" rows up. */
      get: v => !!v.seen_local,
      cmp: "bool",
      fmt: v => v ? "✓" : "" },
];
function colByKey(k) { return COLUMNS.find(c => c.key === k); }

/* Click on a column header: cycle sort.  Same key → flip direction;
   different key → switch to that key, default direction asc.
   Persisted via savePanelState. */
function rebuildTableHead() {
    const head = document.getElementById("vthead");
    if (!head) return;
    const sortKey = panelState.sort.key;
    const sortDir = panelState.sort.dir;
    head.innerHTML = COLUMNS
        .filter(c => panelState.columns[c.key])
        .map(c => {
            const ind = (c.key === sortKey)
                ? `<span class="sort-indicator">${sortDir === "asc" ? "▲" : "▼"}</span>`
                : "";
            return `<th data-key="${c.key}">${escapeHtml(c.label)}${ind}</th>`;
        })
        .join("");
    head.querySelectorAll("th").forEach(th => {
        th.addEventListener("click", () => {
            const k = th.getAttribute("data-key");
            if (panelState.sort.key === k) {
                panelState.sort.dir = (panelState.sort.dir === "asc" ? "desc" : "asc");
            } else {
                panelState.sort.key = k;
                panelState.sort.dir = "asc";
            }
            savePanelState();
            rebuildTableHead();
            renderTable();
        });
    });
}

/* Compute the table rows from the currently-cached vessel set.
   Pipeline:
     1. Filter to vessels with a position fix.
     2. If a reference is set AND range != all, take the closest N
        by distance — this is the "always-by-distance preselect"
        contract: range chooses the geographic neighbourhood, sort
        chooses the order within it.
     3. Apply the user's sort within the chosen slice.
     4. Render. */
function panelRows(vessels) {
    let with_pos = vessels.filter(v => v.lat != null && v.lon != null);
    const total = with_pos.length;
    const haveDistance = (referenceConfig != null) &&
        with_pos.some(v => v.distance_nmi != null);
    if (panelState.range !== "all" && haveDistance) {
        const n = parseInt(panelState.range, 10);
        with_pos = with_pos
            .slice()
            .sort((a, b) => (a.distance_nmi ?? Infinity) - (b.distance_nmi ?? Infinity))
            .slice(0, n);
    }
    const col = colByKey(panelState.sort.key);
    if (col) {
        const dir = panelState.sort.dir === "asc" ? 1 : -1;
        with_pos.sort((a, b) => {
            const av = col.get(a);
            const bv = col.get(b);
            /* Null-last in either direction.  An asc sort puts
               valid values first; a desc sort puts them first too
               (you didn't ask to see "no value" promoted by
               flipping). */
            if (av == null && bv == null) return 0;
            if (av == null) return 1;
            if (bv == null) return -1;
            if (col.cmp === "num")  return (av - bv) * dir;
            if (col.cmp === "bool") return ((av ? 1 : 0) - (bv ? 1 : 0)) * dir;
            return av.localeCompare(bv) * dir;
        });
    }
    return { rows: with_pos, total: total };
}

/* Render the <tbody> for the current vessel cache + state.  Each
   row carries its MMSI as a data attribute; click pans the map to
   the vessel and opens the marker's popup (same UX as clicking
   the name label on the map itself). */
function renderTable() {
    if (document.body.classList.contains("panel-hidden")) return;
    const { rows, total } = panelRows(Array.from(lastVesselsById.values()));
    const cols = COLUMNS.filter(c => panelState.columns[c.key]);
    const tbody = document.getElementById("vtbody");
    if (!tbody) return;
    tbody.innerHTML = rows.map(v => {
        const cells = cols.map(c => {
            const cls = "col-" + c.key;
            return `<td class="${cls}">${c.fmt(c.get(v))}</td>`;
        }).join("");
        const stale = v.stale ? ' class="stale"' : "";
        return `<tr data-mmsi="${v.mmsi}"${stale}>${cells}</tr>`;
    }).join("");
    document.getElementById("panel-shown").textContent = rows.length;
    document.getElementById("panel-total").textContent = total;
    /* Row click → focus the vessel on the map.  panTo first so the
       popup is visible after openPopup(); openPopup also auto-pans
       but with a less-controlled offset. */
    tbody.querySelectorAll("tr").forEach(tr => {
        tr.addEventListener("click", () => {
            const mmsi = parseInt(tr.getAttribute("data-mmsi"), 10);
            focusVessel(mmsi);
        });
    });
}

/* Focus a vessel by MMSI: centre the map on it + open its popup.

   Three landmines avoided here, all hit during 2026-04-27 testing
   when this used the obvious panTo-then-openPopup pair:

   (1) The clicked vessel may not currently have a marker.  Viewport
       culling in renderVessels removes off-screen markers from the
       map, so a row in the side-panel table for a vessel outside
       the current viewport has no entry in `markers`.  We always
       have its lat/lon in lastVesselsById though, so route through
       the cache to drive the view change.

   (2) panTo + openPopup interleave badly.  panTo schedules an
       animation; openPopup triggers its own autoPan because mid-
       animation Leaflet still reads the marker at its pre-pan
       screen position.  Two moveend events fire across the pair,
       and the existing moveend -> renderVessels handler may
       re-cull the very marker we just opened a popup on.  The
       observed failure mode was a hard tab crash on click — Safari
       killed the renderer process, presumably tripping over an
       internal invariant in the popup-while-animating path.

   (3) setIcon during a moveend can destroy the marker's DOM while
       the popup is anchored to it.  By using setView (instant, no
       animation) we collapse the two-pan sequence to one and let
       the next-frame openPopup land on a settled marker. */
function focusVessel(mmsi) {
    const v = lastVesselsById.get(mmsi);
    if (!v || v.lat == null || v.lon == null) return;
    /* setView with no animate option is instant — fires one
       moveend synchronously, the existing handler re-renders the
       viewport markers (which now includes our target since the
       view is centred on it), and we can openPopup on the next
       frame against a fresh, settled marker. */
    map.setView([v.lat, v.lon], Math.max(map.getZoom(), 12), {
        animate: false,
    });
    requestAnimationFrame(() => {
        const entry = markers.get(mmsi);
        if (entry && entry.marker) entry.marker.openPopup();
    });
}

/* Range segmented control wiring.  One button per N option; click
   updates panelState.range, persists, and re-renders the table.
   The control itself is hidden by CSS when no reference is
   configured (body.no-distance class). */
function wireRangeControl() {
    const buttons = document.querySelectorAll("#range-control button");
    function refresh() {
        buttons.forEach(b => {
            b.classList.toggle("active", b.getAttribute("data-n") === panelState.range);
        });
    }
    refresh();
    buttons.forEach(b => {
        b.addEventListener("click", () => {
            panelState.range = b.getAttribute("data-n");
            savePanelState();
            refresh();
            renderTable();
        });
    });
}
wireRangeControl();

/* Drag-resize the panel.  Mouse-down on the handle starts a drag
   that translates pointer X into a new panel width (240 px floor,
   50%-of-window ceiling).  Map's invalidateSize is rAF-throttled
   during drag so the basemap reflows live without overwhelming
   the renderer; the localStorage write happens once on mouseup. */
let _dragging = false, _dragStartX = 0, _dragStartW = 0, _dragRaf = null;
function setPanelWidth(w) {
    panelState.width = w;
    document.documentElement.style.setProperty("--panel-width", w + "px");
}
const _handle = document.getElementById("resize-handle");
_handle.addEventListener("mousedown", e => {
    _dragging = true;
    _dragStartX = e.clientX;
    _dragStartW = document.getElementById("panel").offsetWidth;
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    e.preventDefault();
});
document.addEventListener("mousemove", e => {
    if (!_dragging) return;
    /* Drag handle is to the LEFT of the panel; dragging left
       widens the panel (pointer moved toward map → panel grew). */
    const dx = _dragStartX - e.clientX;
    let w = _dragStartW + dx;
    w = Math.max(240, Math.min(Math.floor(window.innerWidth * 0.5), w));
    setPanelWidth(w);
    if (!_dragRaf) {
        _dragRaf = requestAnimationFrame(() => {
            map.invalidateSize();
            _dragRaf = null;
        });
    }
});
document.addEventListener("mouseup", () => {
    if (!_dragging) return;
    _dragging = false;
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
    savePanelState();
    map.invalidateSize();
});

/* Reference config fetch — once at page load.  Drives:
     - the "Dist nmi" column header (we keep the static label; the
       value comes from the server's distance_nmi field)
     - the body.no-distance class which hides the range control
   Fetched non-blocking; the panel works without it (distance
   shows "—", range is always "all" effectively). */
async function fetchMaritimeConfig() {
    try {
        const r = await fetch("/api/maritime/config");
        const j = await r.json();
        referenceConfig = j.reference || null;
    } catch (e) {
        referenceConfig = null;
    }
    if (!referenceConfig) {
        document.body.classList.add("no-distance");
    } else {
        document.body.classList.remove("no-distance");
    }
    /* Re-render — initial table render may have happened before
       the config arrived. */
    renderTable();
}
fetchMaritimeConfig();

/* Initial table head + first render (on cache, which is empty
   until the first poll).  Subsequent renders are kicked from the
   poll() handler below. */
rebuildTableHead();
renderTable();

/* Restore persisted overlay state.  Adding a layer to the map
   ticks its checkbox AND drives our onAdd hooks; renderTable +
   rebuildTableHead are defined above this point so the hook calls
   are safe.  The savePanelState() calls during restore are no-ops
   in effect (they write back the same values they restored). */
if (panelState.shown) tableMasterToggle.addTo(map);
else map.removeLayer(tableMasterToggle);
for (const [k, layer] of Object.entries(colToggles)) {
    if (panelState.columns[k]) layer.addTo(map);
    else map.removeLayer(layer);
}

/* Fullscreen toggle — custom Leaflet control mirroring the look of
   the built-in zoom control (top-left, square buttons).  Click
   requests document fullscreen on the map's container; click again
   exits.  Browser API takes care of the actual fullscreen UX
   (escape key to exit, etc.). */
const FullscreenControl = L.Control.extend({
    options: { position: "topleft" },
    onAdd: function() {
        const c = L.DomUtil.create(
            "div",
            "leaflet-bar leaflet-control leaflet-control-fullscreen",
        );
        const a = L.DomUtil.create("a", "", c);
        a.href = "#";
        a.title = "Toggle fullscreen";
        a.setAttribute("role", "button");
        a.setAttribute("aria-label", "Toggle fullscreen");
        a.innerHTML = "&#x26F6;";  /* ⛶ — fullscreen glyph */
        L.DomEvent.disableClickPropagation(c);
        L.DomEvent.on(a, "click", L.DomEvent.preventDefault);
        L.DomEvent.on(a, "click", () => {
            const root = document.documentElement;
            if (!document.fullscreenElement) {
                (root.requestFullscreen || root.webkitRequestFullscreen)?.call(root);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
            }
        });
        return c;
    },
});
map.addControl(new FullscreenControl());

/* Recenter-on-home control — Leaflet custom control matching the
   built-in zoom/fullscreen buttons.  Click flies the map back to
   the operator's home location (window.__GLOWUP_HOME__, injected
   server-side from /etc/glowup/site.json :: maritime_reference).
   flyTo (rather than instant setView) keeps spatial context when
   the user has wandered far from home — they see the camera move,
   not a teleport.  Hidden via CSS when no home is configured. */
const HomeControl = L.Control.extend({
    options: { position: "topleft" },
    onAdd: function() {
        const c = L.DomUtil.create(
            "div",
            "leaflet-bar leaflet-control leaflet-control-home",
        );
        const a = L.DomUtil.create("a", "", c);
        a.href = "#";
        a.title = "Recenter on home";
        a.setAttribute("role", "button");
        a.setAttribute("aria-label", "Recenter on home");
        /* Inline SVG house glyph — no external asset, no font-icon
           dependency, scales with the 16-px line baseline. */
        a.innerHTML =
            '<svg width="16" height="16" viewBox="0 0 16 16" ' +
            'fill="none" stroke="currentColor" stroke-width="1.5" ' +
            'stroke-linejoin="round" aria-hidden="true">' +
              '<path d="M2 7.5 L8 2 L14 7.5 L14 13.5 L10 13.5 ' +
              'L10 9.5 L6 9.5 L6 13.5 L2 13.5 Z"></path>' +
            '</svg>';
        L.DomEvent.disableClickPropagation(c);
        L.DomEvent.on(a, "click", L.DomEvent.preventDefault);
        L.DomEvent.on(a, "click", () => {
            map.flyTo([HOME.lat, HOME.lon], HOME.zoom, { duration: 0.8 });
        });
        return c;
    },
});
map.addControl(new HomeControl());
if (!HAVE_HOME) document.body.classList.add("no-home");

/* Recompute Leaflet's internal sizing on any layout change.  Three
   triggers:  initial rAF (defeats flex-layout race), window resize,
   and entering/exiting fullscreen (the map container resizes). */
requestAnimationFrame(() => map.invalidateSize());
window.addEventListener("resize", () => map.invalidateSize());
document.addEventListener("fullscreenchange",
    () => requestAnimationFrame(() => map.invalidateSize()));

/* Screen-space culling: every poll AND every map moveend pass the
   data through filterToViewport(), which drops vessels outside
   map.getBounds().pad(0.3).  Off-screen vessels get their markers
   removed (cheap on Leaflet; O(1) per marker) so the engine is only
   rendering what the operator can actually see.  Critical at the
   1000+ vessel scale aisstream pumps in.

   markers / trackLines / lastVesselsById / firstFitDone are
   declared earlier in this script — see the "Vessel state" block
   above the panel init.  This kept the temporal-dead-zone-free
   ordering needed by the column-toggle restoration. */

/* Clamp the AIS-style "no data" sentinels.  AIS uses 511 for "no
   heading", -128 for "no rate-of-turn", etc.  Don't render those. */
function realHeading(h) {
    if (h == null) return null;
    if (h === 511) return null;
    if (h < 0 || h >= 360) return null;
    return h;
}
function realSpeed(s) {
    if (s == null) return null;
    /* 102.3 = "speed not available" sentinel in the protocol */
    if (s >= 102.3) return null;
    return s;
}

function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtAge(secs) {
    if (secs == null || isNaN(secs)) return "–";
    if (secs < 0) secs = 0;
    if (secs < 60)   return Math.floor(secs) + "s";
    if (secs < 3600) return Math.floor(secs / 60) + "m";
    return Math.floor(secs / 3600) + "h";
}

function popupHtml(v) {
    const stale = v.stale ? '<span class="stale-tag">stale</span>' : "";
    const speed = realSpeed(v.speed);
    const heading = realHeading(v.heading);
    const course = realHeading(v.course);
    const ageS = (Date.now()/1000) - (v.last_seen || 0);
    const seenForS = v.seen_for_s || 0;
    /* Vessel dimensions: AIS reports four offsets from the GPS
       reference point (to_bow / to_stern / to_port / to_starboard,
       all metres).  Length = bow + stern, beam = port + starboard. */
    const len = (v.to_bow != null && v.to_stern != null)
        ? (v.to_bow + v.to_stern) : null;
    const beam = (v.to_port != null && v.to_starboard != null)
        ? (v.to_port + v.to_starboard) : null;
    /* Signal stats — running mean over the per-vessel sample buffer,
       plus the min/max envelope.  Useful for antenna experiments. */
    const sMean = v.signal_power_mean;
    const sMin  = v.signal_power_min;
    const sMax  = v.signal_power_max;
    const sN    = v.signal_power_count;
    let sigRow = "";
    if (sMean != null && sN > 0) {
        const range = (sMin != null && sMax != null && sN > 1)
            ? ` <span class="lbl" style="margin:0;text-transform:none">range</span> ${sMin.toFixed(1)} / ${sMax.toFixed(1)}`
            : "";
        sigRow =
          `<div class="row"><span class="lbl">Signal</span>` +
          `<span class="val">mean ${sMean.toFixed(1)} dBFS  (n=${sN})${range} · ch ${escapeHtml(v.last_channel || "?")}</span></div>`;
    } else if (v.last_signal_power != null) {
        sigRow = `<div class="row"><span class="lbl">Signal</span><span class="val">${v.last_signal_power.toFixed(1)} dBFS · ch ${escapeHtml(v.last_channel || "?")}</span></div>`;
    }
    const decodeRate = v.decode_rate_per_min;

    /* Flag block: emoji + country name from the ITU MID lookup the
       server adds to every vessel.  Renders as e.g. "🇺🇸 United
       States" on platforms with emoji presentation; falls back to
       just the country name on platforms that don't render the
       regional-indicator letter pair as a flag. */
    const flagEmoji = v.flag_emoji || "";
    const flagCountry = v.flag_country || "";
    const flagBlock = flagCountry
        ? `<div class="row"><span class="lbl">Flag</span><span class="val">${escapeHtml(flagEmoji)} ${escapeHtml(flagCountry)}</span></div>`
        : "";

    return (
      `<div class="name">${escapeHtml(v.shipname || "—")}${stale}</div>` +
      `<div class="mmsi">MMSI ${v.mmsi}` +
        (v.callsign ? ` · <span class="callsign">${escapeHtml(v.callsign)}</span>` : "") +
      `</div>` +
      flagBlock +
      `<div class="row"><span class="lbl">Type</span><span class="val">${escapeHtml(v.shiptype_text || "—")}</span></div>` +
      (v.source ? `<div class="row"><span class="lbl">Source</span><span class="val">${escapeHtml(v.source)}</span></div>` : "") +
      (v.status_text ? `<div class="row"><span class="lbl">Status</span><span class="val">${escapeHtml(v.status_text)}</span></div>` : "") +
      `<div class="row"><span class="lbl">Position</span><span class="val">${(v.lat||0).toFixed(5)}, ${(v.lon||0).toFixed(5)}</span></div>` +
      (speed != null ? `<div class="row"><span class="lbl">Speed</span><span class="val">${speed.toFixed(1)} kt</span></div>` : "") +
      (heading != null ? `<div class="row"><span class="lbl">Heading</span><span class="val">${heading}°</span></div>` : "") +
      (course != null && course !== heading ? `<div class="row"><span class="lbl">Course</span><span class="val">${course}°</span></div>` : "") +
      (len != null ? `<div class="row"><span class="lbl">Dimensions</span><span class="val">${len} m × ${beam != null ? beam + " m" : "—"}</span></div>` : "") +
      (v.destination ? `<div class="row"><span class="lbl">Destination</span><span class="val">${escapeHtml(v.destination)}</span></div>` : "") +
      `<div class="row"><span class="lbl">Last heard</span><span class="val">${fmtAge(ageS)} ago</span></div>` +
      `<div class="row"><span class="lbl">Tracked</span><span class="val">${fmtAge(seenForS)} (${v.msg_count} decodes` +
        (decodeRate ? `, ${decodeRate.toFixed(1)}/min` : "") + `)</span></div>` +
      sigRow
    );
}

/* Boat-shape SVG path.  Bow tip at top (heading 0° = north), stern
   notch at bottom — looks like a stylised vessel from above.  Drawn
   in a 24×32 viewBox.  CSS rotates the whole glyph to point in the
   reported heading; --fill / --alpha pick up the type colour and
   stale-state opacity. */
const BOAT_PATH = "M12 2 L20 22 L20 28 L13 26 L11 26 L4 28 L4 22 Z";

function makeVesselIcon(colour, heading, alpha, size, external) {
    const sz = size || 22;
    const cls = "vessel-glyph" + (external ? " external" : "");
    const html =
      `<div class="${cls}" style="--rot:${heading || 0}deg;--fill:${colour};--alpha:${alpha}">` +
        `<svg viewBox="0 0 24 32" preserveAspectRatio="xMidYMid meet">` +
          `<path d="${BOAT_PATH}"></path>` +
        `</svg>` +
      `</div>`;
    return L.divIcon({
        className: "vessel-icon",
        html: html,
        iconSize: [sz, Math.round(sz * 32 / 24)],
        iconAnchor: [sz / 2, Math.round(sz * 32 / 24) / 2],
    });
}

function upsertVessel(v) {
    if (v.lat == null || v.lon == null) return;
    const colour = colourFor(v.shiptype_text);
    const heading = realHeading(v.heading);
    const speed = realSpeed(v.speed);
    const isMoving = speed != null && speed > 0.5;
    const alpha = v.stale ? 0.45 : 0.95;
    /* External-source vessels (aisstream.io etc) render hollow +
       dashed so it's obvious at a glance which decodes are from our
       own RX vs the internet.  v.source is set on the buffer side
       from the ``"source"`` field in the producer's MQTT payload;
       absent / null means local AIS-catcher. */
    const external = v.source && v.source !== "local";
    /* Marker size — sized for trackpad click-targets and to read at
       the typical port-area zoom.  Boat-icon glyphs use a square box
       and the SVG renders inside; circle markers use the same value
       as a radius. */
    const sz = v.stale ? 18 : (isMoving ? 26 : 22);
    const pos = [v.lat, v.lon];

    /* Marker shape choice: boat-triangle when heading is known
       (orientation conveys real information), CircleMarker when
       heading is unknown / sentinel (a directional shape would lie
       about facing).  Switching shape requires destroy+recreate on
       Leaflet so we replace the marker on type change rather than
       try to mutate. */
    const wantBoat = heading != null;
    let entry = markers.get(v.mmsi);
    if (entry && entry.kind !== (wantBoat ? "boat" : "circle")) {
        map.removeLayer(entry.marker);
        entry = null;
        markers.delete(v.mmsi);
    }

    /* Pick the right LayerGroup based on source.  Local-RX vessels go
       into localVesselLayer, aisstream-fed into externalVesselLayer
       — the layer-control checkboxes can hide either independently. */
    const targetLayer = external ? externalVesselLayer : localVesselLayer;

    if (!entry) {
        let m;
        if (wantBoat) {
            m = L.marker(pos, {
                icon: makeVesselIcon(colour, heading, alpha, sz, external),
                riseOnHover: true,
            }).addTo(targetLayer);
        } else {
            m = L.circleMarker(pos, {
                radius:      sz / 2,
                color:       external ? colour : MARKER_STROKE,
                weight:      external ? 2 : 3,
                fillColor:   colour,
                fillOpacity: external ? 0.18 : alpha,
                dashArray:   external ? "3 2" : null,
            }).addTo(targetLayer);
        }
        m.bindPopup(popupHtml(v));
        entry = {
            marker: m, heading: null,
            kind: wantBoat ? "boat" : "circle",
            layer: targetLayer,
        };
        markers.set(v.mmsi, entry);
    } else if (entry.layer !== targetLayer) {
        /* Source flipped (rare — vessel we first heard via aisstream
           is now also being decoded locally, or vice versa).  Move
           between layer groups by removing from old + re-adding to
           new; resetting the icon/style happens below. */
        entry.layer.removeLayer(entry.marker);
        targetLayer.addLayer(entry.marker);
        entry.layer = targetLayer;
        entry.marker.setLatLng(pos);
        if (wantBoat) {
            entry.marker.setIcon(makeVesselIcon(colour, heading, alpha, sz, external));
        } else {
            entry.marker.setStyle({
                color:       external ? colour : MARKER_STROKE,
                weight:      external ? 2 : 3,
                fillColor:   colour,
                fillOpacity: external ? 0.18 : alpha,
                radius:      sz / 2,
                dashArray:   external ? "3 2" : null,
            });
        }
        entry.marker.setPopupContent(popupHtml(v));
    } else {
        entry.marker.setLatLng(pos);
        if (wantBoat) {
            entry.marker.setIcon(makeVesselIcon(colour, heading, alpha, sz, external));
        } else {
            entry.marker.setStyle({
                color:       external ? colour : MARKER_STROKE,
                weight:      external ? 2 : 3,
                fillColor:   colour,
                fillOpacity: external ? 0.18 : alpha,
                radius:      sz / 2,
                dashArray:   external ? "3 2" : null,
            });
        }
        entry.marker.setPopupContent(popupHtml(v));
    }

    /* Permanent name label — only shown when shipname is known
       (avoids cluttering the map with magenta "unknown" markers
       that have no name yet).  Speed appended in amber when
       reported, so the label doubles as an at-a-glance speed read.
       Re-bind on every poll so name/speed/stale state stay current. */
    if (v.shipname && v.shipname.trim()) {
        const speedTag = (speed != null && speed >= 0.1)
            ? `<span class="speed">${speed.toFixed(1)} kt</span>` : "";
        const labelHtml = escapeHtml(v.shipname.trim()) + speedTag;
        const labelClass = "vessel-label" + (v.stale ? " stale" : "");
        if (entry.marker.getTooltip()) {
            entry.marker.setTooltipContent(labelHtml);
            const tt = entry.marker.getTooltip();
            tt.options.className = labelClass;
        } else {
            entry.marker.bindTooltip(labelHtml, {
                permanent:   true,
                direction:   "right",
                offset:      [sz / 2 + 4, 0],
                className:   labelClass,
                opacity:     1.0,
                /* interactive=true makes the tooltip's DOM element
                   receive pointer events; clicks propagate to the
                   bound marker, whose bindPopup() above handles the
                   open.  Without this flag Leaflet sets pointer-
                   events: none on the tooltip and the name label is
                   purely decorative.  CSS adds cursor: pointer + a
                   hover state so the affordance is visible. */
                interactive: true,
            });
        }
    } else if (entry.marker.getTooltip()) {
        entry.marker.unbindTooltip();
    }

    /* Heading indicator: a thick polyline from the marker in the
       reported heading direction with a small dark backing line
       underneath for visibility against any basemap colour.  Length
       scales with zoom so it stays visible at port-area scales
       without dominating at ocean scales, and is multiplied by
       (1 + speed/8) so faster vessels get a longer "trail" — an
       at-a-glance speed cue.  Skip if heading is unknown. */
    if (entry.heading) {
        map.removeLayer(entry.heading);
        if (entry.headingBacking) map.removeLayer(entry.headingBacking);
        entry.heading = null;
        entry.headingBacking = null;
    }
    if (heading != null) {
        const speedFactor = Math.max(1.0, 1.0 + (speed || 0) / 8.0);
        const lengthDeg = 0.0055 * speedFactor *
                          Math.pow(2, 13 - map.getZoom());
        const headEnd = [
            v.lat + Math.sin((90 - heading) * Math.PI / 180) * lengthDeg,
            v.lon + Math.cos((90 - heading) * Math.PI / 180) * lengthDeg,
        ];
        /* Dark backing line goes down first, slightly thicker, so the
           coloured top line reads as a stroked indicator regardless
           of basemap colour underneath.  Both go into headingLayer
           so the layer-control toggle hides them as a pair. */
        entry.headingBacking = L.polyline([pos, headEnd], {
            color: MARKER_STROKE, weight: 5, opacity: 0.6,
        }).addTo(headingLayer);
        entry.heading = L.polyline([pos, headEnd], {
            color: colour, weight: 3, opacity: 0.95,
        }).addTo(headingLayer);
    }

    /* Breadcrumb track — polyline through recent positions.  Replace
       whole-cloth on each update so we don't need to dedup.  Weight
       and opacity tuned to be readable against busy port-area OSM
       tiles (roads, building outlines, dock features) without
       overwhelming the marker itself. */
    if (Array.isArray(v.track) && v.track.length >= 2) {
        const pts = v.track.map(p => [p.lat, p.lon]);
        const old = trackLines.get(v.mmsi);
        if (old) trackLayer.removeLayer(old);
        const line = L.polyline(pts, {
            color: colour, weight: 2.5, opacity: 0.7,
        }).addTo(trackLayer);
        trackLines.set(v.mmsi, line);
    }
}

function removeMissingVessels(currentMmsis) {
    for (const [mmsi, entry] of markers) {
        if (!currentMmsis.has(mmsi)) {
            entry.layer.removeLayer(entry.marker);
            if (entry.heading) headingLayer.removeLayer(entry.heading);
            if (entry.headingBacking) headingLayer.removeLayer(entry.headingBacking);
            markers.delete(mmsi);
            const tl = trackLines.get(mmsi);
            if (tl) { trackLayer.removeLayer(tl); trackLines.delete(mmsi); }
        }
    }
}

/* ---------- Screen-space culling -------------------------------------------
   At the 1000+ vessel scale aisstream emits, drawing every vessel everywhere
   in the bbox makes Leaflet sluggish even on fast hardware.  Cull to the
   current viewport plus a 30 % pad — vessels just off-edge stay rendered so
   panning doesn't flash them in/out, but the global Gulf herd doesn't drag
   on the renderer when the operator is zoomed in on Mobile Bay. */

function inViewport(v, bounds) {
    if (v.lat == null || v.lon == null) return false;
    return bounds.contains([v.lat, v.lon]);
}

function renderVessels(vessels) {
    const bounds = map.getBounds().pad(0.3);
    const visible = vessels.filter(v => inViewport(v, bounds));
    const seen = new Set();
    visible.forEach(v => {
        seen.add(v.mmsi);
        upsertVessel(v);
    });
    /* removeMissingVessels evicts both off-viewport AND truly-gone
       vessels — a single pass covers both because the seen set only
       contains in-viewport ones. */
    removeMissingVessels(seen);
}

/* Re-render on every map pan/zoom so vessels just brought into view
   appear immediately instead of waiting for the next 3 s poll.  No
   network call — uses the cached vessels from lastVesselsById. */
map.on("moveend", () => {
    if (lastVesselsById.size === 0) return;
    renderVessels(Array.from(lastVesselsById.values()));
});

async function poll() {
    let json;
    try {
        const r = await fetch("/api/maritime/vessels");
        json = await r.json();
    } catch (e) {
        console.error("maritime poll failed", e);
        return;
    }

    const vessels = json.vessels || [];
    const stats = json.stats || {};

    document.getElementById("vessel-count").textContent     = stats.n_vessels ?? 0;
    document.getElementById("vessel-pos-count").textContent = stats.n_with_position ?? 0;
    document.getElementById("msg-total").textContent        = stats.msg_count ?? 0;
    document.getElementById("last-msg").textContent =
        stats.last_msg_ts ? fmtAge(Date.now()/1000 - stats.last_msg_ts) + " ago" : "–";

    /* Cache the full vessel set keyed by MMSI so the moveend handler
       can re-render off-cached data when the user pans/zooms without
       waiting for the next poll cycle. */
    lastVesselsById.clear();
    vessels.forEach(v => { if (v.mmsi != null) lastVesselsById.set(v.mmsi, v); });

    /* Auto-fit on first non-empty payload — but use ONLY local-RX
       vessels for the framing rather than the full Gulf-wide
       aisstream herd.  Local vessels reflect what the operator's
       actual antenna can hear; an autofit including Houston and
       Tampa would zoom out so far that nothing reads at all.  Fall
       back to the full set if there's no local data yet. */
    if (!firstFitDone && vessels.length > 0) {
        const localOnly = vessels.filter(v => !v.source || v.source === "local");
        const fitSet = (localOnly.length > 0 ? localOnly : vessels);
        const bounds = L.latLngBounds(fitSet.map(v => [v.lat, v.lon]));
        if (bounds.isValid()) {
            map.fitBounds(bounds.pad(0.2), { maxZoom: 13 });
            firstFitDone = true;
        }
    }

    renderVessels(vessels);
    /* Re-render the side-panel table off the same cache.  The
       table is independent from the map's viewport culling — it
       shows the closest-N (or all) vessels in the buffer regardless
       of what is currently on screen. */
    renderTable();
}

poll();
setInterval(poll, POLL_MS);

/* ---------- Buoy layer -----------------------------------------------------
   NDBC observations from the operator-configured stations
   (site.json maritime_buoys).  Backed by the hub's BuoyBuffer
   which subscribes to glowup/maritime/buoy/+ from
   maritime/buoy_scraper.py.

   Cadence: 30 s.  Buoy obs update upstream every 10 min, so 30 s
   is well over-sampled — but the cost is one tiny JSON fetch and
   it keeps the popup-open user from staring at stale data after
   a fresh observation lands. */

const BUOY_POLL_MS = 30000;
const BUOY_STALE_AFTER_S = 1800;   /* 3× NDBC's 10-min update cadence */
const buoyMarkers = new Map();      /* station_id -> Leaflet marker */

/* Diamond-shaped buoy glyph in a divIcon.  Drawn as a square
   rotated 45° via CSS so the SVG path stays simple (rect 0..24,
   0..24).  Distinct shape + colour from the vessel symbology so
   buoys never compete with the AIS-derived data visually. */
function makeBuoyIcon(stale) {
    const sz = 18;
    const alpha = stale ? 0.45 : 0.95;
    const html =
      `<div class="buoy-glyph" style="--alpha:${alpha}">` +
        `<svg viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">` +
          `<rect x="3" y="3" width="18" height="18" rx="1.5"/>` +
        `</svg>` +
      `</div>`;
    return L.divIcon({
        className: "buoy-icon",
        html: html,
        iconSize: [sz, sz],
        iconAnchor: [sz / 2, sz / 2],
    });
}

function fmtNum(v, digits) {
    if (v == null || isNaN(v)) return "—";
    return v.toFixed(digits == null ? 1 : digits);
}

/* Compass-point label for a degree heading — adds a useful at-a-
   glance cue alongside the numeric reading.  16-point rose. */
const _COMPASS_POINTS = [
    "N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE",
    "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW",
];
function compass(deg) {
    if (deg == null || isNaN(deg)) return "";
    const idx = Math.round(((deg % 360) / 22.5)) % 16;
    return _COMPASS_POINTS[idx];
}

function buoyPopupHtml(s) {
    const obsAgeS = s.obs_ts
        ? (Date.now()/1000) - new Date(s.obs_ts).getTime()/1000
        : null;
    const stale = obsAgeS != null && obsAgeS > BUOY_STALE_AFTER_S;
    const ageStr = obsAgeS == null ? "—"
                 : obsAgeS < 60   ? Math.floor(obsAgeS) + "s ago"
                 : obsAgeS < 3600 ? Math.floor(obsAgeS / 60) + "m ago"
                 : Math.floor(obsAgeS / 3600) + "h ago";
    /* Wind row combines speed/gust/direction in one line (the way
       NWS marine forecasts present it) — operator's eye fast-scans
       a single pattern instead of three separate rows. */
    const windDirStr = (s.wind_dir_deg != null)
        ? `${Math.round(s.wind_dir_deg)}° ${compass(s.wind_dir_deg)}`
        : "—";
    const windRow = (s.wind_speed_kt != null || s.wind_gust_kt != null)
        ? `<div class="row"><span class="lbl">Wind</span><span class="val">${windDirStr} · ${fmtNum(s.wind_speed_kt)} kt` +
          (s.wind_gust_kt != null ? ` (gust ${fmtNum(s.wind_gust_kt)})` : "") +
          `</span></div>`
        : "";
    /* Pressure row includes the 3-hour tendency (PTDY) — falling
       pressure is the single best storm signal a buoy gives. */
    const presRow = (s.pressure_mb != null)
        ? `<div class="row"><span class="lbl">Pressure</span><span class="val">${fmtNum(s.pressure_mb)} mb` +
          (s.pressure_tendency_mb != null
            ? ` (3h ${s.pressure_tendency_mb >= 0 ? "+" : ""}${fmtNum(s.pressure_tendency_mb)})` : "") +
          `</span></div>`
        : "";
    const tempRow = (s.air_temp_c != null || s.water_temp_c != null)
        ? `<div class="row"><span class="lbl">Temp</span><span class="val">air ${fmtNum(s.air_temp_c)}°C · water ${fmtNum(s.water_temp_c)}°C</span></div>`
        : "";
    const waveRow = (s.wave_height_m != null)
        ? `<div class="row"><span class="lbl">Waves</span><span class="val">${fmtNum(s.wave_height_m)} m` +
          (s.wave_period_s != null ? ` @ ${fmtNum(s.wave_period_s, 0)}s` : "") +
          (s.wave_dir_deg != null ? ` from ${compass(s.wave_dir_deg)}` : "") +
          `</span></div>`
        : "";
    const tideRow = (s.tide_ft != null)
        ? `<div class="row"><span class="lbl">Tide</span><span class="val">${fmtNum(s.tide_ft, 2)} ft</span></div>`
        : "";
    return (
      `<div class="buoy-popup">` +
        `<div class="station">${escapeHtml(s.name || s.station_id)}</div>` +
        `<div class="obs-age${stale ? " stale" : ""}">${escapeHtml(s.station_id)} · ${ageStr}` +
            (stale ? " · stale" : "") + `</div>` +
        windRow + presRow + tempRow + waveRow + tideRow +
        `<a class="history-link" href="/buoys/${encodeURIComponent(s.station_id)}">history →</a>` +
      `</div>`
    );
}

function renderBuoys(stations) {
    const seen = new Set();
    for (const s of stations) {
        if (s.lat == null || s.lon == null) continue;     /* operator omitted lat/lon — list-only */
        seen.add(s.station_id);
        const obsAgeS = s.obs_ts
            ? (Date.now()/1000) - new Date(s.obs_ts).getTime()/1000
            : null;
        const stale = obsAgeS != null && obsAgeS > BUOY_STALE_AFTER_S;
        let m = buoyMarkers.get(s.station_id);
        if (!m) {
            m = L.marker([s.lat, s.lon], {
                icon: makeBuoyIcon(stale),
                riseOnHover: true,
            }).addTo(buoyLayer);
            m.bindPopup(buoyPopupHtml(s), { className: "" });
            buoyMarkers.set(s.station_id, m);
        } else {
            m.setLatLng([s.lat, s.lon]);
            m.setIcon(makeBuoyIcon(stale));
            m.setPopupContent(buoyPopupHtml(s));
        }
    }
    /* Drop markers for stations that vanished (operator removed
       from site.json + restart). */
    for (const [sid, m] of buoyMarkers) {
        if (!seen.has(sid)) {
            buoyLayer.removeLayer(m);
            buoyMarkers.delete(sid);
        }
    }
}

async function pollBuoys() {
    let json;
    try {
        const r = await fetch("/api/buoys/current");
        json = await r.json();
    } catch (e) {
        console.error("buoy poll failed", e);
        return;
    }
    renderBuoys(json.stations || []);
}
pollBuoys();
setInterval(pollBuoys, BUOY_POLL_MS);

/* ---------- Aircraft layer (ADS-B) ----------------------------------------
   Source: GET /api/sdr/adsb/aircraft, fed by readsb on pi-sensor-01 →
   sdr/adsb.py → glowup/sdr/adsb/aircraft on the hub broker.
   Polled every 5 s — readsb writes aircraft.json every 1 s but the
   marker layer doesn't need that resolution; 5 s is more than fast
   enough for visual tracking and saves a lot of paint cycles when
   the map is dense.

   Aircraft data shape per the dump1090 / readsb contract:
     hex          ICAO 24-bit hex (lowercase)
     flight       callsign (often a few trailing spaces — trim it)
     lat / lon    position (may be absent; aircraft heard but not
                  yet position-decoded)
     alt_baro     barometric altitude (ft)
     alt_geom     GPS altitude (ft)
     gs           ground speed (kt)
     track        true heading (degrees)
     seen         seconds since last decode (we mark stale > 60 s)
     squawk       4-digit transponder code (rendered in popup;
                  7500 / 7600 / 7700 are emergency codes)
   Aircraft without position are dropped from the layer (no marker
   without a fix); they still appear in the upstream JSON for the
   future aircraft-table panel. */

const ADSB_POLL_MS = 5000;
const ADSB_STALE_AFTER_S = 60;
const aircraftMarkers = new Map();      /* icao → Leaflet marker */

/* Plane SVG path — bow tip up at heading 0°, swept-back wings,
   tailfin notch.  Drawn in a 28×28 viewBox; CSS rotates the whole
   glyph to point in the reported track direction. */
const PLANE_PATH =
    "M14 1 L17 11 L26 16 L26 19 L17 17 L17 22 L20 25 L20 27 " +
    "L14 25 L8 27 L8 25 L11 22 L11 17 L2 19 L2 16 L11 11 Z";

function makeAircraftIcon(track, alpha) {
    const sz = 22;
    const fill = `rgba(255, 217, 102, ${alpha})`;
    const html =
      `<div class="aircraft-glyph" style="--rot:${track || 0}deg;--alpha-fill:${fill}">` +
        `<svg viewBox="0 0 28 28" preserveAspectRatio="xMidYMid meet">` +
          `<path d="${PLANE_PATH}"></path>` +
        `</svg>` +
      `</div>`;
    return L.divIcon({
        className: "aircraft-icon",
        html: html,
        iconSize: [sz, sz],
        iconAnchor: [sz / 2, sz / 2],
    });
}

/* Real-value getters — drop ADS-B / dump1090 nulls cleanly. */
function realAltitude(a) {
    /* alt_baro can be the string "ground" for taxiing aircraft.
       Treat as 0 so the popup reads "0 ft" rather than "—". */
    const v = a.alt_baro ?? a.alt_geom;
    if (v === "ground") return 0;
    if (typeof v === "number" && isFinite(v)) return v;
    return null;
}

function aircraftPopupHtml(a) {
    const cs = (a.flight || "").trim() || "—";
    const alt = realAltitude(a);
    const track = (typeof a.track === "number") ? Math.round(a.track) : null;
    const gs = (typeof a.gs === "number") ? a.gs : null;
    const seen = (typeof a.seen === "number") ? a.seen : null;
    const sq = a.squawk;
    /* Transponder emergency codes — 7500 hijack, 7600 lost-comms,
       7700 general emergency.  Surface these prominently. */
    const sqEmerg = (sq === "7500" || sq === "7600" || sq === "7700");
    return (
      `<div class="aircraft-popup">` +
        `<div class="callsign">${escapeHtml(cs)}</div>` +
        `<div class="icao">ICAO ${escapeHtml((a.hex || "").toUpperCase())}` +
          (sq ? ` · sq <span class="val"${sqEmerg ? ' style="color:#ff5040"' : ""}>${escapeHtml(sq)}</span>` : "") +
        `</div>` +
        (alt != null ? `<div class="row"><span class="lbl">Altitude</span><span class="val">${alt.toLocaleString()} ft</span></div>` : "") +
        (gs != null ? `<div class="row"><span class="lbl">Speed</span><span class="val">${gs.toFixed(0)} kt</span></div>` : "") +
