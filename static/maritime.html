<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowUp Maritime</title>

<!-- Leaflet 1.9.4 from unpkg, BSD-2-clause.  No API key required;
     uses OpenStreetMap tiles by default (also no key, but heavy
     polling should be avoided per OSM's tile usage policy — we
     poll JSON every few seconds and only fetch tiles on user pan/
     zoom, well within bounds for a single-user dashboard). -->
<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin="" />

<style>
/* -------------------------------------------------------------------
   Maritime dashboard — full-bleed map, minimum chrome.  Per the
   spec: most of the real estate goes to the map.  The thin top bar
   carries dataset-status + nav; the popup carries per-vessel detail.
   ------------------------------------------------------------------- */
:root {
    --bg:        #0c0e12;
    --panel:     #161a21;
    --text:      #d8dde6;
    --label:     #6f7a8a;
    --accent:    #6dd9c8;     /* mint — same as /airwaves */
    --accent-2:  #ffb347;     /* warm amber */
    --new:       #ffd966;
    --border:    rgba(255,255,255,0.08);
    --mono:      "SF Mono", "Menlo", "Consolas", monospace;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Helvetica Neue", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.4;
    display: flex;
    flex-direction: column;
}

/* Top strip — slim, monospaced status + nav. */
header.bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    flex-wrap: wrap;
}
header.bar h1 {
    font-weight: 400;
    font-size: 1.0rem;
    letter-spacing: -0.01em;
}
header.bar h1 .accent { color: var(--accent); }
header.bar .live {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
header.bar .live .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }
header.bar .stat {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--label);
}
header.bar .stat .v { color: var(--text); }
header.bar .nav { margin-left: auto; }
header.bar .nav a {
    color: var(--accent);
    text-decoration: none;
    margin-left: 14px;
    opacity: 0.8;
    font-size: 0.85rem;
}
header.bar .nav a:hover { opacity: 1; }

/* Map fills remaining vertical space.  Leaflet REQUIRES the map
   container to have a non-zero height at init — flex sizing alone
   has been observed to race with the script and yield a 0-height
   container.  Belt-and-braces: explicit min-height on top of the
   flex grow, and a call to map.invalidateSize() after init below. */
#map {
    flex: 1 1 auto;
    min-height: 80vh;
    background: var(--bg);
}

/* Leaflet popup theming.  Default popup is light-on-light; override
   to match the dark dashboard palette. */
.leaflet-popup-content-wrapper {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.6);
}
.leaflet-popup-tip { background: var(--panel); }
.leaflet-popup-content {
    margin: 10px 14px;
    font-size: 0.85rem;
    line-height: 1.45;
}
.leaflet-popup-content .name {
    color: var(--accent);
    font-weight: 500;
    font-size: 0.95rem;
}
.leaflet-popup-content .mmsi,
.leaflet-popup-content .callsign {
    font-family: var(--mono);
    color: var(--label);
    font-size: 0.78rem;
}
.leaflet-popup-content .row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
}
.leaflet-popup-content .row .lbl {
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 0.7rem;
    min-width: 6em;
}
.leaflet-popup-content .row .val { font-family: var(--mono); }
.leaflet-popup-content .stale-tag {
    color: var(--accent-2);
    font-family: var(--mono);
    font-size: 0.72rem;
    margin-left: 6px;
}

/* Vessel glyphs — boat-shape DivIcon used when we have a real
   heading (so the icon's orientation conveys "this ship is pointed
   that way" at a glance, Marine-Traffic-style).  CircleMarkers are
   used as a fallback when the AIS heading is unknown / sentinel
   511 — there's nothing to rotate to, so a directional shape would
   lie.  Sizes are deliberately oversize for trackpad clicks; the
   dark stroke ensures contrast against any basemap colour. */
.vessel-icon { background: transparent !important; border: none !important; }
.vessel-glyph {
    transform: rotate(var(--rot, 0deg));
    transform-origin: 50% 50%;
    width: 100%; height: 100%;
}
.vessel-glyph svg { width: 100%; height: 100%; display: block; }
.vessel-glyph svg path {
    fill: var(--fill, #ff00ff);
    fill-opacity: var(--alpha, 0.95);
    stroke: #0a1018;
    stroke-width: 2;
    stroke-linejoin: round;
}
/* External-source (aisstream.io etc) vessels — hollow + dashed
   stroke so it's obvious at a glance that the data came from the
   internet rather than our own RX.  Fill is muted, stroke uses the
   type colour. */
.vessel-glyph.external svg path {
    fill: var(--fill, #ff00ff);
    fill-opacity: 0.18;
    stroke: var(--fill, #ff00ff);
    stroke-width: 2;
    stroke-dasharray: 3 2;
}

/* Vessel name label — permanent tooltip for named vessels only.
   Compact, monospaced, dark with thin border so it stays readable
   over busy port-area tiles without overpowering the map. */
.vessel-label {
    background: rgba(22, 26, 33, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.vessel-label::before { display: none !important; }
.vessel-label.stale { opacity: 0.55; }
.vessel-label .speed {
    color: var(--accent-2);
    margin-left: 6px;
    font-weight: 400;
}
/* "Vessel name labels" overlay toggle — when LabelsToggleLayer is
   removed from the map, body gets this class and every permanent
   tooltip drops out of the viewport without us re-binding 1300
   tooltips.  CSS does the heavy lifting in a single rule. */
body.no-vessel-labels .vessel-label,
body.no-vessel-labels .leaflet-tooltip.vessel-label { display: none !important; }

/* Fullscreen toggle button — square 30 px control matching Leaflet's
   built-in zoom buttons in style. */
.leaflet-control-fullscreen a {
    background-color: #fff;
    width: 30px;
    height: 30px;
    line-height: 30px;
    text-align: center;
    text-decoration: none;
    color: #333;
    font-size: 18px;
    display: block;
}
.leaflet-control-fullscreen a:hover { background-color: #f4f4f4; }
/* Dark-theme override to match the rest of the dashboard chrome. */
.leaflet-control-fullscreen a {
    background-color: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
}
.leaflet-control-fullscreen a:hover {
    background-color: var(--panel-2) !important;
}

/* Leaflet attribution / controls — keep them but mute the colors so
   they don't clash with the dashboard palette. */
.leaflet-control-attribution {
    background: rgba(22, 26, 33, 0.85) !important;
    color: var(--label) !important;
    border-top: 1px solid var(--border);
}
.leaflet-control-attribution a { color: var(--accent) !important; }
.leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
}
</style>
</head>
<body>

<header class="bar">
    <h1>GlowUp <span class="accent">Maritime</span></h1>
    <div class="live"><span class="dot"></span>live · AIS</div>
    <div class="stat"><span class="v" id="vessel-count">0</span> vessels</div>
    <div class="stat"><span class="v" id="vessel-pos-count">0</span> with position</div>
    <div class="stat">last msg <span class="v" id="last-msg">–</span></div>
    <div class="stat">total <span class="v" id="msg-total">0</span></div>
    <div class="nav">
        <a href="/home">home</a>
        <a href="/airwaves">airwaves</a>
        <a href="/meters">meters</a>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin=""></script>
<script>
"use strict";

/* ------------------------------------------------------------------
   /maritime — live AIS map.

   Source of truth: GET /api/maritime/vessels returns
   {stats, vessels: [...]} where each vessel carries last-known
   position, identifiers, course/speed/heading, and a recent
   breadcrumb track.  Producer is AIS-catcher → MQTT → hub-side
   MaritimeBuffer.

   Polling cadence: every 3 s.  AIS Class A position broadcasts
   are 2-10 s for vessels under way, much sparser when anchored,
   so 3 s gives near-real-time motion without hammering the API.
   ------------------------------------------------------------------ */

const POLL_MS = 3000;
const DEFAULT_CENTER = [30.69, -88.04];   /* fallback if no vessels yet */
const DEFAULT_ZOOM = 11;

/* Ship-type colour map.  AIS shiptype is a 0-99 integer; the
   "shiptype_text" string from AIS-catcher already groups it into
   human categories (Tug, Cargo, Tanker, Passenger, etc.) so we
   colour-by-string.  These fills are tuned for an OSM background
   (light water + cream land + grey roads), so the original
   dark-UI palette (mint / pale-cyan / pale-green) was scrapped:
   those blend INTO water.  Every marker also gets a dark outline
   below (weight 2.5 stroke #0a1018) so the fill colour does not
   have to fight the basemap alone. */
const SHIP_COLOURS = {
    "Tug":               "#ff7a00",  /* deep orange — pops on water + land */
    "Cargo":             "#1f4eff",  /* deep blue — saturated past water */
    "Tanker":            "#cc0033",  /* deep red */
    "Passenger":         "#1aa84a",  /* forest green — darker than OSM land */
    "Fishing":           "#7e3aff",  /* violet */
    "Pilot Vessel":      "#ffcc00",  /* gold yellow */
    "Pleasure craft":    "#ff33aa",  /* hot pink */
    "Sailing":           "#ff5500",  /* vermilion — distinct from Tug orange */
    "Search and Rescue": "#ff0000",  /* pure red — emergency-coded */
    "Law enforcement":   "#003fbf",  /* navy */
    "Military ops":      "#5e2b97",  /* dark purple */
};
const UNKNOWN_COLOUR = "#ff00ff";    /* magenta — never the basemap */
function colourFor(typeText) {
    if (!typeText) return UNKNOWN_COLOUR;
    return SHIP_COLOURS[typeText] || UNKNOWN_COLOUR;
}
const MARKER_STROKE = "#0a1018";      /* near-black outline on every marker */

/* ----- Map setup ----- */
const map = L.map("map", {
    zoomControl: true,
    attributionControl: true,
}).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

/* Base layer: OpenStreetMap, the standard reference basemap.
   Free, no key.  Polling tiles only on user pan/zoom keeps us well
   within OSM's tile-usage policy for a single-user dashboard. */
const osmBase = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
}).addTo(map);

/* Overlay: OpenSeaMap nautical chart.  Community-maintained
   transparent overlay served from openseamap.org — buoys, lights,
   depth marks, channel markers, restricted areas, marina symbols.
   Tile URL stable for ~15 years and license-compatible (CC-BY-SA).
   Toggleable via the layer-control widget below. */
const openSeaMap = L.tileLayer(
    "https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openseamap.org/">OpenSeaMap</a> contributors (CC-BY-SA)',
    maxZoom: 18,
    opacity: 0.95,
}).addTo(map);

/* ----- Feature layer groups -----
   Each toggleable feature lives in its own LayerGroup so the
   layer-control checkboxes drive add/remove uniformly.  Vessel
   markers go into either the local-RX or external group based
   on their ``source`` field; tracks and heading indicators each
   get their own group so they can be hidden independently of the
   markers themselves. */
const localVesselLayer    = L.featureGroup().addTo(map);
const externalVesselLayer = L.featureGroup().addTo(map);
const trackLayer          = L.featureGroup().addTo(map);
const headingLayer        = L.featureGroup().addTo(map);

/* Labels are bound directly to markers as Leaflet tooltips, so they
   can't be added to a LayerGroup the same way.  Workaround: a
   no-render custom layer whose add/remove flips a body-class that
   CSS uses to hide all .vessel-label tooltips at once.  This lets
   the layer-control widget treat labels as a first-class togglable
   overlay without us building a separate UI. */
const LabelsToggleLayer = L.Layer.extend({
    onAdd:    function() { document.body.classList.remove("no-vessel-labels"); },
    onRemove: function() { document.body.classList.add("no-vessel-labels"); },
});
const labelsToggle = (new LabelsToggleLayer()).addTo(map);

/* Layer control — top-right collapsible widget.  Tile basemap and
   nautical-chart overlay are radio / overlay tile layers; the four
   feature groups + labels toggle let the operator hide/show vessel
   classes, breadcrumb tracks, heading indicators, and name labels
   independently.  Collapses by default; cracking the ☰ control
   reveals the full set. */
L.control.layers(
    { "OpenStreetMap": osmBase },
    {
        "Nautical chart (OpenSeaMap)": openSeaMap,
        "Vessels — local RX":          localVesselLayer,
        "Vessels — aisstream":         externalVesselLayer,
        "Breadcrumb tracks":           trackLayer,
        "Heading indicators":          headingLayer,
        "Vessel name labels":          labelsToggle,
    },
    { collapsed: true, position: "topright" },
).addTo(map);

/* Fullscreen toggle — custom Leaflet control mirroring the look of
   the built-in zoom control (top-left, square buttons).  Click
   requests document fullscreen on the map's container; click again
   exits.  Browser API takes care of the actual fullscreen UX
   (escape key to exit, etc.). */
const FullscreenControl = L.Control.extend({
    options: { position: "topleft" },
    onAdd: function() {
        const c = L.DomUtil.create(
            "div",
            "leaflet-bar leaflet-control leaflet-control-fullscreen",
        );
        const a = L.DomUtil.create("a", "", c);
        a.href = "#";
        a.title = "Toggle fullscreen";
        a.setAttribute("role", "button");
        a.setAttribute("aria-label", "Toggle fullscreen");
        a.innerHTML = "&#x26F6;";  /* ⛶ — fullscreen glyph */
        L.DomEvent.disableClickPropagation(c);
        L.DomEvent.on(a, "click", L.DomEvent.preventDefault);
        L.DomEvent.on(a, "click", () => {
            const root = document.documentElement;
            if (!document.fullscreenElement) {
                (root.requestFullscreen || root.webkitRequestFullscreen)?.call(root);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
            }
        });
        return c;
    },
});
map.addControl(new FullscreenControl());

/* Recompute Leaflet's internal sizing on any layout change.  Three
   triggers:  initial rAF (defeats flex-layout race), window resize,
   and entering/exiting fullscreen (the map container resizes). */
requestAnimationFrame(() => map.invalidateSize());
window.addEventListener("resize", () => map.invalidateSize());
document.addEventListener("fullscreenchange",
    () => requestAnimationFrame(() => map.invalidateSize()));

/* ----- Vessel state -----
   markers:         mmsi -> { marker, heading, headingBacking, kind, layer }
                    (layer is the LayerGroup the marker is currently in,
                     so we can move it on source change without leaks)
   trackLines:      mmsi -> Polyline (lives in trackLayer)
   lastVesselsById: mmsi -> raw vessel record from the most recent poll;
                    used by the moveend handler to re-render after a
                    pan/zoom without waiting for the next poll cycle.

   Screen-space culling: every poll AND every map moveend pass the
   data through filterToViewport(), which drops vessels outside
   map.getBounds().pad(0.3).  Off-screen vessels get their markers
   removed (cheap on Leaflet; O(1) per marker) so the engine is only
   rendering what the operator can actually see.  Critical at the
   1000+ vessel scale aisstream pumps in. */
const markers = new Map();
const trackLines = new Map();
const lastVesselsById = new Map();
let firstFitDone = false;

/* Clamp the AIS-style "no data" sentinels.  AIS uses 511 for "no
   heading", -128 for "no rate-of-turn", etc.  Don't render those. */
function realHeading(h) {
    if (h == null) return null;
    if (h === 511) return null;
    if (h < 0 || h >= 360) return null;
    return h;
}
function realSpeed(s) {
    if (s == null) return null;
    /* 102.3 = "speed not available" sentinel in the protocol */
    if (s >= 102.3) return null;
    return s;
}

function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtAge(secs) {
    if (secs == null || isNaN(secs)) return "–";
    if (secs < 0) secs = 0;
    if (secs < 60)   return Math.floor(secs) + "s";
    if (secs < 3600) return Math.floor(secs / 60) + "m";
    return Math.floor(secs / 3600) + "h";
}

function popupHtml(v) {
    const stale = v.stale ? '<span class="stale-tag">stale</span>' : "";
    const speed = realSpeed(v.speed);
    const heading = realHeading(v.heading);
    const course = realHeading(v.course);
    const ageS = (Date.now()/1000) - (v.last_seen || 0);
    const seenForS = v.seen_for_s || 0;
    /* Vessel dimensions: AIS reports four offsets from the GPS
       reference point (to_bow / to_stern / to_port / to_starboard,
       all metres).  Length = bow + stern, beam = port + starboard. */
    const len = (v.to_bow != null && v.to_stern != null)
        ? (v.to_bow + v.to_stern) : null;
    const beam = (v.to_port != null && v.to_starboard != null)
        ? (v.to_port + v.to_starboard) : null;
    /* Signal stats — running mean over the per-vessel sample buffer,
       plus the min/max envelope.  Useful for antenna experiments. */
    const sMean = v.signal_power_mean;
    const sMin  = v.signal_power_min;
    const sMax  = v.signal_power_max;
    const sN    = v.signal_power_count;
    let sigRow = "";
    if (sMean != null && sN > 0) {
        const range = (sMin != null && sMax != null && sN > 1)
            ? ` <span class="lbl" style="margin:0;text-transform:none">range</span> ${sMin.toFixed(1)} / ${sMax.toFixed(1)}`
            : "";
        sigRow =
          `<div class="row"><span class="lbl">Signal</span>` +
          `<span class="val">mean ${sMean.toFixed(1)} dBFS  (n=${sN})${range} · ch ${escapeHtml(v.last_channel || "?")}</span></div>`;
    } else if (v.last_signal_power != null) {
        sigRow = `<div class="row"><span class="lbl">Signal</span><span class="val">${v.last_signal_power.toFixed(1)} dBFS · ch ${escapeHtml(v.last_channel || "?")}</span></div>`;
    }
    const decodeRate = v.decode_rate_per_min;

    /* Flag block: emoji + country name from the ITU MID lookup the
       server adds to every vessel.  Renders as e.g. "🇺🇸 United
       States" on platforms with emoji presentation; falls back to
       just the country name on platforms that don't render the
       regional-indicator letter pair as a flag. */
    const flagEmoji = v.flag_emoji || "";
    const flagCountry = v.flag_country || "";
    const flagBlock = flagCountry
        ? `<div class="row"><span class="lbl">Flag</span><span class="val">${escapeHtml(flagEmoji)} ${escapeHtml(flagCountry)}</span></div>`
        : "";

    return (
      `<div class="name">${escapeHtml(v.shipname || "—")}${stale}</div>` +
      `<div class="mmsi">MMSI ${v.mmsi}` +
        (v.callsign ? ` · <span class="callsign">${escapeHtml(v.callsign)}</span>` : "") +
      `</div>` +
      flagBlock +
      `<div class="row"><span class="lbl">Type</span><span class="val">${escapeHtml(v.shiptype_text || "—")}</span></div>` +
      (v.source ? `<div class="row"><span class="lbl">Source</span><span class="val">${escapeHtml(v.source)}</span></div>` : "") +
      (v.status_text ? `<div class="row"><span class="lbl">Status</span><span class="val">${escapeHtml(v.status_text)}</span></div>` : "") +
      `<div class="row"><span class="lbl">Position</span><span class="val">${(v.lat||0).toFixed(5)}, ${(v.lon||0).toFixed(5)}</span></div>` +
      (speed != null ? `<div class="row"><span class="lbl">Speed</span><span class="val">${speed.toFixed(1)} kt</span></div>` : "") +
      (heading != null ? `<div class="row"><span class="lbl">Heading</span><span class="val">${heading}°</span></div>` : "") +
      (course != null && course !== heading ? `<div class="row"><span class="lbl">Course</span><span class="val">${course}°</span></div>` : "") +
      (len != null ? `<div class="row"><span class="lbl">Dimensions</span><span class="val">${len} m × ${beam != null ? beam + " m" : "—"}</span></div>` : "") +
      (v.destination ? `<div class="row"><span class="lbl">Destination</span><span class="val">${escapeHtml(v.destination)}</span></div>` : "") +
      `<div class="row"><span class="lbl">Last heard</span><span class="val">${fmtAge(ageS)} ago</span></div>` +
      `<div class="row"><span class="lbl">Tracked</span><span class="val">${fmtAge(seenForS)} (${v.msg_count} decodes` +
        (decodeRate ? `, ${decodeRate.toFixed(1)}/min` : "") + `)</span></div>` +
      sigRow
    );
}

/* Boat-shape SVG path.  Bow tip at top (heading 0° = north), stern
   notch at bottom — looks like a stylised vessel from above.  Drawn
   in a 24×32 viewBox.  CSS rotates the whole glyph to point in the
   reported heading; --fill / --alpha pick up the type colour and
   stale-state opacity. */
const BOAT_PATH = "M12 2 L20 22 L20 28 L13 26 L11 26 L4 28 L4 22 Z";

function makeVesselIcon(colour, heading, alpha, size, external) {
    const sz = size || 22;
    const cls = "vessel-glyph" + (external ? " external" : "");
    const html =
      `<div class="${cls}" style="--rot:${heading || 0}deg;--fill:${colour};--alpha:${alpha}">` +
        `<svg viewBox="0 0 24 32" preserveAspectRatio="xMidYMid meet">` +
          `<path d="${BOAT_PATH}"></path>` +
        `</svg>` +
      `</div>`;
    return L.divIcon({
        className: "vessel-icon",
        html: html,
        iconSize: [sz, Math.round(sz * 32 / 24)],
        iconAnchor: [sz / 2, Math.round(sz * 32 / 24) / 2],
    });
}

function upsertVessel(v) {
    if (v.lat == null || v.lon == null) return;
    const colour = colourFor(v.shiptype_text);
    const heading = realHeading(v.heading);
    const speed = realSpeed(v.speed);
    const isMoving = speed != null && speed > 0.5;
    const alpha = v.stale ? 0.45 : 0.95;
    /* External-source vessels (aisstream.io etc) render hollow +
       dashed so it's obvious at a glance which decodes are from our
       own RX vs the internet.  v.source is set on the buffer side
       from the ``"source"`` field in the producer's MQTT payload;
       absent / null means local AIS-catcher. */
    const external = v.source && v.source !== "local";
    /* Marker size — sized for trackpad click-targets and to read at
       the typical port-area zoom.  Boat-icon glyphs use a square box
       and the SVG renders inside; circle markers use the same value
       as a radius. */
    const sz = v.stale ? 18 : (isMoving ? 26 : 22);
    const pos = [v.lat, v.lon];

    /* Marker shape choice: boat-triangle when heading is known
       (orientation conveys real information), CircleMarker when
       heading is unknown / sentinel (a directional shape would lie
       about facing).  Switching shape requires destroy+recreate on
       Leaflet so we replace the marker on type change rather than
       try to mutate. */
    const wantBoat = heading != null;
    let entry = markers.get(v.mmsi);
    if (entry && entry.kind !== (wantBoat ? "boat" : "circle")) {
        map.removeLayer(entry.marker);
        entry = null;
        markers.delete(v.mmsi);
    }

    /* Pick the right LayerGroup based on source.  Local-RX vessels go
       into localVesselLayer, aisstream-fed into externalVesselLayer
       — the layer-control checkboxes can hide either independently. */
    const targetLayer = external ? externalVesselLayer : localVesselLayer;

    if (!entry) {
        let m;
        if (wantBoat) {
            m = L.marker(pos, {
                icon: makeVesselIcon(colour, heading, alpha, sz, external),
                riseOnHover: true,
            }).addTo(targetLayer);
        } else {
            m = L.circleMarker(pos, {
                radius:      sz / 2,
                color:       external ? colour : MARKER_STROKE,
                weight:      external ? 2 : 3,
                fillColor:   colour,
                fillOpacity: external ? 0.18 : alpha,
                dashArray:   external ? "3 2" : null,
            }).addTo(targetLayer);
        }
        m.bindPopup(popupHtml(v));
        entry = {
            marker: m, heading: null,
            kind: wantBoat ? "boat" : "circle",
            layer: targetLayer,
        };
        markers.set(v.mmsi, entry);
    } else if (entry.layer !== targetLayer) {
        /* Source flipped (rare — vessel we first heard via aisstream
           is now also being decoded locally, or vice versa).  Move
           between layer groups by removing from old + re-adding to
           new; resetting the icon/style happens below. */
        entry.layer.removeLayer(entry.marker);
        targetLayer.addLayer(entry.marker);
        entry.layer = targetLayer;
        entry.marker.setLatLng(pos);
        if (wantBoat) {
            entry.marker.setIcon(makeVesselIcon(colour, heading, alpha, sz, external));
        } else {
            entry.marker.setStyle({
                color:       external ? colour : MARKER_STROKE,
                weight:      external ? 2 : 3,
                fillColor:   colour,
                fillOpacity: external ? 0.18 : alpha,
                radius:      sz / 2,
                dashArray:   external ? "3 2" : null,
            });
        }
        entry.marker.setPopupContent(popupHtml(v));
    } else {
        entry.marker.setLatLng(pos);
        if (wantBoat) {
            entry.marker.setIcon(makeVesselIcon(colour, heading, alpha, sz, external));
        } else {
            entry.marker.setStyle({
                color:       external ? colour : MARKER_STROKE,
                weight:      external ? 2 : 3,
                fillColor:   colour,
                fillOpacity: external ? 0.18 : alpha,
                radius:      sz / 2,
                dashArray:   external ? "3 2" : null,
            });
        }
        entry.marker.setPopupContent(popupHtml(v));
    }

    /* Permanent name label — only shown when shipname is known
       (avoids cluttering the map with magenta "unknown" markers
       that have no name yet).  Speed appended in amber when
       reported, so the label doubles as an at-a-glance speed read.
       Re-bind on every poll so name/speed/stale state stay current. */
    if (v.shipname && v.shipname.trim()) {
        const speedTag = (speed != null && speed >= 0.1)
            ? `<span class="speed">${speed.toFixed(1)} kt</span>` : "";
        const labelHtml = escapeHtml(v.shipname.trim()) + speedTag;
        const labelClass = "vessel-label" + (v.stale ? " stale" : "");
        if (entry.marker.getTooltip()) {
            entry.marker.setTooltipContent(labelHtml);
            const tt = entry.marker.getTooltip();
            tt.options.className = labelClass;
        } else {
            entry.marker.bindTooltip(labelHtml, {
                permanent:   true,
                direction:   "right",
                offset:      [sz / 2 + 4, 0],
                className:   labelClass,
                opacity:     1.0,
            });
        }
    } else if (entry.marker.getTooltip()) {
        entry.marker.unbindTooltip();
    }

    /* Heading indicator: a thick polyline from the marker in the
       reported heading direction with a small dark backing line
       underneath for visibility against any basemap colour.  Length
       scales with zoom so it stays visible at port-area scales
       without dominating at ocean scales, and is multiplied by
       (1 + speed/8) so faster vessels get a longer "trail" — an
       at-a-glance speed cue.  Skip if heading is unknown. */
    if (entry.heading) {
        map.removeLayer(entry.heading);
        if (entry.headingBacking) map.removeLayer(entry.headingBacking);
        entry.heading = null;
        entry.headingBacking = null;
    }
    if (heading != null) {
        const speedFactor = Math.max(1.0, 1.0 + (speed || 0) / 8.0);
        const lengthDeg = 0.0055 * speedFactor *
                          Math.pow(2, 13 - map.getZoom());
        const headEnd = [
            v.lat + Math.sin((90 - heading) * Math.PI / 180) * lengthDeg,
            v.lon + Math.cos((90 - heading) * Math.PI / 180) * lengthDeg,
        ];
        /* Dark backing line goes down first, slightly thicker, so the
           coloured top line reads as a stroked indicator regardless
           of basemap colour underneath.  Both go into headingLayer
           so the layer-control toggle hides them as a pair. */
        entry.headingBacking = L.polyline([pos, headEnd], {
            color: MARKER_STROKE, weight: 5, opacity: 0.6,
        }).addTo(headingLayer);
        entry.heading = L.polyline([pos, headEnd], {
            color: colour, weight: 3, opacity: 0.95,
        }).addTo(headingLayer);
    }

    /* Breadcrumb track — polyline through recent positions.  Replace
       whole-cloth on each update so we don't need to dedup.  Weight
       and opacity tuned to be readable against busy port-area OSM
       tiles (roads, building outlines, dock features) without
       overwhelming the marker itself. */
    if (Array.isArray(v.track) && v.track.length >= 2) {
        const pts = v.track.map(p => [p.lat, p.lon]);
        const old = trackLines.get(v.mmsi);
        if (old) trackLayer.removeLayer(old);
        const line = L.polyline(pts, {
            color: colour, weight: 2.5, opacity: 0.7,
        }).addTo(trackLayer);
        trackLines.set(v.mmsi, line);
    }
}

function removeMissingVessels(currentMmsis) {
    for (const [mmsi, entry] of markers) {
        if (!currentMmsis.has(mmsi)) {
            entry.layer.removeLayer(entry.marker);
            if (entry.heading) headingLayer.removeLayer(entry.heading);
            if (entry.headingBacking) headingLayer.removeLayer(entry.headingBacking);
            markers.delete(mmsi);
            const tl = trackLines.get(mmsi);
            if (tl) { trackLayer.removeLayer(tl); trackLines.delete(mmsi); }
        }
    }
}

/* ---------- Screen-space culling -------------------------------------------
   At the 1000+ vessel scale aisstream emits, drawing every vessel everywhere
   in the bbox makes Leaflet sluggish even on fast hardware.  Cull to the
   current viewport plus a 30 % pad — vessels just off-edge stay rendered so
   panning doesn't flash them in/out, but the global Gulf herd doesn't drag
   on the renderer when the operator is zoomed in on Mobile Bay. */

function inViewport(v, bounds) {
    if (v.lat == null || v.lon == null) return false;
    return bounds.contains([v.lat, v.lon]);
}

function renderVessels(vessels) {
    const bounds = map.getBounds().pad(0.3);
    const visible = vessels.filter(v => inViewport(v, bounds));
    const seen = new Set();
    visible.forEach(v => {
        seen.add(v.mmsi);
        upsertVessel(v);
    });
    /* removeMissingVessels evicts both off-viewport AND truly-gone
       vessels — a single pass covers both because the seen set only
       contains in-viewport ones. */
    removeMissingVessels(seen);
}

/* Re-render on every map pan/zoom so vessels just brought into view
   appear immediately instead of waiting for the next 3 s poll.  No
   network call — uses the cached vessels from lastVesselsById. */
map.on("moveend", () => {
    if (lastVesselsById.size === 0) return;
    renderVessels(Array.from(lastVesselsById.values()));
});

async function poll() {
    let json;
    try {
        const r = await fetch("/api/maritime/vessels");
        json = await r.json();
    } catch (e) {
        console.error("maritime poll failed", e);
        return;
    }

    const vessels = json.vessels || [];
    const stats = json.stats || {};

    document.getElementById("vessel-count").textContent     = stats.n_vessels ?? 0;
    document.getElementById("vessel-pos-count").textContent = stats.n_with_position ?? 0;
    document.getElementById("msg-total").textContent        = stats.msg_count ?? 0;
    document.getElementById("last-msg").textContent =
        stats.last_msg_ts ? fmtAge(Date.now()/1000 - stats.last_msg_ts) + " ago" : "–";

    /* Cache the full vessel set keyed by MMSI so the moveend handler
       can re-render off-cached data when the user pans/zooms without
       waiting for the next poll cycle. */
    lastVesselsById.clear();
    vessels.forEach(v => { if (v.mmsi != null) lastVesselsById.set(v.mmsi, v); });

    /* Auto-fit on first non-empty payload — but use ONLY local-RX
       vessels for the framing rather than the full Gulf-wide
       aisstream herd.  Local vessels reflect what the operator's
       actual antenna can hear; an autofit including Houston and
       Tampa would zoom out so far that nothing reads at all.  Fall
       back to the full set if there's no local data yet. */
    if (!firstFitDone && vessels.length > 0) {
        const localOnly = vessels.filter(v => !v.source || v.source === "local");
        const fitSet = (localOnly.length > 0 ? localOnly : vessels);
        const bounds = L.latLngBounds(fitSet.map(v => [v.lat, v.lon]));
        if (bounds.isValid()) {
            map.fitBounds(bounds.pad(0.2), { maxZoom: 13 });
            firstFitDone = true;
        }
    }

    renderVessels(vessels);
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
