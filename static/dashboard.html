<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GlowUp Dashboard</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --dim: #888;
    --accent: #e94560;
    --green: #4ecca3;
    --orange: #f5a623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Mono", Menlo, monospace;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    font-size: 14px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    color: var(--accent);
  }
  .subtitle {
    color: var(--dim);
    font-size: 12px;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h2 {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .device-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .device-row:last-child { border-bottom: none; }
  .device-name { font-weight: 600; }
  .device-meta { color: var(--dim); font-size: 12px; }
  .device-effect { color: var(--green); font-size: 13px; }
  .device-idle { color: var(--dim); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-playing { background: var(--green); color: #000; }
  .badge-stopped { background: var(--border); color: var(--dim); }
  .badge-overridden { background: var(--orange); color: #000; }
  .badge-active { background: var(--green); color: #000; }
  .badge-disabled { background: var(--border); color: var(--dim); }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .error {
    color: var(--accent);
    padding: 20px;
    text-align: center;
  }
  .schedule-row {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-name { font-weight: 600; }
  .schedule-time { color: var(--dim); font-size: 12px; }
  .schedule-effect { color: var(--green); }
  .schedule-group { color: var(--orange); font-size: 12px; }
  .discovered-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .discovered-row:last-child { border-bottom: none; }
  .discovered-ip { font-weight: 600; color: var(--green); }
  .discovered-label { color: var(--text); }
  .discovered-mac { color: var(--dim); font-family: monospace; font-size: 12px; }
  .refresh-note {
    color: var(--dim);
    font-size: 11px;
    text-align: right;
    margin-top: 8px;
  }
  .group-members {
    color: var(--dim);
    font-size: 11px;
    margin-top: 2px;
  }
  #auth-form {
    max-width: 400px;
    margin: 100px auto;
    text-align: center;
  }
  #auth-form input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    width: 100%;
    margin: 12px 0;
    font-family: inherit;
  }
  #auth-form button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<div id="auth-form">
  <h1>GlowUp Dashboard</h1>
  <p style="color: var(--dim); margin-top: 8px;">Enter your API token</p>
  <input type="password" id="token-input" placeholder="Bearer token">
  <br>
  <button onclick="authenticate()">Connect</button>
</div>

<div id="dashboard" style="display:none;">
  <h1>GlowUp Dashboard</h1>
  <div class="subtitle">Auto-refreshes every 5 seconds</div>

  <div class="card" style="margin-bottom: 16px;">
    <div class="stat-grid">
      <div><div class="stat-value" id="stat-devices">-</div><div class="stat-label">Devices</div></div>
      <div><div class="stat-value" id="stat-playing">-</div><div class="stat-label">Playing</div></div>
      <div><div class="stat-value" id="stat-discovered" style="color: var(--green);">-</div><div class="stat-label">Found (ARP)</div></div>
      <div><div class="stat-value" id="stat-schedule">-</div><div class="stat-label">Schedule</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Now Playing</h2>
      <div id="now-playing"><div class="error">Loading...</div></div>
    </div>
    <div class="card">
      <h2>Schedule</h2>
      <div id="schedule"><div class="error">Loading...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Devices</h2>
      <div id="devices"><div class="error">Loading...</div></div>
    </div>
    <div class="card">
      <h2>Groups</h2>
      <div id="groups"><div class="error">Loading...</div></div>
    </div>
  </div>

  <div class="card" style="margin-top: 16px;">
    <h2>Discovered Bulbs (ARP Keepalive)</h2>
    <div id="discovered-bulbs"><div class="device-idle" style="padding:8px 0;">Waiting for ARP scan...</div></div>
  </div>

  <div class="refresh-note">Last update: <span id="last-update">-</span></div>
</div>

<script>
let TOKEN = '';
const BASE = window.location.origin;

// Polling state — managed by startPolling / stopPolling.
let pollTimer = null;

// Normal and backoff poll intervals (milliseconds).
const POLL_INTERVAL_MS = 5000;
const BACKOFF_INTERVAL_MS = 30000;

// True while a refresh() cycle is in flight — prevents overlapping fetches.
let refreshInFlight = false;

function startPolling(intervalMs) {
  stopPolling();
  pollTimer = setInterval(refresh, intervalMs);
}

function stopPolling() {
  if (pollTimer !== null) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
}

function showAuth() {
  stopPolling();
  TOKEN = '';
  localStorage.removeItem('glowup_token');
  document.getElementById('auth-form').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
}

function showDashboard() {
  document.getElementById('auth-form').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function authenticate() {
  TOKEN = document.getElementById('token-input').value.trim();
  if (!TOKEN) return;
  localStorage.setItem('glowup_token', TOKEN);
  showDashboard();
  refresh();
  startPolling(POLL_INTERVAL_MS);
}

// Auto-login if token is stored.
window.addEventListener('load', () => {
  const saved = localStorage.getItem('glowup_token');
  if (saved) {
    TOKEN = saved;
    showDashboard();
    refresh();
    startPolling(POLL_INTERVAL_MS);
  }
});

async function api(path) {
  const r = await fetch(BASE + path, {
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  });
  if (r.status === 401) return { _authFailed: true };
  if (r.status === 429) return { _rateLimited: true };
  if (!r.ok) return { _error: true, status: r.status };
  return r.json();
}

async function refresh() {
  if (refreshInFlight) return;
  refreshInFlight = true;
  try {
    const [devices, schedule, discovered] = await Promise.all([
      api('/api/devices'),
      api('/api/schedule'),
      api('/api/discovered_bulbs'),
    ]);

    const results = [devices, schedule, discovered];

    // Any 401 → back to login.
    if (results.some(r => r && r._authFailed)) {
      showAuth();
      return;
    }

    // Any 429 → back off polling.
    if (results.some(r => r && r._rateLimited)) {
      startPolling(BACKOFF_INTERVAL_MS);
      document.getElementById('last-update').textContent =
        'Rate limited \u2014 backing off to 30s polling';
      return;
    }

    // Any other error → skip this cycle.
    if (results.some(r => r && r._error)) {
      document.getElementById('last-update').textContent =
        'Server error \u2014 retrying in 5s';
      return;
    }

    // Ensure normal poll rate after success.
    startPolling(POLL_INTERVAL_MS);

    // Split devices into physical and groups.
    const devList = devices.devices || [];
    const physical = devList.filter(d => !d.is_group);
    const groups = devList.filter(d => d.is_group);

    // Determine which devices are playing (from current_effect field).
    const playing = physical.filter(d => d.current_effect);

    // Stats.
    document.getElementById('stat-devices').textContent = physical.length;
    document.getElementById('stat-playing').textContent = playing.length;

    const bulbs = (discovered && discovered.discovered_bulbs) || [];
    document.getElementById('stat-discovered').textContent = bulbs.length;

    const entries = (schedule && schedule.entries) || [];
    const activeCount = entries.filter(e => e.active).length;
    document.getElementById('stat-schedule').textContent =
      activeCount + '/' + entries.length;

    // Now Playing — derived from device list current_effect.
    const npEl = document.getElementById('now-playing');
    if (playing.length === 0) {
      npEl.innerHTML =
        '<div class="device-idle" style="padding:8px 0;">Nothing playing</div>';
    } else {
      npEl.innerHTML = playing.map(d => {
        const name = d.nickname || d.label || d.ip;
        const overridden = d.overridden
          ? ' <span class="badge badge-overridden">PHONE</span>'
          : '';
        return `
          <div class="device-row">
            <div>
              <div class="device-name">${esc(name)}</div>
              <div class="device-effect">${esc(d.current_effect)}</div>
              <div class="device-meta">${esc(d.product || '')} &middot; ${d.zones || 1} zones</div>
            </div>
            <div style="text-align:right;">
              <span class="badge badge-playing">LIVE</span>${overridden}
            </div>
          </div>
        `;
      }).join('');
    }

    // Also check groups that are playing.
    const playingGroups = groups.filter(g => g.current_effect);
    if (playingGroups.length > 0) {
      npEl.innerHTML += playingGroups.map(g => {
        return `
          <div class="device-row">
            <div>
              <div class="device-name">Group: ${esc(g.label || g.ip)}</div>
              <div class="device-effect">${esc(g.current_effect)}</div>
              <div class="device-meta">${g.zones || 0} zones</div>
            </div>
            <div style="text-align:right;">
              <span class="badge badge-playing">LIVE</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Schedule.
    const sEl = document.getElementById('schedule');
    if (entries.length === 0) {
      sEl.innerHTML =
        '<div class="device-idle" style="padding:8px 0;">No schedule configured</div>';
    } else {
      sEl.innerHTML = entries.map(e => {
        const badge = e.active
          ? '<span class="badge badge-active">ACTIVE</span>'
          : e.enabled
            ? '<span class="badge badge-stopped">WAITING</span>'
            : '<span class="badge badge-disabled">OFF</span>';
        const times = (e.start_resolved && e.stop_resolved)
          ? e.start_resolved + ' \u2192 ' + e.stop_resolved
          : e.start + ' \u2192 ' + e.stop;
        return `
          <div class="schedule-row">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="schedule-name">${esc(e.name)}</span>
              ${badge}
            </div>
            <div style="margin-top:4px;">
              <span class="schedule-effect">${esc(e.effect)}</span>
              <span class="schedule-group">${esc(e.group)}</span>
              <span class="schedule-time">${esc(times)} &middot; ${esc(e.days_display)}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Physical Devices.
    const dEl = document.getElementById('devices');
    if (physical.length === 0) {
      dEl.innerHTML =
        '<div class="device-idle" style="padding:8px 0;">No devices</div>';
    } else {
      dEl.innerHTML = physical.map(d => {
        const name = d.nickname || d.label || d.ip;
        const isPlaying = !!d.current_effect;
        const badge = isPlaying
          ? '<span class="badge badge-playing">PLAYING</span>'
          : '<span class="badge badge-stopped">IDLE</span>';
        const effectLine = isPlaying
          ? `<div class="device-effect">${esc(d.current_effect)}</div>`
          : '';
        return `
          <div class="device-row">
            <div>
              <div class="device-name">${esc(name)}</div>
              ${effectLine}
              <div class="device-meta">${esc(d.product || '')} &middot; ${d.zones || 1} zones</div>
            </div>
            ${badge}
          </div>
        `;
      }).join('');
    }

    // Groups.
    const gEl = document.getElementById('groups');
    if (groups.length === 0) {
      gEl.innerHTML =
        '<div class="device-idle" style="padding:8px 0;">No groups configured</div>';
    } else {
      gEl.innerHTML = groups.map(g => {
        const name = g.label || g.ip;
        const isPlaying = !!g.current_effect;
        const badge = isPlaying
          ? '<span class="badge badge-playing">PLAYING</span>'
          : '<span class="badge badge-stopped">IDLE</span>';
        const effectLine = isPlaying
          ? `<div class="device-effect">${esc(g.current_effect)}</div>`
          : '';
        const memberCount = (g.member_ips || []).length;
        return `
          <div class="device-row">
            <div>
              <div class="device-name">${esc(name)}</div>
              ${effectLine}
              <div class="device-meta">${g.zones || 0} zones &middot; ${memberCount} devices</div>
            </div>
            ${badge}
          </div>
        `;
      }).join('');
    }

    // Discovered Bulbs.
    const dbEl = document.getElementById('discovered-bulbs');
    if (bulbs.length === 0) {
      dbEl.innerHTML =
        '<div class="device-idle" style="padding:8px 0;">No bulbs discovered yet</div>';
    } else {
      dbEl.innerHTML = bulbs.map(b => `
        <div class="discovered-row">
          <div>
            <span class="discovered-ip">${esc(b.ip)}</span>
            <span class="discovered-label">${b.label ? ' \u2014 ' + esc(b.label) : ''}</span>
          </div>
          <span class="discovered-mac">${esc(b.mac)}</span>
        </div>
      `).join('');
    }

    document.getElementById('last-update').textContent =
      new Date().toLocaleTimeString();
  } catch (e) {
    console.error('Refresh failed:', e);
  } finally {
    refreshInFlight = false;
  }
}

// Escape HTML to prevent XSS from device labels or effect names.
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>
