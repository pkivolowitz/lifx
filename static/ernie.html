<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernie — BLE + SDR + thermal sniffer</title>
<style>
/* CSS custom properties for light + dark. prefers-color-scheme flips
   these at OS level; no JS toggle needed. Retrofit-able to the other
   dashboards in this repo by copying the :root and @media block. */
:root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --panel-border: #dde1e7;
    --fg: #1a1d24;
    --fg-dim: #6a7280;
    --accent: #2563eb;
    --ok: #16a34a;
    --warn: #d97706;
    --err: #dc2626;
    --unknown: #9ca3af;
    --rssi-bar: #2563eb;
    --rssi-bg: #e5e7eb;
    --row-hover: #f3f4f6;
    --new-row: #fef3c7;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0f1115;
        --panel: #1a1d24;
        --panel-border: #2b2f38;
        --fg: #e5e7eb;
        --fg-dim: #9ca3af;
        --accent: #60a5fa;
        --ok: #34d399;
        --warn: #fbbf24;
        --err: #f87171;
        --unknown: #6b7280;
        --rssi-bar: #60a5fa;
        --rssi-bg: #2b2f38;
        --row-hover: #242833;
        --new-row: #3b2f0f;
    }
}
* { box-sizing: border-box; }
html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 Helvetica, Arial, sans-serif;
    font-size: 14px;
}
header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--panel-border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
}
h1 { font-size: 18px; margin: 0; font-weight: 600; }
h1 small { color: var(--fg-dim); font-weight: 400; font-size: 13px; margin-left: 10px; }
.meta { color: var(--fg-dim); font-size: 12px; font-family: var(--mono); }
main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 14px;
    padding: 14px;
    height: calc(100vh - 60px);
}
@media (max-width: 900px) {
    main { grid-template-columns: 1fr; height: auto; }
}
.panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 12px 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
}
.panel h2 {
    font-size: 14px;
    margin: 0 0 8px 0;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.panel h2 .badge {
    background: var(--panel-border);
    color: var(--fg-dim);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--mono);
}
.panel.top-row { grid-column: span 2; }
@media (max-width: 900px) {
    .panel.top-row { grid-column: span 1; }
}
.thermal-grid {
    display: grid;
    grid-template-columns: minmax(160px, 1fr) minmax(200px, 2fr);
    gap: 16px;
    align-items: center;
}
.temp-big {
    font-family: var(--mono);
    font-size: 48px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
}
.temp-big.warn { color: var(--warn); }
.temp-big.err { color: var(--err); }
.temp-sub {
    color: var(--fg-dim);
    font-size: 12px;
    font-family: var(--mono);
    margin-top: 4px;
}
.services {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.service {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: var(--mono);
}
.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--unknown);
}
.dot.ok { background: var(--ok); }
.dot.err { background: var(--err); }
.dot.unknown { background: var(--unknown); }
.table-wrap {
    overflow: auto;
    flex: 1;
    min-height: 0;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}
th, td {
    padding: 4px 8px;
    text-align: left;
    border-bottom: 1px solid var(--panel-border);
    white-space: nowrap;
}
th {
    position: sticky;
    top: 0;
    background: var(--panel);
    font-weight: 600;
    color: var(--fg-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
}
th:hover { color: var(--fg); }
tr:hover td { background: var(--row-hover); }
.mono { font-family: var(--mono); }
.dim { color: var(--fg-dim); }
/* "converted" marks TPMS temps/pressures that came in as native °C or
   kPa and were normalized to °F / PSI for display — italic is the
   cue that the unit was converted, not native. */
.converted { font-style: italic; }
.rssi-cell {
    display: inline-block;
    width: 80px;
    height: 12px;
    background: var(--rssi-bg);
    border-radius: 2px;
    position: relative;
    vertical-align: middle;
}
.rssi-cell > div {
    height: 100%;
    background: var(--rssi-bar);
    border-radius: 2px;
    transition: width 0.2s;
}
.empty {
    color: var(--fg-dim);
    text-align: center;
    padding: 30px 10px;
    font-style: italic;
}
.band {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-family: var(--mono);
}
.band-very-close { background: var(--ok);      color: #fff; }
.band-close      { background: var(--accent);  color: #fff; }
.band-mid        { background: var(--unknown); color: #fff; }
.band-far        { background: var(--panel-border); color: var(--fg-dim); }
.gone-row td { opacity: 0.5; }
.gone-row strong { text-decoration: line-through; }
/* Event colouring — subtle left border by event type. */
.evt-first_seen td:first-child     { border-left: 3px solid var(--ok); }
.evt-moved td:first-child          { border-left: 3px solid var(--accent); }
.evt-gone td:first-child           { border-left: 3px solid var(--err); }
.evt-payload_changed td:first-child{ border-left: 3px solid var(--warn); }
.evt-heartbeat td:first-child      { border-left: 3px solid var(--unknown); }
</style>
</head>
<body>
<header>
    <div>
        <h1>Ernie <small>.153 — Odroid N2+ sniffer</small></h1>
    </div>
    <div class="meta" id="meta">connecting…</div>
</header>
<main>
    <section class="panel top-row">
        <h2>Thermal + services</h2>
        <div class="thermal-grid">
            <div>
                <div class="temp-big" id="temp">--</div>
                <div class="temp-sub" id="temp-sub">no data</div>
            </div>
            <div class="services" id="services"></div>
        </div>
    </section>

    <section class="panel">
        <h2>BLE devices <span class="badge" id="ble-count">0</span>
            <span class="badge" id="ble-events-count" title="Event log">0 evt</span></h2>
        <div class="table-wrap">
            <table id="ble-table">
                <thead>
                    <tr>
                        <th data-sort="category">Category</th>
                        <th data-sort="label">Label / MAC</th>
                        <th data-sort="vendor">Vendor</th>
                        <th data-sort="identity">Class</th>
                        <th data-sort="band">Band</th>
                        <th data-sort="rssi_ema">RSSI</th>
                        <th data-sort="last_heard_ts">Last</th>
                    </tr>
                </thead>
                <tbody id="ble-body">
                    <tr><td colspan="7" class="empty">listening…</td></tr>
                </tbody>
            </table>
        </div>
        <h2 style="margin-top:10px">Event log</h2>
        <div class="table-wrap" style="max-height: 180px">
            <table id="ble-events-table">
                <thead>
                    <tr>
                        <th>When</th>
                        <th>Event</th>
                        <th>Label / MAC</th>
                        <th>Detail</th>
                    </tr>
                </thead>
                <tbody id="ble-events-body">
                    <tr><td colspan="4" class="empty">no events yet</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="panel">
        <h2>TPMS decodes <span class="badge" id="tpms-count">0</span></h2>
        <div class="table-wrap">
            <table id="tpms-table">
                <thead>
                    <tr>
                        <th data-sort="last_seen">Last</th>
                        <th data-sort="model">Model</th>
                        <th data-sort="id">Sensor ID</th>
                        <th data-sort="pressure">Pressure</th>
                        <th data-sort="temperature">Temp</th>
                        <th data-sort="count">N</th>
                    </tr>
                </thead>
                <tbody id="tpms-body">
                    <tr><td colspan="6" class="empty">waiting for cars…</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
"use strict";

// Poll interval.  The render path no longer destroys DOM, so this can
// stay responsive without pinning the CPU.
const POLL_MS = 2000;

// Fixed-size row pools — the table bodies are pre-populated with this
// many hidden <tr> elements at page load, and updates mutate cell
// contents in place.  No createElement/innerHTML churn per poll means
// an M4 stops burning a core just to render this page.
//
// Sizes are set above the practical upper bound for each panel in a
// home environment.  Data beyond the pool is silently truncated; the
// "N more" chip in the panel header reports the overflow so nothing
// is silently lost.
const POOL_SIZES = { ble: 60, events: 40, tpms: 20 };

const sortState = {
    ble:  { key: "last_heard_ts", asc: false },
    tpms: { key: "last_seen",     asc: false },
};

// Pool row handles populated by buildPools() at boot.  Each element
// is a plain object holding references to the mutable nodes of one row
// so the render path only touches textContent / style / className.
const pools = { ble: [], events: [], tpms: [] };

// Per-table empty-state rows.  Always present in the DOM (once), shown
// when the data array is empty, hidden when the pool has data.
const emptyRows = { ble: null, events: null, tpms: null };

// Service-dot handles, built once and mutated thereafter.
let serviceDots = null;

function fmtAge(ts) {
    if (!ts) return "—";
    const age = Math.max(0, (Date.now() / 1000) - ts);
    if (age < 60)   return Math.round(age) + "s";
    if (age < 3600) return Math.round(age / 60) + "m";
    return Math.round(age / 3600) + "h";
}

function sortRows(rows, key, asc) {
    const dir = asc ? 1 : -1;
    return rows.slice().sort((a, b) => {
        const av = a[key], bv = b[key];
        if (av === undefined || av === null) return 1;
        if (bv === undefined || bv === null) return -1;
        if (av < bv) return -1 * dir;
        if (av > bv) return  1 * dir;
        return 0;
    });
}

function bindSorters(tableId, which) {
    document.querySelectorAll(`#${tableId} thead th`).forEach(th => {
        th.addEventListener("click", () => {
            const k = th.dataset.sort;
            if (sortState[which].key === k) {
                sortState[which].asc = !sortState[which].asc;
            } else {
                sortState[which].key = k;
                sortState[which].asc = false;
            }
        });
    });
}

// ---------------------------------------------------------------------
// Pool construction — build every <tr> we will ever render once.
// ---------------------------------------------------------------------

function mk(tag, className) {
    const el = document.createElement(tag);
    if (className) el.className = className;
    return el;
}

function mkEmptyRow(tbody, colspan, text) {
    const tr = mk("tr");
    const td = mk("td", "empty");
    td.colSpan = colspan;
    td.textContent = text;
    tr.append(td);
    tbody.appendChild(tr);
    return tr;
}

function buildBlePool(tbody, count) {
    for (let i = 0; i < count; i++) {
        const tr = mk("tr");
        tr.hidden = true;

        const tdCategory = mk("td");

        const tdLabel = mk("td");
        const labelStrong = mk("strong");
        const labelSpace = document.createTextNode(" ");
        const labelMac = mk("span", "mono dim");
        tdLabel.append(labelStrong, labelSpace, labelMac);

        const tdVendor = mk("td", "dim");
        const tdIdentity = mk("td");

        const tdBand = mk("td");
        const bandPill = mk("span");
        tdBand.append(bandPill);

        const tdRssi = mk("td");
        const rssiWrap = mk("span", "rssi-cell");
        const rssiInner = mk("div");
        rssiWrap.append(rssiInner);
        const rssiSpace = document.createTextNode(" ");
        const rssiText = mk("span", "mono dim");
        tdRssi.append(rssiWrap, rssiSpace, rssiText);

        const tdAge = mk("td", "mono dim");

        tr.append(tdCategory, tdLabel, tdVendor, tdIdentity,
                  tdBand, tdRssi, tdAge);
        tbody.appendChild(tr);

        pools.ble.push({
            tr, tdCategory,
            labelStrong, labelMac,
            tdVendor, tdIdentity,
            bandPill,
            rssiWrap, rssiInner, rssiText,
            tdAge,
        });
    }
}

function buildEventsPool(tbody, count) {
    for (let i = 0; i < count; i++) {
        const tr = mk("tr");
        tr.hidden = true;

        const tdAge = mk("td", "mono dim");
        const tdEvent = mk("td");
        const eventStrong = mk("strong");
        tdEvent.append(eventStrong);
        const tdLabel = mk("td");
        const labelText = document.createTextNode("");
        tdLabel.append(labelText);
        const tdDetail = mk("td", "mono dim");

        tr.append(tdAge, tdEvent, tdLabel, tdDetail);
        tbody.appendChild(tr);

        pools.events.push({
            tr, tdAge, eventStrong, tdLabel, labelText, tdDetail,
        });
    }
}

function buildTpmsPool(tbody, count) {
    for (let i = 0; i < count; i++) {
        const tr = mk("tr");
        tr.hidden = true;

        const tdAge = mk("td", "mono dim");
        const tdModel = mk("td");
        const tdId = mk("td", "mono");
        const tdPsi = mk("td", "mono");
        const tdTemp = mk("td", "mono");
        const tdCount = mk("td", "mono dim");

        tr.append(tdAge, tdModel, tdId, tdPsi, tdTemp, tdCount);
        tbody.appendChild(tr);

        pools.tpms.push({
            tr, tdAge, tdModel, tdId, tdPsi, tdTemp, tdCount,
        });
    }
}

function buildServiceDots() {
    const svcBox = document.getElementById("services");
    const order = [
        ["mosquitto",   "mosquitto"],
        ["ble_sniffer", "ble-sniffer"],
        ["rtl433",      "rtl433"],
        ["pi_thermal",  "pi-thermal"],
    ];
    const map = {};
    for (const [key, label] of order) {
        const wrap = mk("span", "service");
        const dot = mk("span", "dot unknown");
        wrap.append(dot, document.createTextNode(label));
        svcBox.append(wrap);
        map[key] = dot;
    }
    return map;
}

function buildPools() {
    const bleBody = document.getElementById("ble-body");
    emptyRows.ble = mkEmptyRow(bleBody, 7, "listening…");
    buildBlePool(bleBody, POOL_SIZES.ble);

    const evBody = document.getElementById("ble-events-body");
    emptyRows.events = mkEmptyRow(evBody, 4, "no events yet");
    buildEventsPool(evBody, POOL_SIZES.events);

    const tpmsBody = document.getElementById("tpms-body");
    emptyRows.tpms = mkEmptyRow(tpmsBody, 6, "waiting for cars…");
    buildTpmsPool(tpmsBody, POOL_SIZES.tpms);

    serviceDots = buildServiceDots();
}

// ---------------------------------------------------------------------
// Row updaters — mutate a handle in place, never create or remove DOM.
// ---------------------------------------------------------------------

function setText(node, s) {
    // Assigning a fresh string on every poll is a hot path; skipping
    // the write when the text is unchanged saves layout invalidations.
    if (node.textContent !== s) node.textContent = s;
}

function setClass(node, cls) {
    if (node.className !== cls) node.className = cls;
}

function setWidth(node, pct) {
    const s = pct + "%";
    if (node.style.width !== s) node.style.width = s;
}

function updateBleRow(h, r) {
    const gone = !!r.gone;
    const label = r.label || "";
    const mac = r.mac || "";

    setText(h.tdCategory, r.category || "unknown");

    // Label + MAC: strong holds the label (empty collapses visually),
    // mac span holds the MAC.  Both always present; a missing label
    // means the strong renders as zero-width.
    setText(h.labelStrong, label);
    setText(h.labelMac, mac);

    setText(h.tdVendor, r.vendor || "");

    // Class / identity column.
    const identParts = [];
    if (r.apple_subtype) identParts.push(r.apple_subtype);
    else if (r.company)  identParts.push(r.company);
    if (r.name && !r.label) identParts.push(r.name);
    if (!identParts.length && r.mac_kind && r.mac_kind !== "public") {
        identParts.push(r.mac_kind);
    }
    setText(h.tdIdentity, identParts.join(" · "));

    // Band pill.
    if (r.band) {
        setClass(h.bandPill, "band band-" + r.band);
        setText(h.bandPill, r.band);
        h.bandPill.hidden = false;
    } else {
        setText(h.bandPill, "");
        h.bandPill.hidden = true;
    }

    // RSSI bar + dBm readout.
    const rssi = (typeof r.rssi_ema === "number")
        ? Math.round(r.rssi_ema) : null;
    if (rssi === null) {
        h.rssiWrap.hidden = true;
        setText(h.rssiText, "");
    } else {
        h.rssiWrap.hidden = false;
        // -30 dBm → 100%, -100 dBm → 0%.
        const pct = Math.max(0, Math.min(100, (rssi + 100) * (100 / 70)));
        setWidth(h.rssiInner, pct);
        setText(h.rssiText, rssi + " dBm");
    }

    const ageTs = r.last_heard_ts || r.ts || 0;
    setText(h.tdAge, (gone ? "gone " : "") + fmtAge(ageTs));

    h.tr.classList.toggle("gone-row", gone);
    h.tr.hidden = false;
}

function hideRow(h) { h.tr.hidden = true; }

function renderBle(data) {
    setText(document.getElementById("ble-count"),
            String(data.count));
    const rows = sortRows(
        data.devices || [], sortState.ble.key, sortState.ble.asc,
    );
    const n = Math.min(rows.length, pools.ble.length);
    emptyRows.ble.hidden = n > 0;
    for (let i = 0; i < pools.ble.length; i++) {
        if (i < n) updateBleRow(pools.ble[i], rows[i]);
        else       hideRow(pools.ble[i]);
    }
}

function updateEventRow(h, e) {
    setText(h.tdAge, fmtAge(e.ts));
    setText(h.eventStrong, e.event || "");
    setText(h.labelText, e.label || e.mac || "");
    if (!e.label && e.mac) {
        setClass(h.tdLabel, "mono");
    } else {
        setClass(h.tdLabel, "");
    }
    let detail = "";
    if (e.event === "moved") {
        detail = `→ ${e.band} (${Math.round(e.rssi_ema)} dBm)`;
    } else if (e.event === "payload_changed") {
        detail = `mfr=${e.mfr_data || "-"}`;
    } else if (e.event === "heartbeat") {
        detail = `${e.band} (${Math.round(e.rssi_ema)} dBm)`;
    } else if (e.event === "first_seen") {
        detail = e.label ? "" : "stranger";
    }
    setText(h.tdDetail, detail);
    setClass(h.tr, "evt-" + (e.event || ""));
    h.tr.hidden = false;
}

function renderBleEvents(data) {
    setText(document.getElementById("ble-events-count"),
            (data.count || 0) + " evt");
    // Newest first in the display — tail the ring backwards.
    const evs = (data.events || []).slice().reverse();
    const n = Math.min(evs.length, pools.events.length);
    emptyRows.events.hidden = n > 0;
    for (let i = 0; i < pools.events.length; i++) {
        if (i < n) updateEventRow(pools.events[i], evs[i]);
        else       hideRow(pools.events[i]);
    }
}

function updateTpmsRow(h, s) {
    setText(h.tdAge, fmtAge(s.last_seen));
    setText(h.tdModel, s.model || "");
    setText(h.tdId, s.id || "");

    const psi = (s.pressure === null || s.pressure === undefined)
        ? "" : s.pressure.toFixed(1) + " PSI";
    setText(h.tdPsi, psi);
    h.tdPsi.classList.toggle("converted", !!s.psi_converted);

    const t = (s.temperature === null || s.temperature === undefined)
        ? "" : s.temperature.toFixed(1) + " °F";
    setText(h.tdTemp, t);
    h.tdTemp.classList.toggle("converted", !!s.temp_converted);

    setText(h.tdCount, String(s.count == null ? "" : s.count));
    h.tr.hidden = false;
}

function decorateTpms(sensors) {
    return (sensors || []).map(s => {
        const p = s.last_payload || {};
        let temp_f = null, temp_converted = false;
        if (typeof p.temperature_F === "number") {
            temp_f = p.temperature_F;
        } else if (typeof p.temperature_C === "number") {
            temp_f = p.temperature_C * 9 / 5 + 32;
            temp_converted = true;
        }
        let psi = null, psi_converted = false;
        if (typeof p.pressure_PSI === "number") {
            psi = p.pressure_PSI;
        } else if (typeof p.pressure_kPa === "number") {
            psi = p.pressure_kPa * 0.145038;
            psi_converted = true;
        }
        return { ...s,
                 pressure: psi, psi_converted,
                 temperature: temp_f, temp_converted };
    });
}

function renderTpms(data) {
    setText(document.getElementById("tpms-count"),
            String(data.count || 0));
    const rows = sortRows(
        decorateTpms(data.sensors),
        sortState.tpms.key, sortState.tpms.asc,
    );
    const n = Math.min(rows.length, pools.tpms.length);
    emptyRows.tpms.hidden = n > 0;
    for (let i = 0; i < pools.tpms.length; i++) {
        if (i < n) updateTpmsRow(pools.tpms[i], rows[i]);
        else       hideRow(pools.tpms[i]);
    }
}

function renderThermal(data) {
    const r = data.reading || {};
    const temp = r.cpu_temp_c;
    const tempEl = document.getElementById("temp");
    const tempSub = document.getElementById("temp-sub");
    if (typeof temp === "number") {
        setText(tempEl, temp.toFixed(1) + " °C");
        tempEl.classList.toggle("warn", temp >= 70 && temp < 85);
        tempEl.classList.toggle("err",  temp >= 85);
    } else {
        setText(tempEl, "—");
    }
    const parts = [];
    if (typeof r.load_1m === "number") parts.push(`load ${r.load_1m}`);
    if (typeof r.uptime_s === "number") {
        const hrs = r.uptime_s / 3600;
        parts.push(`up ${hrs < 24 ? hrs.toFixed(1) + "h"
                                  : (hrs / 24).toFixed(1) + "d"}`);
    }
    if (r.extra?.model) parts.push(r.extra.model);
    setText(tempSub, parts.join(" · ") || "no data");

    // Service dots — pre-built once in buildServiceDots, only the
    // className of each dot changes per poll.
    const svcs = data.health || {};
    for (const key of Object.keys(serviceDots)) {
        const v = svcs[key];
        const cls = v === true ? "dot ok"
                  : v === false ? "dot err"
                  : "dot unknown";
        setClass(serviceDots[key], cls);
    }
}

async function fetchJson(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(`${url} -> ${r.status}`);
    return await r.json();
}

async function tick() {
    try {
        const [ble, bleEvents, tpms, thermal] = await Promise.all([
            fetchJson("/api/ernie/ble"),
            fetchJson("/api/ernie/ble/events"),
            fetchJson("/api/ernie/tpms"),
            fetchJson("/api/ernie/thermal"),
        ]);
        renderBle(ble);
        renderBleEvents(bleEvents);
        renderTpms(tpms);
        renderThermal(thermal);
        const now = new Date();
        setText(document.getElementById("meta"),
                `updated ${now.toLocaleTimeString()}`);
    } catch (e) {
        setText(document.getElementById("meta"),
                `error: ${e.message}`);
    }
}

buildPools();
bindSorters("ble-table",  "ble");
bindSorters("tpms-table", "tpms");
tick();
setInterval(tick, POLL_MS);
</script>
</body>
</html>
