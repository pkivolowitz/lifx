# Mosquitto bridge configuration for broker-2 (BLE relay node).
#
# broker-2 runs a local mosquitto instance.  The BLE sensor daemon
# publishes to localhost.  This bridge forwards all glowup/ble/#
# messages upstream to the main broker on the primary Pi (10.0.0.48).
#
# The main Pi's GlowUp server sees the messages exactly as if the
# BLE daemon were local — no server-side changes needed.
#
# Install:
#   sudo cp mosquitto-bridge.conf /etc/mosquitto/conf.d/
#   sudo systemctl restart mosquitto
#
# Architecture:
#   ONVIS sensor  --BLE-->  broker-2 (BLE daemon + mosquitto)
#                               |
#                          MQTT bridge
#                               |
#                           Pi primary (10.0.0.48, mosquitto + GlowUp server)
#
# When to update:
#   - If the primary Pi's IP changes, update `address` below.
#   - If new topic prefixes are added, add them to `topic`.

# ---------------------------------------------------------------------------
# Local broker settings
# ---------------------------------------------------------------------------

# Listen on default port for local BLE daemon connections.
listener 1883 0.0.0.0

# No authentication for local-network use.
allow_anonymous true

# ---------------------------------------------------------------------------
# Bridge to primary Pi
# ---------------------------------------------------------------------------

connection glowup-primary
# Primary Pi MQTT broker.  Update this if the IP changes.
address 10.0.0.48:1883

# Forward all BLE sensor topics upstream.
# Direction "out" = local publishes are sent to the remote broker.
# QoS 1 = at-least-once delivery (survives brief network drops).
topic glowup/ble/# out 1

# Bridge will reconnect automatically on network interruption.
# Start type "automatic" means the bridge connects on mosquitto start.
start_type automatic

# Keepalive interval — detect dead connections within 60 seconds.
keepalive_interval 60

# Clean session false — the remote broker remembers our subscriptions
# across reconnects so no messages are lost during brief outages.
cleansession false

# Notification topic — the primary broker can monitor bridge health.
notifications true
notification_topic glowup/bridge/broker-2/status
